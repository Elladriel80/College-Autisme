/* ===================== BREVET BLANC ===================== */
var EXAM=null, EXAM_I=0, EXAM_ANS=[];
function _shuf(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function _norm(s){return String(s).toLowerCase().trim().replace(/\s+/g,"").replace(/\u00b2/g,"2");}
function collegeQuestions(){
  var out=[];
  CONTENT.subjects.forEach(function(s){
    s.lessons.forEach(function(l){
      var niv=l.niveau||"5e"; if(niv==="6e") return;
      l.questions.forEach(function(q){ out.push(Object.assign({},q,{subject:s.id,subjectName:s.name,subjectIcon:s.icon})); });
    });
  });
  return out;
}
function buildBrevet(){
  var bySub={}; collegeQuestions().forEach(function(q){ (bySub[q.subject]=bySub[q.subject]||[]).push(q); });
  var exam=[]; Object.keys(bySub).forEach(function(k){ exam=exam.concat(_shuf(bySub[k]).slice(0,3)); });
  return _shuf(exam);
}
function renderBrevetIntro(){
  renderStats();
  var best=STATE.brevet||0;
  app.innerHTML='<div class="card center">'
    +'<div style="font-size:54px" class="pop">🎓</div>'
    +'<h1>Le Brevet blanc</h1>'
    +'<p class="muted" style="max-width:620px;margin:0 auto">C\'est l\'examen pour t\'entraîner comme le jour du vrai Brevet. '
    +'Des questions de toutes les matières, sans aide cette fois : tu réponds, et la correction arrive à la fin. '
    +'Prends ton temps, respire, et fais de ton mieux. 💪</p>'
    +(best?'<p class="small muted" style="margin-top:8px">🏅 Ton meilleur score : <b>'+best+'/20</b></p>':'')
    +'<div class="row" style="justify-content:center;margin-top:18px">'
    +'<button class="btn big" id="startEx">Commencer l\'examen →</button>'
    +'<button class="btn ghost" id="backEx">← Carte</button></div></div>';
  document.getElementById("startEx").onclick=function(){ EXAM=buildBrevet(); EXAM_I=0; EXAM_ANS=new Array(EXAM.length).fill(null); renderExamQ(); };
  document.getElementById("backEx").onclick=renderMap;
}
function renderExamQ(){
  var q=EXAM[EXAM_I], n=EXAM.length, cur=EXAM_ANS[EXAM_I], ctrl="";
  if(q.type==="qcm"){
    ctrl='<div class="quests" style="margin-top:8px">'+q.options.map(function(o,i){ return '<button class="opt ex-opt'+(cur===i?' sel':'')+'" data-i="'+i+'">'+esc(o)+'</button>'; }).join("")+'</div>';
  } else if(q.type==="vf"){
    ctrl='<div class="row" style="justify-content:center;gap:12px;margin-top:8px"><button class="opt ex-opt'+(cur===true?' sel':'')+'" data-v="true">✅ Vrai</button><button class="opt ex-opt'+(cur===false?' sel':'')+'" data-v="false">❌ Faux</button></div>';
  } else {
    ctrl='<div style="max-width:320px;margin:10px auto"><input class="text" id="exIn" placeholder="Ta réponse" value="'+(cur!=null?esc(cur):"")+'"/></div>';
  }
  app.innerHTML='<div class="card">'
    +'<div class="row"><div class="small muted">Brevet blanc · Question '+(EXAM_I+1)+'/'+n+'</div><div class="spacer"></div><span class="chip">'+q.subjectIcon+' '+esc(q.subjectName)+'</span></div>'
    +'<div class="prog" style="margin:8px 0"><i style="width:'+Math.round(100*(EXAM_I+1)/n)+'%;background:#16a34a"></i></div>'
    +'<div class="qtext" style="font-size:18px;margin:10px 0">'+esc(q.q)+'</div>'+ctrl
    +'<div class="row" style="margin-top:16px">'+(EXAM_I>0?'<button class="btn ghost" id="prevQ">← Précédent</button>':'')+'<div class="spacer"></div><button class="btn" id="nextQ">'+(EXAM_I<n-1?'Suivant →':'Terminer ✅')+'</button></div></div>';
  app.querySelectorAll(".ex-opt").forEach(function(b){ b.onclick=function(){ if(q.type==="qcm") EXAM_ANS[EXAM_I]=parseInt(b.dataset.i,10); else EXAM_ANS[EXAM_I]=(b.dataset.v==="true"); app.querySelectorAll(".ex-opt").forEach(function(x){x.classList.remove("sel");}); b.classList.add("sel"); }; });
  var inp=document.getElementById("exIn"); if(inp) inp.oninput=function(){ EXAM_ANS[EXAM_I]=inp.value; };
  var pv=document.getElementById("prevQ"); if(pv) pv.onclick=function(){ EXAM_I--; renderExamQ(); };
  document.getElementById("nextQ").onclick=function(){ if(inp) EXAM_ANS[EXAM_I]=inp.value; if(EXAM_I<n-1){ EXAM_I++; renderExamQ(); } else renderExamResult(); };
}
function _correct(q,a){ if(a==null) return false; if(q.type==="qcm"||q.type==="vf") return a===q.answer; return q.answer.some(function(x){ return _norm(x)===_norm(a); }); }
function renderExamResult(){
  var n=EXAM.length, correct=0, bySub={};
  EXAM.forEach(function(q,i){ var ok=_correct(q,EXAM_ANS[i]); if(ok) correct++; var b=bySub[q.subjectName]=bySub[q.subjectName]||{ok:0,t:0,icon:q.subjectIcon}; b.t++; if(ok) b.ok++; });
  var note=Math.round(correct/n*20);
  var mention=note>=16?"Mention Très Bien 🌟":note>=14?"Mention Bien ✨":note>=12?"Mention Assez Bien 👏":note>=10?"Admis·e ! 🎉":"Pas encore — on révise et on retente 💪";
  var admis=note>=10;
  if(note>(STATE.brevet||0)) STATE.brevet=note;
  STATE.xp=(STATE.xp||0)+correct*5; STATE.crystals=(STATE.crystals||0)+(admis?15:correct); save();
  var subRows=Object.keys(bySub).map(function(k){var b=bySub[k];return '<div class="quest"><div class="qix">'+b.icon+'</div><div class="qmeta"><div class="qt">'+esc(k)+'</div><div class="small muted">'+b.ok+'/'+b.t+' réussites</div></div></div>';}).join("");
  var corr=EXAM.map(function(q,i){
    var ok=_correct(q,EXAM_ANS[i]);
    var bonne=q.type==="qcm"?esc(q.options[q.answer]):q.type==="vf"?(q.answer?"Vrai":"Faux"):esc(q.answer.join(" / "));
    var ta; if(EXAM_ANS[i]==null) ta="(pas de réponse)"; else if(q.type==="qcm") ta=esc(q.options[EXAM_ANS[i]]); else if(q.type==="vf") ta=(EXAM_ANS[i]?"Vrai":"Faux"); else ta=esc(EXAM_ANS[i]);
    return '<div class="quest" style="align-items:flex-start"><div class="qix">'+(ok?"✅":"❌")+'</div><div class="qmeta"><div class="qt" style="font-size:15px">'+esc(q.q)+'</div><div class="small" style="color:'+(ok?"#6b6b8a":"#dc2626")+'">Ta réponse : '+ta+'</div>'+(ok?'':'<div class="small" style="color:#16a34a">Bonne réponse : '+bonne+'</div>')+'<div class="small muted">'+esc(q.explain||"")+'</div></div></div>';
  }).join("");
  app.innerHTML='<div class="card center"><div style="font-size:50px" class="pop">'+(admis?"🎓":"📚")+'</div><h1>'+note+'/20</h1><h3 style="margin:2px 0">'+mention+'</h3>'
    +'<p class="muted small">Tu as '+correct+' bonnes réponses sur '+n+'. '+(admis?"Bravo, tu es sur la bonne voie pour le Brevet !":"Chaque essai te rapproche du but. Continue les quêtes et retente !")+'</p>'
    +'<div class="quests" style="margin-top:12px;text-align:left">'+subRows+'</div>'
    +'<div class="row" style="justify-content:center;margin-top:14px"><button class="btn" id="againEx">↻ Refaire un Brevet blanc</button><button class="btn ghost" id="toMapEx">🗺️ Carte</button></div></div>'
    +'<div class="card"><div class="section-title">📝 La correction</div><div class="quests" style="text-align:left">'+corr+'</div></div>';
  if(admis) toast("🎓 Brevet blanc réussi : "+note+"/20 !", true);
  document.getElementById("againEx").onclick=renderBrevetIntro;
  document.getElementById("toMapEx").onclick=renderMap;
  renderStats();
}

function playQuest(l){
  let i=0, right=0;
  const total=l.questions.length;
  function step(){
    if(i>=total){ finish(); return; }
    const q=l.questions[i];
    renderSingleQuestion({
      header:`${subjectById(l.subjectId).icon} ${l.title}`,
      sub:`Question ${i+1} sur ${total}`,
      progress: Math.round(100*i/total),
      question:q,
      onAnswer:(correct)=>{ if(correct){ right++; addXP(10,"+10 XP"); } },
      onNext:()=>{ i++; step(); },
      lastLabel:(i===total-1)?"Terminer la quête 🏆":"Question suivante →"
    });
  }
  function finish(){
    const ratio=right/total;
    const stars = ratio>=1?3 : ratio>=0.7?2 : ratio>0?1:0;
    const prev = STATE.scores[l.id];
    const isNew = !prev || prev.stars===0;
    const best = Math.max(prev?prev.stars:0, stars);
    STATE.scores[l.id]={stars, best, right, total};
    // récompenses
    let gainXp = right*2 + (stars===3?20:stars===2?10:0);
    let gainCr = stars*5 + (isNew?5:0);
    STATE.crystals += gainCr;
    touchStreak();
    addXP(gainXp, null, true);
    checkBadges();
    save(); renderStats();

    const av=AVATARS.find(a=>a.id===STATE.avatar);
    const msg = stars===3?"Parfait ! Sans-faute ! 🌟" : stars===2?"Très bien joué ! 👏" : stars===1?"Bien, tu progresses ! 💪":"Ce n'est pas grave, on réessaie ensemble 🤝";
    app.innerHTML=`
      <div class="card center">
        <div class="pop" style="font-size:60px">${av?av.face:"🧙‍♀️"}</div>
        <h1>Quête terminée !</h1>
        <div class="stars pop" style="font-size:40px;color:var(--gold)">${"★".repeat(stars)}${"☆".repeat(3-stars)}</div>
        <p style="font-size:19px;font-weight:700">${msg}</p>
        <p class="muted">Tu as réussi <b>${right}/${total}</b> questions.</p>
        <div class="row" style="justify-content:center;margin:10px 0 4px">
          <span class="chip">⚡ +${gainXp} XP</span>
          <span class="chip">💎 +${gainCr} cristaux</span>
        </div>
        <div class="row" style="justify-content:center;margin-top:18px">
          <button class="btn" id="again">↺ Refaire</button>
          <button class="btn" id="next">Quête suivante / Carte →</button>
        </div>
      </div>`;
    document.getElementById("again").onclick=()=>playQuest(l);
    document.getElementById("next").onclick=()=>renderRegion(l.subjectId);
  }
  step();
}

/* ---- Rendu générique d'une question (réutilisé par diag + quêtes) ---- */
function renderSingleQuestion(cfg){
  const q=cfg.question;
  let answered=false;
  const progBar = (cfg.progress!=null)? `<div class="progress-quest"><i style="width:${cfg.progress}%"></i></div>`:"";
  let body="";
  if(q.type==="qcm"){
    body=`<div class="options">`+q.options.map((o,idx)=>`<button class="opt" data-i="${idx}">${o}</button>`).join("")+`</div>`;
  } else if(q.type==="vf"){
    body=`<div class="options">
      <button class="opt" data-i="true">✅ Vrai</button>
      <button class="opt" data-i="false">❌ Faux</button></div>`;
  } else if(q.type==="saisie"){
    body=`<div class="row"><input class="text" id="saisie" placeholder="Tape ta réponse ici" autocomplete="off"/>
          <button class="btn" id="valid">Valider</button></div>`;
  }
  app.innerHTML=`
   <div class="card">
     <div class="row"><div class="small muted">${cfg.header}</div><div class="spacer"></div>
       <div class="pill">${cfg.sub}</div></div>
     ${progBar}
     <div class="qtext">${q.q}</div>
     <div class="qbox">${body}</div>
     <div class="feedback" id="fb"></div>
     <div class="center" id="nextWrap" style="margin-top:16px"></div>
   </div>`;

  const fb=document.getElementById("fb");
  function reveal(correct){
    if(answered) return; answered=true;
    if(correct){
      fb.className="feedback ok";
      fb.innerHTML=`<span class="lab">✅ Bravo !</span>${q.explain||""}`;
    }else{
      fb.className="feedback no";
      fb.innerHTML=`<span class="lab">🤝 Presque ! Regarde :</span>${q.explain||""}`;
    }
    cfg.onAnswer(correct);
    save();
    const nw=document.getElementById("nextWrap");
    nw.innerHTML=`<button class="btn big" id="nextBtn">${cfg.lastLabel||"Suivant →"}</button>`;
    document.getElementById("nextBtn").onclick=cfg.onNext;
  }

  if(q.type==="qcm"){
    app.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        const idx=parseInt(btn.dataset.i,10);
        const correct = idx===q.answer;
        app.querySelectorAll(".opt").forEach((b,bi)=>{
          b.disabled=true;
          if(bi===q.answer) b.classList.add("correct");
          else if(bi===idx) b.classList.add("wrong");
        });
        reveal(correct);
      };
    });
  } else if(q.type==="vf"){
    app.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        const val = btn.dataset.i==="true";
        const correct = val===q.answer;
        app.querySelectorAll(".opt").forEach(b=>{
          b.disabled=true;
          const bv=b.dataset.i==="true";
          if(bv===q.answer) b.classList.add("correct");
          else if(bv===val) b.classList.add("wrong");
        });
        reveal(correct);
      };
    });
  } else if(q.type==="saisie"){
    const inp=document.getElementById("saisie");
    const norm=s=>String(s).trim().toLowerCase().replace(/\s+/g,"").replace(",",".");
    function validate(){
      const user=norm(inp.value);
      if(user==="") return;
      const ok = q.answer.map(norm).includes(user);
      inp.disabled=true; document.getElementById("valid").disabled=true;
      reveal(ok);
    }
    document.getElementById("valid").onclick=validate;
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter") validate(); });
    inp.focus();
  }
}

/* ---- XP / niveau ---- */
function addXP(amount, flash, silent){
  const before=levelInfo(STATE.xp).level;
  STATE.xp += amount;
  const after=levelInfo(STATE.xp).level;
  renderStats();
  if(flash && !silent) toast(`⚡ ${flash}`);
  if(after>before){ setTimeout(()=>toast(`🎉 Niveau ${after} atteint, ${STATE.name} !`, true), 400); }
}

/* ---- Badges ---- */
function checkBadges(){
  BADGES.forEach(b=>{
    if(!STATE.badges.includes(b.id) && b.test(STATE)){
      STATE.badges.push(b.id);
      setTimeout(()=>toast(`${b.icon} Badge débloqué : ${b.nm} !`, true), 700);
    }
  });
}
function renderBadges(){
  const cells=BADGES.map(b=>{
    const got=STATE.badges.includes(b.id);
    return `<div class="badge ${got?'':'lock'}"><div class="bic">${got?b.icon:"🔒"}</div>
      <div class="bn">${b.nm}</div></div>`;
  }).join("");
  app.innerHTML=`
    <div class="card">
      <div class="row"><h2>🏅 Mes badges</h2><div class="spacer"></div>
        <button class="btn ghost" id="back">← Carte</button></div>
      <p class="muted small">Tu as débloqué ${STATE.badges.length} badge(s) sur ${BADGES.length}. Continue d'explorer !</p>
      <div class="badges" style="margin-top:12px">${cells}</div>
    </div>`;
  document.getElementById("back").onclick=renderMap;
}

/* ---- Boot ---- */
function boot(){
  let active="";
  try{ active = localStorage.getItem(ACTIVE_KEY) || ""; }catch(e){}
  if(active && profileById(active)){
    enterProfile(active);
    goAfterLogin();
  } else {
    logoutProfile();
    renderStats();
    renderLanding();
  }
}

document.getElementById("resetBtn").onclick=()=>{
  if(!ACTIVE){ toast("Crée d'abord un compte."); return; }
  if(confirm("Réinitialiser la progression de ce profil ? (Le compte est conservé.)")){
    const p=profileById(ACTIVE);
    STATE=defaultState(); STATE.setup=true;
    if(p){ STATE.name=p.name; STATE.avatar=p.avatar; }
    save(); boot();
  }
};
document.getElementById("calmeBtn").onclick=()=>{
  document.body.classList.toggle("calme");
  toast(document.body.classList.contains("calme")?"🌙 Mode calme activé":"✨ Animations réactivées");
};

boot();
</script>
