<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Royaume du Savoir — Académie des Mages</title>
<style>
  :root{
    --bg:#1a1633;        /* nuit profonde, violet */
    --bg2:#241d4a;
    --panel:#2c2456;
    --panel2:#352b66;
    --ink:#f3eefc;
    --muted:#b9aee0;
    --gold:#f2c14e;
    --gold-soft:#ffe5a0;
    --teal:#46c8c0;
    --rose:#e87fb0;
    --green:#6fdc8c;
    --red-soft:#ff9d9d;
    --border:#473a85;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%, #3a2f73 0%, var(--bg) 55%);
    color:var(--ink);
    min-height:100vh;
    line-height:1.5;
  }
  body.calme *{animation:none !important; transition:none !important}
  .wrap{max-width:1040px;margin:0 auto;padding:18px}

  /* Top bar */
  .topbar{
    display:flex;align-items:center;gap:14px;
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 16px;box-shadow:var(--shadow);position:sticky;top:10px;z-index:50;
    flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .brand .logo{width:34px;height:34px;display:grid;place-items:center;
    background:radial-gradient(circle at 30% 30%,#6c5cd6,#3a2f73);border-radius:10px;font-size:20px}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
  .chip{display:flex;align-items:center;gap:6px;background:var(--bg2);
    border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-weight:700;font-size:14px}
  .chip .ic{font-size:16px}
  .lvlbar{height:8px;background:var(--bg);border-radius:999px;overflow:hidden;width:120px;border:1px solid var(--border)}
  .lvlbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));width:0%}

  button{font-family:inherit;cursor:pointer}
  .btn{
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    color:#3a2a05;border:none;border-radius:12px;padding:12px 18px;font-weight:800;font-size:16px;
    box-shadow:0 4px 0 #c79a2e;transition:transform .08s ease, box-shadow .08s ease;
  }
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #c79a2e}
  .btn.ghost{background:var(--panel2);color:var(--ink);box-shadow:0 4px 0 #1c1740;border:1px solid var(--border)}
  .btn.big{font-size:18px;padding:14px 26px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);
    border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-top:18px}
  h1,h2,h3{margin:0 0 10px}
  h1{font-size:30px}
  .muted{color:var(--muted)}
  .center{text-align:center}

  /* Avatar choice */
  .grid{display:grid;gap:14px}
  .avatars{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .avatar{background:var(--bg2);border:2px solid var(--border);border-radius:16px;padding:16px;text-align:center;cursor:pointer;transition:border-color .12s}
  .avatar:hover{border-color:var(--gold)}
  .avatar.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(242,193,78,.25)}
  .avatar .face{font-size:46px}
  .avatar .nm{font-weight:700;margin-top:6px}
  input.text{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);
    background:var(--bg);color:var(--ink);font-size:16px}

  /* Map / regions */
  .regions{grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
  .region{position:relative;border-radius:16px;padding:18px;border:1px solid var(--border);
    background:var(--bg2);cursor:pointer;overflow:hidden;transition:transform .12s}
  .region:hover{transform:translateY(-3px)}
  .region .rico{font-size:40px}
  .region h3{margin:8px 0 4px}
  .region .prog{height:8px;background:var(--bg);border-radius:999px;margin-top:12px;overflow:hidden;border:1px solid var(--border)}
  .region .prog > i{display:block;height:100%;width:0%}
  .region .pct{font-size:13px;margin-top:6px;font-weight:700}

  /* Quest list */
  .quests{display:flex;flex-direction:column;gap:10px}
  .quest{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);
    border-radius:14px;padding:14px 16px}
  .quest .qix{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:800;
    background:var(--panel2);border:1px solid var(--border);flex:0 0 auto}
  .quest .qmeta{flex:1}
  .quest .qmeta .qt{font-weight:700}
  .quest .stars{letter-spacing:2px;color:var(--gold);font-size:16px}
  .quest.locked{opacity:.55}
  .quest.done .qix{background:linear-gradient(180deg,var(--green),#3aa85e);color:#06351a;border-color:#3aa85e}

  /* Lesson */
  .lesson .cours{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin:12px 0}
  .lesson .cours b{color:var(--gold-soft)}
  .qbox{margin-top:8px}
  .qtext{font-size:19px;font-weight:700;margin:14px 0}
  .options{display:grid;gap:10px}
  .opt{text-align:left;background:var(--bg2);border:2px solid var(--border);border-radius:12px;
    padding:13px 16px;font-size:16px;color:var(--ink);transition:border-color .1s, background .1s}
  .opt:hover{border-color:var(--teal)}
  .opt.correct{border-color:var(--green);background:rgba(111,220,140,.16)}
  .opt.wrong{border-color:var(--red-soft);background:rgba(255,157,157,.14)}
  .opt:disabled{cursor:default}
  .feedback{margin-top:14px;border-radius:12px;padding:14px 16px;font-weight:600;display:none}
  .feedback.ok{display:block;background:rgba(111,220,140,.14);border:1px solid var(--green)}
  .feedback.no{display:block;background:rgba(255,157,157,.12);border:1px solid var(--red-soft)}
  .feedback .lab{font-weight:800;display:block;margin-bottom:4px}
  .progress-quest{height:10px;background:var(--bg);border-radius:999px;overflow:hidden;border:1px solid var(--border);margin:10px 0 4px}
  .progress-quest > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));width:0%;transition:width .3s}

  /* Badges */
  .badges{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
  .badge{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
  .badge.lock{opacity:.4}
  .badge .bic{font-size:34px}
  .badge .bn{font-weight:700;margin-top:6px;font-size:14px}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:linear-gradient(180deg,#3a2f73,#241d4a);border:1px solid var(--gold);
    border-radius:14px;padding:14px 22px;font-weight:800;box-shadow:var(--shadow);opacity:0;
    transition:opacity .25s, transform .25s;z-index:200;display:flex;align-items:center;gap:10px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .spacer{flex:1}
  .small{font-size:13px}
  .pill{display:inline-block;background:var(--bg2);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700;margin-right:6px}
  .hide{display:none !important}
  a.link{color:var(--teal);cursor:pointer;text-decoration:underline}
  .footnote{margin-top:24px;font-size:12px;color:var(--muted);text-align:center}
  .levelup{font-size:22px}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop .35s ease}

  /* Royaume */
  .kingdom{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--border);margin-top:14px;
    background:linear-gradient(180deg,#3a2f73 0%, #5a4aa0 40%, #7c6bbf 60%, #6a9a5a 60%, #4f7d44 100%);
    min-height:230px}
  .kingdom .sun{position:absolute;top:16px;right:24px;font-size:38px;filter:drop-shadow(0 0 10px rgba(255,220,120,.6))}
  .kingdom .ground{position:absolute;left:0;right:0;bottom:0;height:40%;
    background:linear-gradient(180deg,#5d8a4f,#3f6b39)}
  .kingdom .scene{position:absolute;left:0;right:0;bottom:8%;display:flex;align-items:flex-end;
    justify-content:center;gap:6px;flex-wrap:wrap;padding:0 14px}
  .kingdom .bld{font-size:40px;line-height:1;filter:drop-shadow(0 4px 4px rgba(0,0,0,.35))}
  .kingdom .bld.ghost{opacity:.18;filter:grayscale(1)}
  .kingdom .castle{font-size:60px}
  .kingdom .kcount{position:absolute;top:12px;left:16px;background:rgba(20,16,45,.6);
    border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-weight:700;font-size:14px}
  .shop{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:16px}
  .shopitem{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
  .shopitem .si{font-size:34px}
  .shopitem .snm{font-weight:700;margin:6px 0 2px}
  .shopitem.built{border-color:var(--green)}
  .shopitem .cost{font-weight:800;color:var(--gold);margin:6px 0}

  /* Cartes mentales & vidéos */
  a.btn{display:inline-block;text-decoration:none;text-align:center}
  .mindmap-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:10px;margin-top:8px}
  .mindmap-box svg{display:block;margin:0 auto}
  .res-title{margin-top:18px;display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800}
  .video-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:14px;overflow:hidden;
    border:1px solid var(--border);margin-top:8px;background:#000}
  .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

  /* Landing page */
  .hero{background:radial-gradient(700px 320px at 50% -25%, rgba(108,92,214,.55), transparent),
    linear-gradient(180deg,var(--panel),var(--panel2));}
  .hero .tag{display:inline-block;background:var(--bg2);border:1px solid var(--border);border-radius:999px;
    padding:5px 14px;font-weight:700;font-size:13px;color:var(--gold-soft);margin-bottom:10px}
  .section-title{font-size:23px;font-weight:800;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:14px}
  .step{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
  .step .num{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;margin:0 auto 8px;
    font-weight:800;background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2a05}
  .step .si{font-size:30px}
  .step .st{font-weight:700;margin-top:4px}
  .feat{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:14px}
  .feat .f{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px}
  .feat .f .fi{font-size:26px}
  .feat .f .ft{font-weight:700;margin:4px 0 2px}
  .demo-q{max-width:540px;margin:0 auto}
  .parent-note{background:var(--bg2);border:1px dashed var(--border);border-radius:14px;padding:16px;margin-top:14px}
.world-opt{opacity:.55} .world-opt.sel{opacity:1;box-shadow:0 0 0 3px #22c55e inset}
.ex-opt.sel{outline:3px solid #16a34a;outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar" id="topbar">
    <div class="brand"><span class="logo">🪄</span><span>Le Royaume du Savoir</span></div>
    <div class="stats" id="stats"></div>
  </div>
  <div id="app"></div>
  <div class="footnote">
    Programme du Cycle 4 (5ᵉ → 4ᵉ → 3ᵉ) de l'Éducation nationale française · Prototype ·
    <a class="link" id="resetBtn">Réinitialiser la progression</a> ·
    <a class="link" id="calmeBtn">Mode calme (réduire animations)</a>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   LE ROYAUME DU SAVOIR — prototype d'apprentissage gamifié (Brevet / Cycle 4)
   Conçu pour tous les enfants du collège (dont les enfants autistes) : structure prévisible, renforcement
   positif, thème fantastique, une tâche à la fois, encouragements constants.
   ========================================================================= */

/* ----------------------------- CONTENU --------------------------------- */
/* Chaque matière = une "région" du royaume. Chaque leçon = une "quête".
   Types de questions : 'qcm' (un seul choix), 'vf' (vrai/faux),
   'saisie' (réponse à taper, plusieurs formes acceptées).
   Le contenu suit le programme de 5e (Cycle 4) et est facile à étendre. */

const CONTENT = {
  subjects: [
    {
      id:"maths", name:"Mathématiques", region:"Les Tours de Calcul", icon:"🗼", color:"#46c8c0",
      lessons:[
        {
          id:"m9", niveau:"6e", title:"Les nombres décimaux",
          cours:"Un <b>nombre décimal</b> a une partie entière et une partie après la <b>virgule</b> (ex : 3,25). " +
                "Le 1er chiffre après la virgule est celui des <b>dixièmes</b>, le 2e celui des <b>centièmes</b>. " +
                "Pour <b>comparer</b>, on regarde d'abord la partie entière, puis les dixièmes. 3,5 = 3,50.",
          questions:[
            {type:"qcm", q:"Dans 3,25, le chiffre 2 représente :", options:["les dixièmes","les centièmes","les unités","les dizaines"], answer:0, explain:"1er chiffre après la virgule = dixièmes : 2 dixièmes."},
            {type:"qcm", q:"Quel nombre est le plus grand ?", options:["3,5","3,45","3,09","3,4"], answer:0, explain:"3,5 = 3,50 : le plus grand (5 dixièmes)."},
            {type:"saisie", q:"Combien fait 2,5 + 1,75 ? (avec une virgule)", answer:["4,25"], explain:"On aligne les virgules : 2,50 + 1,75 = 4,25."},
            {type:"vf", q:"Les nombres 3,5 et 3,50 sont égaux.", answer:true, explain:"Un zéro après le dernier décimal ne change rien."},
            {type:"qcm", q:"L'écriture décimale de 7/10 est :", options:["0,7","7,0","0,07","1,7"], answer:0, explain:"7 dixièmes = 0,7."}
          ]
        },
        {
          id:"m10", niveau:"6e", title:"Périmètre et aire du rectangle",
          cours:"Le <b>périmètre</b> est la longueur du tour. Rectangle : périmètre = <b>2 × (Longueur + largeur)</b>. " +
                "L'<b>aire</b> est la surface. Rectangle : aire = <b>Longueur × largeur</b>. Périmètre en cm, aire en <b>cm²</b>.",
          questions:[
            {type:"saisie", q:"Rectangle 5 cm sur 3 cm : périmètre (en cm) ?", answer:["16","16 cm"], explain:"2 × (5 + 3) = 16 cm."},
            {type:"saisie", q:"Rectangle 5 cm sur 3 cm : aire (en cm²) ?", answer:["15","15 cm²"], explain:"5 × 3 = 15 cm²."},
            {type:"qcm", q:"Une aire se mesure en :", options:["cm","cm²","litres","kg"], answer:1, explain:"Une surface : en cm²."},
            {type:"vf", q:"Le périmètre d'un carré de côté 4 cm vaut 16 cm.", answer:true, explain:"4 × 4 = 16 cm."},
            {type:"qcm", q:"Aire d'un carré de côté 6 cm ?", options:["12 cm²","24 cm²","36 cm²","18 cm²"], answer:2, explain:"6 × 6 = 36 cm²."}
          ]
        },
        {
          id:"m1", title:"Les nombres relatifs",
          cours:"Un <b>nombre relatif</b> peut être positif (ex : +5) ou négatif (ex : -3). " +
                "Pour <b>additionner</b> deux nombres de même signe, on additionne et on garde le signe. " +
                "De signes différents : on soustrait et on garde le signe du plus grand. " +
                "Soustraire revient à ajouter l'opposé : 2 − (−3) = 2 + 3 = 5.",
          questions:[
            {type:"qcm", q:"Combien fait (−7) + (−5) ?", options:["−12","−2","+12","+2"], answer:0,
             explain:"Même signe (négatifs) : on additionne 7+5=12 et on garde le signe −. Donc −12."},
            {type:"qcm", q:"Combien fait (−8) + 3 ?", options:["−11","−5","+5","+11"], answer:1,
             explain:"Signes différents : 8−3=5, on garde le signe du plus grand (8, négatif). Donc −5."},
            {type:"saisie", q:"Calcule : 4 − (−6) =", answer:["10","+10"],
             explain:"Soustraire un négatif = additionner : 4 + 6 = 10."},
            {type:"qcm", q:"Quel est l'opposé de −9 ?", options:["+9","−9","0","1/9"], answer:0,
             explain:"L'opposé de −9 est +9 (ils sont symétriques par rapport à 0)."},
            {type:"vf", q:"Sur une droite graduée, −5 est situé à gauche de −2.", answer:true,
             explain:"Plus un négatif est grand en valeur, plus il est à gauche : −5 < −2."}
          ]
        },
        {
          id:"m2", title:"Les fractions",
          cours:"Pour <b>additionner</b> des fractions, il faut le <b>même dénominateur</b>. " +
                "Ex : 1/2 + 1/3 → on met sur 6 : 3/6 + 2/6 = 5/6. " +
                "Prendre une fraction « de » un nombre = multiplier : 3/4 de 20 = 3×20/4 = 15.",
          questions:[
            {type:"qcm", q:"Combien fait 1/2 + 1/3 ?", options:["2/5","5/6","1/6","2/6"], answer:1,
             explain:"On met sur 6 : 3/6 + 2/6 = 5/6."},
            {type:"saisie", q:"Combien vaut 3/4 de 20 ? (réponds par un nombre)", answer:["15"],
             explain:"3/4 de 20 = 3 × 20 ÷ 4 = 60 ÷ 4 = 15."},
            {type:"qcm", q:"Quelle fraction est égale à 1/2 ?", options:["3/5","4/8","2/5","5/9"], answer:1,
             explain:"4/8 se simplifie en 1/2 (on divise haut et bas par 4)."},
            {type:"saisie", q:"Simplifie 6/9 (écris sous la forme a/b la plus simple).", answer:["2/3"],
             explain:"On divise par 3 : 6÷3 / 9÷3 = 2/3."},
            {type:"qcm", q:"Combien fait 5/6 − 1/6 ?", options:["4/6","4/0","6/6","4/12"], answer:0,
             explain:"Même dénominateur : 5−1 = 4, donc 4/6 (que l'on peut simplifier en 2/3)."}
          ]
        },
        {
          id:"m3", title:"La proportionnalité & les pourcentages",
          cours:"Deux grandeurs sont <b>proportionnelles</b> si on passe de l'une à l'autre en multipliant " +
                "toujours par le même nombre (le coefficient). Un <b>pourcentage</b> : 25 % d'un nombre = " +
                "25/100 × ce nombre. Ex : 25 % de 80 = 20.",
          questions:[
            {type:"saisie", q:"Calcule 25 % de 80.", answer:["20"],
             explain:"25 % = 25/100 = 1/4. Donc 80 ÷ 4 = 20."},
            {type:"qcm", q:"3 stylos coûtent 6 €. Combien coûtent 5 stylos (même prix unitaire) ?",
             options:["9 €","10 €","11 €","12 €"], answer:1,
             explain:"1 stylo = 6 ÷ 3 = 2 €. Donc 5 × 2 = 10 €."},
            {type:"saisie", q:"Calcule 10 % de 250.", answer:["25"],
             explain:"10 % = diviser par 10 : 250 ÷ 10 = 25."},
            {type:"qcm", q:"Un t-shirt à 40 € baisse de 50 %. Nouveau prix ?",
             options:["10 €","20 €","30 €","35 €"], answer:1,
             explain:"50 % de 40 = 20 € de réduction. 40 − 20 = 20 €."},
            {type:"vf", q:"Dans un tableau de proportionnalité, on passe d'une ligne à l'autre en multipliant par un même coefficient.",
             answer:true, explain:"C'est exactement la définition de la proportionnalité."}
          ]
        },
        {
          id:"m4", title:"Géométrie : angles & triangles",
          cours:"Dans tout triangle, la <b>somme des angles vaut 180°</b>. " +
                "L'<b>aire d'un triangle</b> = (base × hauteur) ÷ 2. " +
                "Deux angles <b>complémentaires</b> font 90°, deux angles <b>supplémentaires</b> font 180°.",
          questions:[
            {type:"saisie", q:"Un triangle a deux angles de 60° et 70°. Quel est le 3ᵉ angle (en degrés) ?",
             answer:["50","50°"], explain:"180 − 60 − 70 = 50°."},
            {type:"qcm", q:"Aire d'un triangle de base 8 cm et hauteur 5 cm ?",
             options:["13 cm²","20 cm²","40 cm²","26 cm²"], answer:1,
             explain:"(8 × 5) ÷ 2 = 40 ÷ 2 = 20 cm²."},
            {type:"qcm", q:"Deux angles supplémentaires ont pour somme :",
             options:["90°","180°","360°","45°"], answer:1,
             explain:"Supplémentaires = 180°. (Complémentaires = 90°.)"},
            {type:"saisie", q:"Un angle mesure 35°. Quel est son complément (en degrés) ?",
             answer:["55","55°"], explain:"Complémentaires font 90° : 90 − 35 = 55°."},
            {type:"vf", q:"Un triangle peut avoir deux angles droits.", answer:false,
             explain:"Non : deux angles droits feraient déjà 180°, il ne resterait rien pour le 3ᵉ."}
          ]
        },
        {
          id:"m5", niveau:"4e", title:"Développer & réduire (calcul littéral)",
          cours:"La <b>distributivité</b> : k(a + b) = k×a + k×b. Ex : 3(x + 4) = 3x + 12. " +
                "<b>Réduire</b>, c'est regrouper les termes semblables : 3x + 2x = 5x.",
          questions:[
            {type:"qcm", q:"Développe 3(x + 4).", options:["3x + 4","3x + 12","x + 12","7x"], answer:1,
             explain:"3×x + 3×4 = 3x + 12."},

,5vw,34px);color:var(--bleu);margin:10px 0 18px;text-shadow:1px 1px 0 #fff;}\n\n  /* Grille menu */\n  .grille{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}\n  .tuile{\n    border:none;border-radius:28px;padding:28px 16px;cursor:pointer;color:#fff;\n    font-size:clamp(20px,4vw,26px);font-weight:bold;font-family:inherit;\n    display:flex;flex-direction:column;align-items:center;gap:10px;\n    box-shadow:0 8px 0 rgba(0,0,0,.18);transition:transform .08s;\n  }\n  .tuile:active{transform:translateY(5px);box-shadow:0 3px 0 rgba(0,0,0,.18);}\n  .tuile .emo{font-size:54px;}\n  .t-lecture{background:linear-gradient(160deg,#fb7185,#e11d48);}\n  .t-calcul{background:linear-gradient(160deg,#60a5fa,#2563eb);}\n  .t-langues{background:linear-gradient(160deg,#34d399,#059669);}\n  .t-histoire{background:linear-gradient(160deg,#fbbf24,#d97706);}\n\n  /* Sous-menu boutons */\n  .sous-menu{display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;}\n  .gros-btn{\n    border:none;border-radius:22px;padding:20px;font-size:22px;font-weight:bold;\n    font-family:inherit;cursor:pointer;color:#fff;display:flex;align-items:center;gap:14px;\n    box-shadow:0 6px 0 rgba(0,0,0,.18);text-align:left;\n  }\n  .gros-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.18);}\n  .gros-btn .emo{font-size:38px;}\n\n  /* Zone de jeu */\n  .carte-jeu{background:var(--carte);border-radius:28px;padding:26px 20px;box-shadow:0 10px 0 #e5d4b8;text-align:center;max-width:620px;margin:0 auto;}\n  .consigne{font-size:22px;color:#6b7280;margin-bottom:6px;}\n  .question{font-size:clamp(40px,11vw,80px);font-weight:bold;margin:14px 0;color:var(--texte);line-height:1.1;}\n  .question.petit{font-size:clamp(24px,6vw,40px);}\n  .emoji-rang{font-size:clamp(30px,8vw,52px);line-height:1.3;word-spacing:6px;margin:10px 0;}\n\n  .choix{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px;}\n  .choix.trois{grid-template-columns:repeat(3,1fr);}\n  .choix button{\n    border:none;border-radius:20px;padding:22px 10px;font-size:30px;font-weight:bold;\n    font-family:inherit;cursor:pointer;background:#eef2ff;color:var(--texte);\n    box-shadow:0 5px 0 #c7d2fe;transition:transform .06s;\n  }\n  .choix button:active{transform:translateY(3px);box-shadow:0 2px 0 #c7d2fe;}\n  .choix button.bon{background:var(--vert);color:#fff;box-shadow:0 5px 0 #15803d;}\n  .choix button.faux{background:var(--rouge);color:#fff;box-shadow:0 5px 0 #991b1b;}\n  .choix button:disabled{cursor:default;}\n\n  .btn-son{background:var(--jaune);border:none;border-radius:999px;padding:14px 22px;font-size:22px;font-weight:bold;font-family:inherit;cursor:pointer;box-shadow:0 5px 0 #ca8a04;margin:6px;}\n  .btn-son:active{transform:translateY(3px);box-shadow:0 2px 0 #ca8a04;}\n\n  .feedback{font-size:30px;font-weight:bold;min-height:42px;margin-top:16px;}\n  .feedback.ok{color:var(--vert);}\n  .feedback.non{color:var(--orange);}\n\n  .btn-suite{background:var(--violet);color:#fff;border:none;border-radius:20px;padding:16px 32px;font-size:22px;font-weight:bold;font-family:inherit;cursor:pointer;box-shadow:0 6px 0 #6d28d9;margin-top:18px;}\n  .btn-suite:active{transform:translateY(4px);box-shadow:0 2px 0 #6d28d9;}\n\n  /* Carte leçon / langue */\n  .mot-img{font-size:96px;margin:6px 0;}\n  .mot-fr{font-size:30px;color:#6b7280;}\n  .mot-cible{font-size:clamp(36px,9vw,56px);font-weight:bold;color:var(--vert);margin:6px 0;}\n  .drapeaux{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}\n  .drapeaux button{font-size:30px;border:none;background:#fff;border-radius:14px;padding:8px 12px;cursor:pointer;box-shadow:0 4px 0 #e5e7eb;}\n  .drapeaux button.on{background:var(--jaune);box-shadow:0 4px 0 #ca8a04;}\n\n  .lecon{text-align:left;font-size:20px;line-height:1.6;color:#374151;}\n  .lecon h3{font-size:26px;color:var(--orange);margin-bottom:10px;text-align:center;}\n  .lecon .ill{font-size:70px;text-align:center;display:block;margin:8px 0;}\n\n  .barre{display:flex;justify-content:center;gap:6px;margin-top:14px;flex-wrap:wrap;}\n  .pastille{width:16px;height:16px;border-radius:50%;background:#e5e7eb;}\n  .pastille.faite{background:var(--vert);}\n\n  /* clavier numérique (mode grands) */\n  .touche{border:none;border-radius:16px;padding:18px;font-size:28px;font-weight:bold;font-family:inherit;background:#eef2ff;color:var(--texte);box-shadow:0 4px 0 #c7d2fe;cursor:pointer;}\n  .touche:active{transform:translateY(2px);box-shadow:0 2px 0 #c7d2fe;}\n  .touche:disabled{opacity:.45;}\n  .saisie-box{font-size:clamp(40px,11vw,68px);font-weight:bold;min-height:1.2em;color:var(--bleu);letter-spacing:2px;}\n  .niveau-badge{display:inline-block;background:rgba(255,255,255,.3);border-radius:999px;padding:2px 10px;font-size:14px;margin-left:6px;}\n\n  .cacher{display:none;}\n  .pop{animation:pop .3s;}\n  @keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}\n  .confetti{position:fixed;top:-20px;font-size:26px;animation:fall 2.2s linear forwards;z-index:50;pointer-events:none;}\n  @keyframes fall{to{transform:translateY(110vh) rotate(420deg);opacity:.4;}}\n\n  footer{text-align:center;color:#9ca3af;font-size:14px;margin-top:26px;}\n  @media(max-width:520px){ .grille{gap:12px;} .tuile{padding:20px 10px;} }\n</style>\n</head>\n<body>\n<div class=\"wrap\">\n  <header>\n    <div class=\"logo\">🎒 Les Petits Malins</div>\n    <div style=\"display:flex;gap:10px;align-items:center;\">\n      <div class=\"age-toggle\" id=\"ageToggle\">\n        <button data-age=\"petit\" class=\"on\">🐣 Petits</button>\n        <button data-age=\"grand\">🦉 Grands</button>\n      </div>\n      <div class=\"score-box\">⭐ <span id=\"score\">0</span></div>\n    </div>\n  </header>\n\n  <div id=\"app\"></div>\n\n  <footer>Fait avec ❤️ pour les enfants de Florence · prononciation par synthèse vocale</footer>\n</div>\n\n<script>\n/* ===================== ÉTAT ===================== */\nconst state = {\n  age: 'petit',          // 'petit' (3-6) ou 'grand' (6-9)\n  score: 0,\n  vue: 'accueil',\n};\ntry{ const s = localStorage.getItem('pm_score'); if(s) state.score = +s; }catch(e){}\ntry{ const a = localStorage.getItem('pm_age'); if(a) state.age = a; }catch(e){}\n\nconst app = document.getElementById('app');\nconst $score = document.getElementById('score');\nfunction rafraichirScore(){ $score.textContent = state.score; try{localStorage.setItem('pm_score', state.score);}catch(e){} }\nrafraichirScore();\n\nfunction gagner(n){ state.score += n; rafraichirScore(); }\n\n/* Sélecteur d'âge */\ndocument.getElementById('ageToggle').addEventListener('click', e=>{\n  const b = e.target.closest('button'); if(!b) return;\n  state.age = b.dataset.age;\n  try{localStorage.setItem('pm_age', state.age);}catch(e){}\n  document.querySelectorAll('#ageToggle button').forEach(x=>x.classList.toggle('on', x.dataset.age===state.age));\n  vueAccueil(); // on revient à l'accueil pour proposer les bons niveaux\n});\n\n/* ===================== VOIX ===================== */\nfunction parler(texte, langue='fr-FR'){\n  try{\n    speechSynthesis.cancel();\n    const u = new SpeechSynthesisUtterance(texte);\n    u.lang = langue; u.rate = 0.9;\n    speechSynthesis.speak(u);\n  }catch(e){}\n}\n\n/* ===================== OUTILS ===================== */\nconst r = (n)=>Math.floor(Math.random()*n);\nconst choisir = (arr)=>arr[r(arr.length)];\nfunction melanger(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=r(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }\nfunction confettis(){\n  const emos=['🎉','⭐','🌟','🎈','✨','🥳'];\n  for(let i=0;i<18;i++){\n    const c=document.createElement('div'); c.className='confetti';\n    c.textContent=choisir(emos); c.style.left=r(100)+'vw'; c.style.animationDelay=(r(8)/10)+'s';\n    document.body.appendChild(c); setTimeout(()=>c.remove(),2500);\n  }\n}\nfunction bravo(){ confettis(); parler(choisir(['Bravo !','Super !','Génial !','Bien joué !'])); }\n\nfunction barreHTML(total, faites){\n  let h='<div class=\"barre\">';\n  for(let i=0;i<total;i++) h+=`<div class=\"pastille ${i<faites?'faite':''}\"></div>`;\n  return h+'</div>';\n}\n\n/* ===================== ACCUEIL ===================== */\nfunction vueAccueil(){\n  state.vue='accueil';\n  app.innerHTML = `\n    <h2 class=\"titre\">Choisis ton aventure !</h2>\n    <div class=\"grille\">\n      <button class=\"tuile t-lecture\" onclick=\"ouvrir('lecture')\"><span class=\"emo\">📖</span>Lecture</button>\n      <button class=\"tuile t-calcul\" onclick=\"ouvrir('calcul')\"><span class=\"emo\">🔢</span>Calcul</button>\n      <button class=\"tuile t-langues\" onclick=\"ouvrir('langues')\"><span class=\"emo\">🌍</span>Langues</button>\n      <button class=\"tuile t-histoire\" onclick=\"ouvrir('histoire')\"><span class=\"emo\">🏰</span>Histoire</button>\n    </div>`;\n}\n\nfunction entete(titre, retour='vueAccueil'){\n  return `<header style=\"margin-bottom:6px;\"><button class=\"btn-back\" onclick=\"${retour}()\">⬅ Retour</button>\n          <h2 class=\"titre\" style=\"margin:0;flex:1;\">${titre}</h2><div style=\"width:90px\"></div></header>`;\n}\n\nfunction ouvrir(mat){\n  if(mat==='lecture') menuLecture();\n  if(mat==='calcul') menuCalcul();\n  if(mat==='langues') menuLangues();\n  if(mat==='histoire') menuHistoire();\n}\n<\/script>\n\n<script>\n/* ====================================================================\n   MODULE LECTURE\n   ==================================================================== */\nconst ALPHABET = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\".split('');\nconst MOTS = [\n  {mot:'CHAT', img:'🐱'},{mot:'CHIEN', img:'🐶'},{mot:'POMME', img:'🍎'},\n  {mot:'SOLEIL', img:'☀️'},{mot:'LUNE', img:'🌙'},{mot:'FLEUR', img:'🌸'},\n  {mot:'MAISON', img:'🏠'},{mot:'VOITURE', img:'🚗'},{mot:'BALLON', img:'⚽'},\n  {mot:'POISSON', img:'🐟'},{mot:'GÂTEAU', img:'🎂'},{mot:'ÉTOILE', img:'⭐'},\n  {mot:'ARBRE', img:'🌳'},{mot:'OISEAU', img:'🐦'},{mot:'BANANE', img:'🍌'}\n];\nconst PHRASES = [\n  'Le chat dort sur le lit.',\n  'Maman fait un bon gâteau.',\n  'Le soleil brille très fort.',\n  'Mon chien court dans le jardin.',\n  'La fleur sent très bon.',\n  'Le poisson nage dans l\\'eau.'\n];\n\nfunction menuLecture(){\n  state.vue='lecture';\n  const grands = state.age==='grand';\n  app.innerHTML = entete('📖 Lecture') + `\n    <div class=\"sous-menu\">\n      <button class=\"gros-btn t-lecture\" onclick=\"bonus('lecture')\"><span class=\"emo\">🧠</span>Carte mentale & vidéos</button>\n      <button class=\"gros-btn t-lecture\" onclick=\"jeuLettres()\"><span class=\"emo\">🔤</span>Reconnaître les lettres</button>\n      <button class=\"gros-btn t-lecture\" onclick=\"jeuSons()\"><span class=\"emo\">🔊</span>Le son des lettres</button>\n      <button class=\"gros-btn t-lecture\" onclick=\"jeuMots()\"><span class=\"emo\">🖼️</span>Lire des mots</button>\n      ${grands?`<button class=\"gros-btn t-lecture\" onclick=\"jeuPhrases()\"><span class=\"emo\">📝</span>Remettre une phrase en ordre</button>\n      <button class=\"gros-btn t-lecture\" onclick=\"jeuComprehension()\"><span class=\"emo\">🧠</span>Lire et comprendre<span class=\"niveau-badge\">texte + questions</span></button>`:''}\n    </div>`;\n}\n\n/* Jeu : trouver la lettre qu'on entend */\nfunction jeuLettres(){\n  const bonne = choisir(ALPHABET);\n  let opts = new Set([bonne]);\n  while(opts.size<(state.age==='petit'?3:4)) opts.add(choisir(ALPHABET));\n  opts = melanger([...opts]);\n  parler('Trouve la lettre '+bonne);\n  app.innerHTML = entete('🔤 Les lettres','menuLecture') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Touche la lettre que tu entends</p>\n      <button class=\"btn-son\" onclick=\"parler('La lettre ${bonne}')\">🔊 Réécouter</button>\n      <div class=\"choix ${opts.length===3?'trois':''}\" id=\"zone\">\n        ${opts.map(l=>`<button onclick=\"repLettre(this,'${l}','${bonne}')\">${l}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n    </div>`;\n}\nfunction repLettre(btn, choix, bonne){\n  const fb=document.getElementById('fb');\n  if(choix===bonne){ btn.classList.add('bon'); fb.textContent='✅ Bravo !'; fb.className='feedback ok'; gagner(2); bravo();\n    document.querySelectorAll('#zone button').forEach(b=>b.disabled=true);\n    setTimeout(jeuLettres,1300);\n  }else{ btn.classList.add('faux'); fb.textContent='Essaie encore 🙂'; fb.className='feedback non'; }\n}\n\n/* Jeu : quel mot commence par ce son ? */\nfunction jeuSons(){\n  const cible = choisir(MOTS);\n  const lettre = cible.mot[0];\n  let autres = melanger(MOTS.filter(m=>m.mot[0]!==lettre)).slice(0,2);\n  const opts = melanger([cible,...autres]);\n  parler('Quel mot commence par le son '+lettre);\n  app.innerHTML = entete('🔊 Les sons','menuLecture') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Quel mot commence par...</p>\n      <div class=\"question\">${lettre}</div>\n      <button class=\"btn-son\" onclick=\"parler('Quel mot commence par ${lettre}')\">🔊 Réécouter</button>\n      <div class=\"choix trois\" id=\"zone\">\n        ${opts.map(m=>`<button style=\"font-size:46px\" onclick=\"repSon(this,'${m.mot[0]}','${lettre}','${m.mot}')\">${m.img}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n    </div>`;\n}\nfunction repSon(btn, prem, lettre, mot){\n  const fb=document.getElementById('fb');\n  if(prem===lettre){ btn.classList.add('bon'); fb.textContent='✅ '+mot+' !'; fb.className='feedback ok'; parler(mot); gagner(2); bravo();\n    document.querySelectorAll('#zone button').forEach(b=>b.disabled=true); setTimeout(jeuSons,1500);\n  }else{ btn.classList.add('faux'); fb.textContent='Non, écoute bien 👂'; fb.className='feedback non'; }\n}\n\n/* Jeu : associer image -> mot écrit */\nfunction jeuMots(){\n  const cible = choisir(MOTS);\n  let autres = melanger(MOTS.filter(m=>m.mot!==cible.mot)).slice(0, state.age==='petit'?2:3);\n  const opts = melanger([cible,...autres]);\n  parler(cible.mot);\n  app.innerHTML = entete('🖼️ Lire des mots','menuLecture') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Quel mot va avec l'image ?</p>\n      <div class=\"mot-img pop\">${cible.img}</div>\n      <button class=\"btn-son\" onclick=\"parler('${cible.mot}')\">🔊 Écouter le mot</button>\n      <div class=\"choix ${opts.length===3?'trois':''}\" id=\"zone\">\n        ${opts.map(m=>`<button style=\"font-size:24px\" onclick=\"repMot(this,'${m.mot}','${cible.mot}')\">${m.mot}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n    </div>`;\n}\nfunction repMot(btn, choix, bonne){\n  const fb=document.getElementById('fb');\n  if(choix===bonne){ btn.classList.add('bon'); fb.textContent='✅ Bravo !'; fb.className='feedback ok'; gagner(3); bravo();\n    document.querySelectorAll('#zone button').forEach(b=>b.disabled=true); setTimeout(jeuMots,1400);\n  }else{ btn.classList.add('faux'); fb.textContent='Regarde encore 👀'; fb.className='feedback non'; }\n}\n\n/* Jeu : remettre les mots d'une phrase dans l'ordre (grands) */\nfunction jeuPhrases(){\n  const ph = choisir(PHRASES);\n  const mots = ph.replace('.','').split(' ');\n  const melange = melanger(mots);\n  parler(ph);\n  app.innerHTML = entete('📝 Les phrases','menuLecture') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Remets la phrase dans l'ordre</p>\n      <button class=\"btn-son\" onclick=\"parler('${ph.replace(/'/g,\"\\\\'\")}')\">🔊 Écouter la phrase</button>\n      <div id=\"cible\" style=\"min-height:60px;font-size:24px;margin:14px 0;padding:12px;border:3px dashed #c7d2fe;border-radius:16px;\"></div>\n      <div id=\"banque\" style=\"display:flex;flex-wrap:wrap;gap:8px;justify-content:center;\">\n        ${melange.map((m,i)=>`<button class=\"btn-son\" style=\"background:#eef2ff;box-shadow:0 4px 0 #c7d2fe\" onclick=\"poserMot(this,'${m}')\">${m}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n      <div><button class=\"btn-suite cacher\" id=\"next\" onclick=\"jeuPhrases()\">Suivant ➡</button></div>\n    </div>`;\n  app.dataset.phrase = mots.join(' ');\n  app.dataset.cur = '';\n}\nfunction poserMot(btn, mot){\n  btn.style.visibility='hidden';\n  const cible=document.getElementById('cible');\n  app.dataset.cur = (app.dataset.cur?app.dataset.cur+' ':'')+mot;\n  cible.textContent = app.dataset.cur;\n  if(app.dataset.cur.split(' ').length === app.dataset.phrase.split(' ').length){\n    const fb=document.getElementById('fb');\n    if(app.dataset.cur===app.dataset.phrase){ fb.textContent='✅ Parfait !'; fb.className='feedback ok'; gagner(4); bravo();\n      parler(app.dataset.phrase);\n    } else { fb.textContent='Presque ! La bonne phrase : '+app.dataset.phrase; fb.className='feedback non'; }\n    document.getElementById('next').classList.remove('cacher');\n  }\n}\n\n/* Compréhension de texte (grands) : lire un texte puis répondre */\nconst TEXTES=[\n  {titre:'Le petit chat gris', em:'🐱',\n   txt:`Minou est un petit chat gris. Tous les matins, il boit son lait dans un bol bleu. Il adore jouer avec une pelote de laine rouge. Le soir, fatigué, il dort en boule près du feu, dans la cuisine.`,\n   qs:[{q:'De quelle couleur est Minou ?', bon:'Gris', faux:['Noir','Blanc']},\n       {q:'Avec quoi aime-t-il jouer ?', bon:'Une pelote de laine', faux:['Un ballon','Une souris']},\n       {q:'Où dort-il le soir ?', bon:'Près du feu', faux:['Dans le jardin','Sur le toit']}]},\n  {titre:'La sortie à la ferme', em:'🐮',\n   txt:`Samedi, Lucas est allé à la ferme avec sa classe. Il a vu trois vaches, deux cochons roses et beaucoup de poules. Le fermier lui a montré comment ramasser les œufs. Lucas a rapporté six œufs frais à la maison.`,\n   qs:[{q:'Quel jour Lucas est-il allé à la ferme ?', bon:'Samedi', faux:['Dimanche','Mercredi']},\n       {q:'Combien de vaches a-t-il vues ?', bon:'Trois', faux:['Deux','Six']},\n       {q:'Qu\\'a-t-il appris à ramasser ?', bon:'Les œufs', faux:['Le foin','Les pommes']},\n       {q:'Combien d\\'œufs a-t-il rapportés ?', bon:'Six', faux:['Trois','Dix']}]},\n  {titre:'La graine et la fleur', em:'🌱',\n   txt:`Emma a planté une petite graine dans un pot. Chaque jour, elle lui donne un peu d'eau et la met au soleil sur la fenêtre. Après deux semaines, une tige verte est sortie de la terre. Bientôt, une jolie fleur jaune est apparue.`,\n   qs:[{q:'Qu\\'a planté Emma ?', bon:'Une graine', faux:['Un arbre','Une fleur déjà grande']},\n       {q:'De quoi la graine a-t-elle besoin ?', bon:'D\\'eau et de soleil', faux:['De chocolat','De musique']},\n       {q:'De quelle couleur est la fleur ?', bon:'Jaune', faux:['Rouge','Bleue']}]}\n];\nfunction jeuComprehension(){\n  const t=choisir(TEXTES);\n  window._txtLu=t.txt;\n  window._pendingQs=t.qs; window._pendingRetour='menuLecture'; window._pendingTitre='🧠 Compréhension'; window._pendingFin=jeuComprehension;\n  app.innerHTML = entete('🧠 Lire et comprendre','menuLecture') + `\n    <div class=\"carte-jeu\">\n      <div class=\"lecon\">\n        <span class=\"ill\">${t.em}</span>\n        <h3>${t.titre}</h3>\n        <p style=\"font-size:21px\">${t.txt}</p>\n      </div>\n      <button class=\"btn-son\" onclick=\"parler(window._txtLu)\">🔊 Lire à voix haute</button>\n      <div><button class=\"btn-suite\" onclick=\"lancerQuiz()\">Répondre aux questions ❓</button></div>\n    </div>`;\n}\n\n/* ===== Moteur de quiz générique (séquence de questions) =====\n   Utilise window._pendingQs (tableau {q,bon,faux}), _pendingRetour, _pendingTitre, _pendingFin */\nfunction lancerQuiz(){ window._qSeq=window._pendingQs; window._qIdx=0; poserQuestionSeq(); }\nfunction poserQuestionSeq(){\n  const qs=window._qSeq, qi=window._qIdx, q=qs[qi];\n  const opts=melanger([q.bon, ...q.faux]);\n  window._qOpts=opts; window._qBon=q.bon;\n  parler(q.q);\n  app.innerHTML = entete(window._pendingTitre, window._pendingRetour) + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Question ${qi+1} / ${qs.length}</p>\n      <p class=\"consigne\" style=\"font-size:22px;color:#374151\">${q.q}</p>\n      <div class=\"choix\" id=\"zone\" style=\"grid-template-columns:1fr;\">\n        ${opts.map((o,k)=>`<button style=\"font-size:21px\" onclick=\"repQuiz(this,${k})\">${o}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n      <div><button class=\"btn-suite cacher\" id=\"next\" onclick=\"suiteQuizSeq()\">${qi+1<qs.length?'Question suivante ➡':'Terminer ✅'}</button></div>\n    </div>`;\n}\nfunction repQuiz(btn,k){\n  const fb=document.getElementById('fb');\n  if(window._qOpts[k]===window._qBon){\n    btn.classList.add('bon'); fb.textContent='✅ Bonne réponse !'; fb.className='feedback ok'; gagner(4); bravo();\n    document.querySelectorAll('#zone button').forEach(b=>b.disabled=true);\n    document.getElementById('next').classList.remove('cacher');\n  } else { btn.classList.add('faux'); fb.textContent='Relis bien 🔎'; fb.className='feedback non'; }\n}\nfunction suiteQuizSeq(){\n  window._qIdx++;\n  if(window._qIdx>=window._qSeq.length){ confettis(); (window._pendingFin||menuLecture)(); }\n  else poserQuestionSeq();\n}\n<\/script>\n\n<script>\n/* ====================================================================\n   MODULE CALCUL\n   ==================================================================== */\nfunction menuCalcul(){\n  state.vue='calcul';\n  const grands = state.age==='grand';\n  app.innerHTML = entete('🔢 Calcul') + `\n    <div class=\"sous-menu\">\n      ${!grands?`<button class=\"gros-btn t-calcul\" onclick=\"jeuCompter()\"><span class=\"emo\">🧮</span>Compter</button>`:''}\n      <button class=\"gros-btn t-calcul\" onclick=\"bonus('calcul')\"><span class=\"emo\">🧠</span>Carte mentale & vidéos</button>\n      <button class=\"gros-btn t-calcul\" onclick=\"jeuOp('+')\"><span class=\"emo\">➕</span>Additions${grands?'<span class=\"niveau-badge\">2 chiffres</span>':''}</button>\n      <button class=\"gros-btn t-calcul\" onclick=\"jeuOp('-')\"><span class=\"emo\">➖</span>Soustractions</button>\n      ${grands?`\n      <button class=\"gros-btn t-calcul\" onclick=\"jeuOp('×')\"><span class=\"emo\">✖️</span>Multiplications<span class=\"niveau-badge\">tables</span></button>\n      <button class=\"gros-btn t-calcul\" onclick=\"jeuOp('÷')\"><span class=\"emo\">➗</span>Divisions</button>\n      <button class=\"gros-btn t-calcul\" onclick=\"jeuSuites()\"><span class=\"emo\">🔢</span>Suites de nombres</button>\n      <button class=\"gros-btn t-calcul\" onclick=\"jeuProbleme()\"><span class=\"emo\">🧩</span>Problèmes</button>`:''}\n    </div>`;\n}\n\n/* Compter des objets (petits) */\nconst OBJETS=['🍎','🌟','🐶','🎈','🍓','🐠','🌸','🚗','⚽','🦋'];\nfunction jeuCompter(){\n  const max = state.age==='petit'?6:10;\n  const n = 1+r(max);\n  const emo = choisir(OBJETS);\n  let opts=new Set([n]);\n  while(opts.size<3){ let x=1+r(max+2); opts.add(x); }\n  opts=melanger([...opts]);\n  parler('Compte les objets');\n  app.innerHTML = entete('🧮 Compter','menuCalcul') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Combien y en a-t-il ?</p>\n      <div class=\"emoji-rang\">${(emo+' ').repeat(n)}</div>\n      <div class=\"choix trois\" id=\"zone\">\n        ${opts.map(o=>`<button onclick=\"repCompter(this,${o},${n})\">${o}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n    </div>`;\n}\nfunction repCompter(btn,choix,bon){\n  const fb=document.getElementById('fb');\n  if(choix===bon){ btn.classList.add('bon'); fb.textContent='✅ Oui, '+bon+' !'; fb.className='feedback ok'; parler(''+bon); gagner(2); bravo();\n    document.querySelectorAll('#zone button').forEach(b=>b.disabled=true); setTimeout(jeuCompter,1300);\n  }else{ btn.classList.add('faux'); fb.textContent='Recompte bien 🔢'; fb.className='feedback non'; }\n}\n\n/* Opérations */\nfunction genOp(op){\n  let a,b,res;\n  const grand = state.age==='grand';\n  if(op==='+'){ if(grand){ a=11+r(89); b=11+r(89);} else { a=1+r(10); b=1+r(10);} res=a+b; }\n  else if(op==='-'){ if(grand){ a=25+r(75); b=5+r(a-5);} else { a=1+r(10); b=1+r(a);} res=a-b; }\n  else if(op==='×'){ if(grand){ a=2+r(11); b=2+r(11);} else { a=1+r(5); b=1+r(5);} res=a*b; }\n  else { if(grand){ b=2+r(8); res=2+r(11);} else { b=1+r(5); res=1+r(5);} a=b*res; } // division exacte : a÷b=res\n  return {a,b,res};\n}\nconst NOMS_OP={'+':'plus','-':'moins','×':'fois','÷':'divisé par'};\nconst TITRES_OP={'+':'➕ Additions','-':'➖ Soustractions','×':'✖️ Multiplications','÷':'➗ Divisions'};\nfunction jeuOp(op){\n  const {a,b,res}=genOp(op);\n  parler(`${a} ${NOMS_OP[op]} ${b}`);\n  if(state.age==='grand'){\n    // mode grands : réponse à taper au clavier\n    app.innerHTML = entete(TITRES_OP[op],'menuCalcul') + `\n      <div class=\"carte-jeu\">\n        <p class=\"consigne\">Écris le résultat</p>\n        <div class=\"question\">${a} ${op} ${b} =</div>\n        <div class=\"saisie-box\" id=\"saisie\">?</div>\n        <button class=\"btn-son\" onclick=\"parler('${a} ${NOMS_OP[op]} ${b}')\">🔊 Réécouter</button>\n        ${clavierHTML()}\n        <div class=\"feedback\" id=\"fb\"></div>\n      </div>`;\n    demarrerSaisie(res, ()=>jeuOp(op));\n    return;\n  }\n  // mode petits : choix multiple\n  let opts=new Set([res]);\n  while(opts.size<3){ let d=res + (r(2)?1:-1)*(1+r(5)); if(d>=0) opts.add(d); }\n  opts=melanger([...opts]);\n  app.innerHTML = entete(TITRES_OP[op],'menuCalcul') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Combien font...</p>\n      <div class=\"question\">${a} ${op} ${b} = ?</div>\n      <button class=\"btn-son\" onclick=\"parler('${a} ${NOMS_OP[op]} ${b}')\">🔊 Réécouter</button>\n      <div class=\"choix trois\" id=\"zone\">\n        ${opts.map(o=>`<button onclick=\"repOp(this,${o},${res},'${op}')\">${o}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n    </div>`;\n}\nfunction repOp(btn,choix,bon,op){\n  const fb=document.getElementById('fb');\n  if(choix===bon){ btn.classList.add('bon'); fb.textContent='✅ '+bon+' !'; fb.className='feedback ok'; parler(''+bon); gagner(3); bravo();\n    document.querySelectorAll('#zone button').forEach(b=>b.disabled=true); setTimeout(()=>jeuOp(op),1300);\n  }else{ btn.classList.add('faux'); fb.textContent='Essaie encore 💪'; fb.className='feedback non'; }\n}\n\n/* --- Saisie au clavier (mode grands) --- */\nlet _saisie='', _bonneRep=null, _suiteCB=null;\nfunction clavierHTML(){\n  let t='';\n  for(let n=1;n<=9;n++) t+=`<button class=\"touche\" onclick=\"tape('${n}')\">${n}</button>`;\n  t+=`<button class=\"touche\" onclick=\"efface()\">⌫</button>`;\n  t+=`<button class=\"touche\" onclick=\"tape('0')\">0</button>`;\n  t+=`<button class=\"touche\" style=\"background:var(--vert);color:#fff;box-shadow:0 4px 0 #15803d\" onclick=\"valider()\">✓</button>`;\n  return `<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:250px;margin:14px auto 4px;\">${t}</div>`;\n}\nfunction demarrerSaisie(bon, suite){ _saisie=''; _bonneRep=bon; _suiteCB=suite; majSaisie(); }\nfunction tape(d){ if(_saisie.length<6){ _saisie+=d; majSaisie(); } }\nfunction efface(){ _saisie=_saisie.slice(0,-1); majSaisie(); }\nfunction majSaisie(){ const e=document.getElementById('saisie'); if(e) e.textContent=_saisie||'?'; }\nfunction valider(){\n  if(_saisie==='') return;\n  const fb=document.getElementById('fb');\n  if(+_saisie===_bonneRep){ fb.textContent='✅ Bravo, '+_bonneRep+' !'; fb.className='feedback ok'; parler(''+_bonneRep); gagner(5); bravo();\n    document.querySelectorAll('.touche').forEach(b=>b.disabled=true); setTimeout(_suiteCB,1300);\n  } else { fb.textContent='❌ Non, réessaie'; fb.className='feedback non'; _saisie=''; majSaisie(); }\n}\n\n/* --- Suites de nombres (grands) --- */\nfunction jeuSuites(){\n  const pas=choisir([2,3,4,5,10,-2,-3,-5]);\n  let depart = (pas>0 ? 1+r(12) : 50+r(30));\n  const suite=[]; for(let i=0;i<6;i++) suite.push(depart+pas*i);\n  const trou=2+r(3);\n  const bon=suite[trou];\n  const aff=suite.map((v,i)=> i===trou?'?':v).join('  →  ');\n  parler('Trouve le nombre qui manque');\n  app.innerHTML = entete('🔢 Suites','menuCalcul') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">De ${pas>0?'+':''}${pas} en ${pas>0?'+':''}${pas} : quel nombre manque-t-il ?</p>\n      <div class=\"question petit\">${aff}</div>\n      <div class=\"saisie-box\" id=\"saisie\">?</div>\n      ${clavierHTML()}\n      <div class=\"feedback\" id=\"fb\"></div>\n    </div>`;\n  demarrerSaisie(bon, jeuSuites);\n}\n\n/* --- Problèmes (grands) --- */\nconst PROBLEMES=[\n  ()=>{const a=12+r(30),b=5+r(20);return{t:`Tom a ${a} billes. Il en gagne ${b} à la récré. Combien en a-t-il maintenant ?`,r:a+b};},\n  ()=>{const a=30+r(40),b=8+r(20);return{t:`Il y a ${a} bonbons dans le bocal. Léa en mange ${b}. Combien en reste-t-il ?`,r:a-b};},\n  ()=>{const a=3+r(6),b=3+r(7);return{t:`Un sachet contient ${b} images. Combien d'images dans ${a} sachets ?`,r:a*b};},\n  ()=>{const b=2+r(4),res=2+r(8),a=b*res;return{t:`On partage ${a} gâteaux entre ${b} enfants. Combien chacun en reçoit-il ?`,r:res};},\n  ()=>{const a=3+r(6),b=3+r(6);return{t:`Dans la classe il y a ${a} rangées de ${b} tables. Combien de tables en tout ?`,r:a*b};},\n  ()=>{const prix=2+r(8),n=2+r(5);return{t:`Un jouet coûte ${prix} euros. Combien coûtent ${n} jouets ?`,r:prix*n};},\n  ()=>{const total=20+r(30),pris=5+r(12);return{t:`Maman achète ${total} pommes. Elle en met ${pris} dans un panier. Combien reste-t-il de pommes ?`,r:total-pris};}\n];\nfunction jeuProbleme(){\n  const p=choisir(PROBLEMES)();\n  window._pTxt=p.t;\n  parler(p.t);\n  app.innerHTML = entete('🧩 Problèmes','menuCalcul') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\" style=\"font-size:22px;line-height:1.5;color:#374151\">${p.t}</p>\n      <button class=\"btn-son\" onclick=\"parler(window._pTxt)\">🔊 Relire</button>\n      <div class=\"saisie-box\" id=\"saisie\">?</div>\n      ${clavierHTML()}\n      <div class=\"feedback\" id=\"fb\"></div>\n    </div>`;\n  demarrerSaisie(p.r, jeuProbleme);\n}\n<\/script>\n\n<script>\n/* ====================================================================\n   MODULE LANGUES\n   ==================================================================== */\nconst LANGUES = {\n  en:{nom:'Anglais', drap:'🇬🇧', code:'en-US', salut:'Hello!'},\n  es:{nom:'Espagnol', drap:'🇪🇸', code:'es-ES', salut:'¡Hola!'},\n  it:{nom:'Italien', drap:'🇮🇹', code:'it-IT', salut:'Ciao!'}\n};\nconst VOCAB = [\n  {img:'🐱', fr:'Chat',   en:'Cat',    es:'Gato',     it:'Gatto'},\n  {img:'🐶', fr:'Chien',  en:'Dog',    es:'Perro',    it:'Cane'},\n  {img:'🏠', fr:'Maison', en:'House',  es:'Casa',     it:'Casa'},\n  {img:'☀️', fr:'Soleil', en:'Sun',    es:'Sol',      it:'Sole'},\n  {img:'🍎', fr:'Pomme',  en:'Apple',  es:'Manzana',  it:'Mela'},\n  {img:'💧', fr:'Eau',    en:'Water',  es:'Agua',     it:'Acqua'},\n  {img:'📕', fr:'Livre',  en:'Book',   es:'Libro',    it:'Libro'},\n  {img:'🌳', fr:'Arbre',  en:'Tree',   es:'Árbol',    it:'Albero'},\n  {img:'⭐', fr:'Étoile', en:'Star',   es:'Estrella', it:'Stella'},\n  {img:'🌸', fr:'Fleur',  en:'Flower', es:'Flor',     it:'Fiore'},\n  {img:'🐟', fr:'Poisson',en:'Fish',   es:'Pez',      it:'Pesce'},\n  {img:'🥖', fr:'Pain',   en:'Bread',  es:'Pan',      it:'Pane'}\n];\nconst NOMBRES = [\n  {img:'1️⃣',fr:'Un',    en:'One',   es:'Uno',    it:'Uno'},\n  {img:'2️⃣',fr:'Deux',  en:'Two',   es:'Dos',    it:'Due'},\n  {img:'3️⃣',fr:'Trois', en:'Three', es:'Tres',   it:'Tre'},\n  {img:'4️⃣',fr:'Quatre',en:'Four',  es:'Cuatro', it:'Quattro'},\n  {img:'5️⃣',fr:'Cinq',  en:'Five',  es:'Cinco',  it:'Cinque'},\n  {img:'6️⃣',fr:'Six',   en:'Six',   es:'Seis',   it:'Sei'},\n  {img:'7️⃣',fr:'Sept',  en:'Seven', es:'Siete',  it:'Sette'},\n  {img:'8️⃣',fr:'Huit',  en:'Eight', es:'Ocho',   it:'Otto'},\n  {img:'9️⃣',fr:'Neuf',  en:'Nine',  es:'Nueve',  it:'Nove'},\n  {img:'🔟',fr:'Dix',   en:'Ten',   es:'Diez',   it:'Dieci'}\n];\nconst COULEURS = [\n  {img:'🔴',fr:'Rouge', en:'Red',    es:'Rojo',    it:'Rosso'},\n  {img:'🔵',fr:'Bleu',  en:'Blue',   es:'Azul',    it:'Blu'},\n  {img:'🟢',fr:'Vert',  en:'Green',  es:'Verde',   it:'Verde'},\n  {img:'🟡',fr:'Jaune', en:'Yellow', es:'Amarillo',it:'Giallo'},\n  {img:'⚫',fr:'Noir',  en:'Black',  es:'Negro',   it:'Nero'},\n  {img:'⚪',fr:'Blanc', en:'White',  es:'Blanco',  it:'Bianco'},\n  {img:'🟠',fr:'Orange',en:'Orange', es:'Naranja', it:'Arancione'},\n  {img:'🟣',fr:'Violet',en:'Purple', es:'Morado',  it:'Viola'}\n];\nconst PHRASES_L = [\n  {img:'👋',fr:'Bonjour',      en:'Hello',         es:'Hola',          it:'Ciao'},\n  {img:'🙏',fr:'Merci',        en:'Thank you',     es:'Gracias',       it:'Grazie'},\n  {img:'👋',fr:'Au revoir',    en:'Goodbye',       es:'Adiós',         it:'Arrivederci'},\n  {img:'😊',fr:'S\\'il te plaît',en:'Please',       es:'Por favor',     it:'Per favore'},\n  {img:'❓',fr:'Comment ça va ?',en:'How are you?', es:'¿Cómo estás?',  it:'Come stai?'},\n  {img:'👍',fr:'Oui',          en:'Yes',           es:'Sí',            it:'Sì'},\n  {img:'👎',fr:'Non',          en:'No',            es:'No',            it:'No'}\n];\nconst LISTES = {base:VOCAB, nombres:NOMBRES, couleurs:COULEURS, phrases:PHRASES_L};\nlet langueCur = 'en';\nlet catCur = 'base';\n\nfunction menuLangues(){\n  state.vue='langues';\n  const grands = state.age==='grand';\n  app.innerHTML = entete('🌍 Langues') + `\n    <div class=\"drapeaux\" id=\"dr\">\n      ${Object.entries(LANGUES).map(([k,v])=>`<button data-l=\"${k}\" class=\"${k===langueCur?'on':''}\" onclick=\"setLangue('${k}')\">${v.drap} ${v.nom}</button>`).join('')}\n    </div>\n    <div class=\"sous-menu\">\n      <button class=\"gros-btn t-langues\" onclick=\"bonus('langues')\"><span class=\"emo\">🧠</span>Carte mentale & vidéos</button>\n      <button class=\"gros-btn t-langues\" onclick=\"jeuVocab('base')\"><span class=\"emo\">👀</span>Découvrir les mots</button>\n      <button class=\"gros-btn t-langues\" onclick=\"jeuLangueQuiz('base')\"><span class=\"emo\">❓</span>Quiz : trouve le mot</button>\n      ${grands?`\n      <button class=\"gros-btn t-langues\" onclick=\"jeuVocab('nombres')\"><span class=\"emo\">🔢</span>Les nombres</button>\n      <button class=\"gros-btn t-langues\" onclick=\"jeuVocab('couleurs')\"><span class=\"emo\">🎨</span>Les couleurs</button>\n      <button class=\"gros-btn t-langues\" onclick=\"jeuVocab('phrases')\"><span class=\"emo\">💬</span>Petites phrases</button>\n      <button class=\"gros-btn t-langues\" onclick=\"jeuLangueQuiz('melange')\"><span class=\"emo\">🏆</span>Grand quiz<span class=\"niveau-badge\">4 choix</span></button>`:''}\n    </div>`;\n}\nfunction setLangue(k){ langueCur=k; document.querySelectorAll('#dr button').forEach(b=>b.classList.toggle('on',b.dataset.l===k)); }\nfunction listePourCat(cat){\n  if(cat==='melange') return [...VOCAB,...NOMBRES,...COULEURS,...PHRASES_L];\n  return LISTES[cat]||VOCAB;\n}\n\n/* Mode découverte : carte par carte */\nlet vocabIdx = 0;\nfunction jeuVocab(cat){\n  catCur = cat||'base';\n  const liste = melanger(listePourCat(catCur));\n  vocabIdx = 0;\n  montrerCarteVocab(liste);\n}\nfunction montrerCarteVocab(liste){\n  const L=LANGUES[langueCur];\n  const v=liste[vocabIdx];\n  parler(v[langueCur], L.code);\n  app.innerHTML = entete(L.drap+' '+L.nom,'menuLangues') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">En français : <b>${v.fr}</b></p>\n      <div class=\"mot-img pop\">${v.img}</div>\n      <div class=\"mot-cible\">${v[langueCur]}</div>\n      <button class=\"btn-son\" onclick=\"parler('${v[langueCur].replace(/'/g,\"\\\\'\")}','${L.code}')\">🔊 Écouter</button>\n      ${barreHTML(liste.length, vocabIdx+1)}\n      <div><button class=\"btn-suite\" onclick=\"suiteVocab()\">${vocabIdx+1<liste.length?'Suivant ➡':'Recommencer 🔁'}</button></div>\n    </div>`;\n  window._listeVocab = liste;\n}\nfunction suiteVocab(){\n  const liste=window._listeVocab;\n  vocabIdx++;\n  if(vocabIdx>=liste.length){ gagner(3); confettis(); vocabIdx=0; montrerCarteVocab(melanger(listePourCat(catCur))); }\n  else montrerCarteVocab(liste);\n}\n\n/* Quiz : montre l'image + mot français, trouver le mot dans la langue.\n   Grands : 4 options. Petits/base : 3 options. */\nfunction jeuLangueQuiz(cat){\n  catCur = cat||'base';\n  const liste = listePourCat(catCur);\n  const L=LANGUES[langueCur];\n  const cible=choisir(liste);\n  const nbAutres = (state.age==='grand') ? 3 : 2;\n  let autres=melanger(liste.filter(v=>v.fr!==cible.fr)).slice(0,nbAutres);\n  const opts=melanger([cible,...autres]);\n  parler('Comment dit-on '+cible.fr+' en '+L.nom);\n  app.innerHTML = entete(L.drap+' Quiz','menuLangues') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Comment dit-on en ${L.nom} ?</p>\n      <div class=\"mot-img pop\">${cible.img}</div>\n      <div class=\"mot-fr\">${cible.fr}</div>\n      <div class=\"choix ${opts.length===3?'trois':''}\" id=\"zone\">\n        ${opts.map(o=>`<button style=\"font-size:22px\" onclick=\"repLangue(this,'${o.fr.replace(/'/g,\"\\\\'\")}','${cible.fr.replace(/'/g,\"\\\\'\")}','${o[langueCur].replace(/'/g,\"\\\\'\")}','${L.code}')\">${o[langueCur]}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n    </div>`;\n}\nfunction repLangue(btn,choix,bonne,mot,code){\n  const fb=document.getElementById('fb');\n  if(choix===bonne){ btn.classList.add('bon'); fb.textContent='✅ Bravo !'; fb.className='feedback ok'; parler(mot,code); gagner(3); bravo();\n    document.querySelectorAll('#zone button').forEach(b=>b.disabled=true); setTimeout(()=>jeuLangueQuiz(catCur),1500);\n  }else{ btn.classList.add('faux'); fb.textContent='Non, réessaie 🙂'; fb.className='feedback non'; }\n}\n<\/script>\n\n<script>\n/* ====================================================================\n   MODULE HISTOIRE\n   ==================================================================== */\nconst LECONS = [\n  {\n    titre:'La Préhistoire', ill:'🦣',\n    texte:`Il y a très très longtemps, les hommes vivaient dans des grottes. On les appelle les hommes préhistoriques. Ils ont découvert le <b>feu</b> pour se réchauffer et cuire la nourriture, et ils chassaient des animaux comme le mammouth. Ils dessinaient sur les murs des grottes !`,\n    quiz:{q:'Où vivaient les hommes préhistoriques ?', bon:'Dans des grottes', faux:['Dans des châteaux','Dans des immeubles']},\n    age:'petit'\n  },\n  {\n    titre:'Les Égyptiens', ill:'🔺',\n    texte:`En Égypte, il y a des milliers d'années, les rois s'appelaient les <b>pharaons</b>. Ils ont fait construire d'immenses <b>pyramides</b> en pierre. Les Égyptiens écrivaient avec de petits dessins appelés hiéroglyphes.`,\n    quiz:{q:'Comment s\\'appelaient les rois d\\'Égypte ?', bon:'Les pharaons', faux:['Les chevaliers','Les présidents']},\n    age:'petit'\n  },\n  {\n    titre:'Les Chevaliers', ill:'🏰',\n    texte:`Au Moyen Âge, les <b>chevaliers</b> portaient une armure en métal et se battaient avec une épée. Ils vivaient dans de grands <b>châteaux forts</b> entourés de murs et de douves remplies d'eau pour se protéger.`,\n    quiz:{q:'Où vivaient les chevaliers ?', bon:'Dans des châteaux forts', faux:['Dans des pyramides','Dans des cavernes']},\n    age:'petit'\n  },\n  {\n    titre:'Les Romains', ill:'🏛️',\n    texte:`Les Romains vivaient à <b>Rome</b>, il y a plus de 2000 ans. Ils ont construit des routes, des aqueducs pour transporter l'eau, et de grandes arènes comme le <b>Colisée</b> où combattaient les gladiateurs. Leur chef s'appelait l'empereur.`,\n    quiz:{q:'Comment s\\'appelle la grande arène de Rome ?', bon:'Le Colisée', faux:['La Tour Eiffel','La pyramide']},\n    age:'grand'\n  },\n  {\n    titre:'Christophe Colomb', ill:'⛵',\n    texte:`En <b>1492</b>, un explorateur nommé Christophe Colomb est parti sur des bateaux à travers l'océan. Il cherchait une nouvelle route et il a découvert un continent que les Européens ne connaissaient pas : l'<b>Amérique</b> !`,\n    quiz:{q:'Quel continent Colomb a-t-il découvert ?', bon:'L\\'Amérique', faux:['L\\'Australie','L\\'Afrique']},\n    age:'grand'\n  },\n  {\n    titre:'La Tour Eiffel', ill:'🗼',\n    texte:`La <b>Tour Eiffel</b> a été construite à Paris en <b>1889</b>, il y a plus de 130 ans, par l'ingénieur Gustave Eiffel. Elle est faite de fer et mesure plus de 300 mètres. C'est le monument le plus connu de France !`,\n    quiz:{q:'Dans quelle ville se trouve la Tour Eiffel ?', bon:'Paris', faux:['Rome','Londres']},\n    age:'grand'\n  }\n];\n\n/* Questions supplémentaires pour les grands (par titre de leçon) */\nconst QUIZ_PLUS = {\n  'La Préhistoire':[\n    {q:'Qu\\'ont découvert les hommes préhistoriques pour se réchauffer ?', bon:'Le feu', faux:['L\\'électricité','Le gaz']},\n    {q:'Quel grand animal chassaient-ils ?', bon:'Le mammouth', faux:['Le lion','Le dauphin']}\n  ],\n  'Les Égyptiens':[\n    {q:'Qu\\'ont fait construire les pharaons ?', bon:'Des pyramides', faux:['Des gratte-ciels','Des ponts']},\n    {q:'Comment s\\'appelaient les petits dessins de leur écriture ?', bon:'Des hiéroglyphes', faux:['Des emojis','Des lettres']}\n  ],\n  'Les Chevaliers':[\n    {q:'En quoi était faite l\\'armure du chevalier ?', bon:'En métal', faux:['En bois','En papier']},\n    {q:'Qu\\'y avait-il autour des châteaux forts ?', bon:'Des douves remplies d\\'eau', faux:['Une autoroute','Un jardin de fleurs']}\n  ],\n  'Les Romains':[\n    {q:'À quoi servaient les aqueducs des Romains ?', bon:'À transporter l\\'eau', faux:['À voler','À faire du feu']},\n    {q:'Qui combattait dans le Colisée ?', bon:'Les gladiateurs', faux:['Les chevaliers','Les pharaons']},\n    {q:'Comment s\\'appelait le chef des Romains ?', bon:'L\\'empereur', faux:['Le président','Le roi mage']}\n  ],\n  'Christophe Colomb':[\n    {q:'En quelle année Colomb a-t-il découvert l\\'Amérique ?', bon:'1492', faux:['1789','2000']},\n    {q:'Comment a-t-il traversé l\\'océan ?', bon:'En bateau', faux:['En avion','À pied']}\n  ],\n  'La Tour Eiffel':[\n    {q:'En quelle année la Tour Eiffel a-t-elle été construite ?', bon:'1889', faux:['1492','1980']},\n    {q:'En quel matériau est faite la Tour Eiffel ?', bon:'En fer', faux:['En or','En verre']},\n    {q:'Qui a construit la Tour Eiffel ?', bon:'Gustave Eiffel', faux:['Napoléon','Léonard de Vinci']}\n  ]\n};\n\n/* Chronologie (grands) : ranger des événements du plus ancien au plus récent */\nconst CHRONO=[\n  {e:'La Préhistoire', o:1, em:'🦣'},\n  {e:'Les Égyptiens et les pyramides', o:2, em:'🔺'},\n  {e:'Les Romains et le Colisée', o:3, em:'🏛️'},\n  {e:'Les chevaliers du Moyen Âge', o:4, em:'🏰'},\n  {e:'Christophe Colomb (1492)', o:5, em:'⛵'},\n  {e:'La Tour Eiffel (1889)', o:6, em:'🗼'}\n];\n\nfunction menuHistoire(){\n  state.vue='histoire';\n  const grands = state.age==='grand';\n  const leconsAge = LECONS.filter(l=> grands ? true : l.age==='petit');\n  app.innerHTML = entete('🏰 Histoire') + `\n    <div class=\"sous-menu\">\n      <button class=\"gros-btn t-histoire\" onclick=\"bonus('histoire')\"><span class=\"emo\">🧠</span>Carte mentale & vidéos</button>\n      ${leconsAge.map(l=>`<button class=\"gros-btn t-histoire\" onclick=\"ouvrirLecon(${LECONS.indexOf(l)})\"><span class=\"emo\">${l.ill}</span>${l.titre}</button>`).join('')}\n      ${grands?`<button class=\"gros-btn t-histoire\" onclick=\"jeuChrono()\"><span class=\"emo\">⏳</span>Chronologie<span class=\"niveau-badge\">range dans l'ordre</span></button>`:''}\n    </div>`;\n}\nfunction ouvrirLecon(i){\n  const l=LECONS[i];\n  app.innerHTML = entete(l.ill+' '+l.titre,'menuHistoire') + `\n    <div class=\"carte-jeu\">\n      <div class=\"lecon\">\n        <span class=\"ill\">${l.ill}</span>\n        <p>${l.texte}</p>\n      </div>\n      <button class=\"btn-son\" onclick=\"parler(document.getElementById('lt').textContent)\">🔊 Lire à voix haute</button>\n      <p id=\"lt\" style=\"display:none\">${l.texte.replace(/<[^>]+>/g,'')}</p>\n      <div><button class=\"btn-suite\" onclick=\"quizLecon(${i})\">Faire le quiz ❓</button></div>\n    </div>`;\n}\nfunction quizLecon(i){\n  const l=LECONS[i];\n  let qs=[l.quiz];\n  if(state.age==='grand' && QUIZ_PLUS[l.titre]) qs=qs.concat(QUIZ_PLUS[l.titre]);\n  qs=melanger(qs);\n  window._pendingQs=qs; window._pendingRetour='menuHistoire'; window._pendingTitre=l.ill+' Quiz'; window._pendingFin=menuHistoire;\n  lancerQuiz();\n}\n\n/* Chronologie : cliquer du plus ancien au plus récent */\nfunction jeuChrono(){\n  const sel=melanger(CHRONO).slice(0,4);\n  const cible=sel.slice().sort((a,b)=>a.o-b.o);\n  window._chrCible=cible; window._chrStep=0;\n  app.innerHTML = entete('⏳ Chronologie','menuHistoire') + `\n    <div class=\"carte-jeu\">\n      <p class=\"consigne\">Clique du plus <b>ANCIEN</b> au plus <b>RÉCENT</b></p>\n      <div id=\"zone\" style=\"display:flex;flex-direction:column;gap:10px;margin-top:10px;\">\n        ${melanger(sel).map(x=>`<button class=\"gros-btn t-histoire\" style=\"font-size:18px\" onclick=\"repChrono(this,${x.o})\"><span class=\"emo\">${x.em}</span>${x.e}</button>`).join('')}\n      </div>\n      <div class=\"feedback\" id=\"fb\"></div>\n      <div><button class=\"btn-suite cacher\" id=\"next\" onclick=\"jeuChrono()\">Rejouer 🔁</button></div>\n    </div>`;\n}\nfunction repChrono(btn,o){\n  const fb=document.getElementById('fb');\n  if(o===window._chrCible[window._chrStep].o){\n    btn.classList.add('bon'); btn.disabled=true; window._chrStep++;\n    if(window._chrStep>=window._chrCible.length){\n      fb.textContent='✅ Parfait, tout est dans l\\'ordre !'; fb.className='feedback ok'; gagner(6); bravo();\n      document.getElementById('next').classList.remove('cacher');\n    } else { fb.textContent='👍 Continue...'; fb.className='feedback ok'; }\n  } else {\n    btn.classList.add('faux'); fb.textContent='❌ Ce n\\'est pas le plus ancien restant'; fb.className='feedback non';\n    setTimeout(()=>btn.classList.remove('faux'),700);\n  }\n}\n<\/script>\n\n<script>\n/* ===== Cartes mentales + vidéos par matière (Petits Malins) ===== */\nconst CARTES = {\n  lecture:{titre:'La lecture', c:'#e11d48', noeuds:['Les voyelles a e i o u','Les consonnes','Les syllabes ba be bi','Lire des mots','Lire des phrases']},\n  calcul:{titre:'Le calcul', c:'#2563eb', noeuds:['Compter','Additionner +','Soustraire \\u2212','Multiplier \\u00d7','Diviser \\u00f7']},\n  langues:{titre:'Les langues', c:'#059669', noeuds:['Anglais','Espagnol','Italien','Les nombres','Les couleurs']},\n  histoire:{titre:'Le temps', c:'#d97706', noeuds:['Prehistoire','Antiquite','Moyen Age','Temps modernes','Aujourd hui']}\n};\nconst VIDEOS_PM = {\n  lecture:[{l:'La planete des Alphas',q:'la planete des alphas apprendre a lire'},{l:'Alphabet en chanson',q:'alphabet chanson maternelle apprendre'},{l:'Lire les syllabes (CP)',q:'apprendre a lire les syllabes CP'}],\n  calcul:[{l:'Apprendre a compter',q:'apprendre a compter maternelle chanson'},{l:'Les additions (CP)',q:'apprendre les additions CP'},{l:'Tables de multiplication',q:'table de multiplication chanson enfant'}],\n  langues:[{l:'Anglais pour enfants',q:'anglais pour enfants debutant animaux couleurs'},{l:'Espagnol pour enfants',q:'espagnol pour enfants debutant'},{l:'Italien pour enfants',q:'italien pour enfants debutant'}],\n  histoire:[{l:'C est pas sorcier',q:'c est pas sorcier prehistoire'},{l:'Quelle Histoire',q:'quelle histoire dessin anime prehistoire'},{l:'L Antiquite aux enfants',q:'antiquite expliquee aux enfants'}]\n};\nfunction carteMentaleSVG(key){\n  const d=CARTES[key]; const cx=260,cy=160,rx=190,ry=110,n=d.noeuds.length; let nodes=\"\";\n  d.noeuds.forEach(function(t,i){\n    const ang=(-90+i*(360/n))*Math.PI/180; const x=cx+rx*Math.cos(ang), y=cy+ry*Math.sin(ang);\n    const w=Math.max(96,t.length*8+18), h=34;\n    nodes+='<line x1=\"'+cx+'\" y1=\"'+cy+'\" x2=\"'+x+'\" y2=\"'+y+'\" stroke=\"'+d.c+'\" stroke-width=\"3\" opacity=\".5\"/>';\n    nodes+='<rect x=\"'+(x-w/2)+'\" y=\"'+(y-h/2)+'\" width=\"'+w+'\" height=\"'+h+'\" rx=\"12\" fill=\"#fff\" stroke=\"'+d.c+'\" stroke-width=\"2\"/>';\n    nodes+='<text x=\"'+x+'\" y=\"'+(y+5)+'\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"#374151\">'+t+'</text>';\n  });\n  return '<svg viewBox=\"0 0 520 320\" width=\"100%\" style=\"max-height:320px\">'+nodes+'<ellipse cx=\"'+cx+'\" cy=\"'+cy+'\" rx=\"92\" ry=\"52\" fill=\"'+d.c+'\"/><text x=\"'+cx+'\" y=\"'+(cy+7)+'\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"800\" fill=\"#fff\">'+d.titre+'</text></svg>';\n}\nfunction bonus(key){\n  const d=CARTES[key];\n  const retour={lecture:\"menuLecture\",calcul:\"menuCalcul\",langues:\"menuLangues\",histoire:\"menuHistoire\"}[key];\n  const vids=VIDEOS_PM[key].map(function(v){ return '<a class=\"btn-son\" style=\"text-decoration:none;display:inline-block;background:#fff;box-shadow:0 4px 0 #e5e7eb\" href=\"https://www.youtube.com/results?search_query='+encodeURIComponent(v.q)+'\" target=\"_blank\" rel=\"noopener\">\\uD83C\\uDFAC '+v.l+'</a>'; }).join(\" \");\n  app.innerHTML = entete(\"\\uD83E\\uDDE0 \"+d.titre, retour) + '<div class=\"carte-jeu\"><p class=\"consigne\">Ma carte mentale</p><div style=\"background:#f8fafc;border-radius:18px;padding:10px\">'+carteMentaleSVG(key)+'</div><p class=\"consigne\" style=\"margin-top:16px\">\\uD83C\\uDFAC Des vidéos pour apprendre <span style=\"font-size:14px\">(elles s ouvrent dans le navigateur)</span></p><div style=\"display:flex;flex-wrap:wrap;gap:8px;justify-content:center\">'+vids+'</div></div>';\n}\n<\/script>\n<script>\n/* démarrage */\nvueAccueil();\n<\/script>\n</body>\n</html>\n";

  try{

  }catch(e){}

}

/* ------------------------- HELPERS / CALCULS --------------------------- */
function allLessons(){ return CONTENT.subjects.flatMap(s=>s.lessons.map(l=>({...l, subjectId:s.id}))); }
function lessonById(id){ return allLessons().find(l=>l.id===id); }
function subjectById(id){ return CONTENT.subjects.find(s=>s.id===id); }
function questsDone(s){ return Object.values(s.scores||{}).filter(v=>v.stars>0).length; }
function subjectsTouched(s){
  const done = Object.keys(s.scores||{});
  return CONTENT.subjects.filter(sub=>sub.lessons.some(l=>done.includes(l.id))).length;
}
function regionComplete(s,subId){
  const sub = subjectById(subId);
  return sub.lessons.every(l=> (s.scores[l.id]&&s.scores[l.id].stars>0));
}
function regionProgress(subId){
  const sub = subjectById(subId);
  const done = sub.lessons.filter(l=>STATE.scores[l.id]&&STATE.scores[l.id].stars>0).length;
  return {done, total:sub.lessons.length, pct: Math.round(100*done/sub.lessons.length)};
}
/* Niveau de mage : seuils croissants doux */
function levelInfo(xp){
  let level=1, need=100, acc=0;
  while(xp >= acc+need){ acc+=need; level++; need=Math.round(need*1.25); }
  return {level, into: xp-acc, need, pct: Math.round(100*(xp-acc)/need)};
}
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function touchStreak(){
  const t=todayStr();
  if(STATE.lastDay===t) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const ystr=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  STATE.streak = (STATE.lastDay===ystr)? (STATE.streak||0)+1 : 1;
  STATE.lastDay=t;
}

/* ---------------- CARTES MENTALES & VIDÉOS ----------------------------- */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
/* Extrait les notions-clés (mots en gras) du cours pour bâtir la carte mentale */
function extractKeyTerms(html){
  const terms=[]; const re=/<b>(.*?)<\/b>/g; let m;
  while((m=re.exec(html))){
    let t=m[1].replace(/<[^>]+>/g,"").trim();
    if(t && t.toLowerCase()!=="le grimoire :" && !terms.includes(t)) terms.push(t);
  }
  return terms.slice(0,6);
}
function wrapText(s,max){
  const words=String(s).split(" "); const lines=[]; let cur="";
  words.forEach(w=>{ if((cur+" "+w).trim().length>max){ if(cur)lines.push(cur); cur=w; } else cur=(cur+" "+w).trim(); });
  if(cur) lines.push(cur); return lines;
}
/* Génère une carte mentale radiale en SVG à partir des notions-clés de la leçon */
function mindmapSVG(lesson){
  const sub=subjectById(lesson.subjectId); const color=sub.color;
  const terms=extractKeyTerms(lesson.cours);
  const cx=260, cy=170, rx=185, ry=120, n=Math.max(terms.length,1);
  let nodes="";
  terms.forEach((t,i)=>{
    const ang=(-90 + i*(360/n))*Math.PI/180;
    const x=cx+rx*Math.cos(ang), y=cy+ry*Math.sin(ang);
    const lines=wrapText(t,16);
    const w=Math.min(160, Math.max(64, t.length*7+16)), h=18*lines.length+14;
    nodes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${color}" stroke-width="2" opacity="0.55"/>`;
    nodes+=`<rect x="${x-w/2}" y="${y-h/2}" width="${w}" height="${h}" rx="10" fill="#2c2456" stroke="${color}" stroke-width="1.5"/>`;
    lines.forEach((ln,li)=>{
      const ty=y-(lines.length-1)*9+li*18+4;
      nodes+=`<text x="${x}" y="${ty}" text-anchor="middle" font-size="12" fill="#f3eefc" font-weight="600">${esc(ln)}</text>`;
    });
  });
  const tl=wrapText(lesson.title,18); let title="";
  tl.forEach((ln,li)=>{
    const ty=cy-(tl.length-1)*10+li*20+5;
    title+=`<text x="${cx}" y="${ty}" text-anchor="middle" font-size="15" fill="#1a1633" font-weight="800">${esc(ln)}</text>`;
  });
  return `<svg viewBox="0 0 520 340" width="100%" style="max-height:340px" xmlns="http://www.w3.org/2000/svg">
    ${nodes}
    <ellipse cx="${cx}" cy="${cy}" rx="98" ry="58" fill="${color}"/>
    ${title}
  </svg>`;
}

function buildDiagnostic(){
  // 1 question représentative par matière (la 1ère de la 1ère leçon)
  return CONTENT.subjects.map(s=>{
    const l=s.lessons[0];
    return {subjectId:s.id, subjectName:s.name, icon:s.icon, lesson:l.title, q:l.questions[0]};
  });
}
function renderDiagnosticIntro(){
  app.innerHTML=`
  <div class="card center">
    <h1>🔮 Le Test de l'Oracle</h1>
    <p class="muted" style="max-width:620px;margin:0 auto">
      Avant de commencer ton aventure, l'Oracle va te poser <b>une petite question par matière</b>
      pour découvrir tes points forts. Ce n'est pas une note : c'est juste pour bien te guider.
      Réponds tranquillement — chaque réponse fait briller une étoile ⭐.
    </p>
    <div style="margin-top:18px">
      <button class="btn big" id="goDiag">Commencer le test 🔮</button>
      <button class="btn ghost" id="skipDiag">Passer pour l'instant</button>
    </div>
  </div>`;
  document.getElementById("goDiag").onclick=()=>runDiagnostic();
  document.getElementById("skipDiag").onclick=()=>{ STATE.diagnosticDone=true; save(); renderMap(); };
}
function runDiagnostic(){
  const items=buildDiagnostic();
  let i=0; const result={};
  function step(){
    if(i>=items.length){ finish(); return; }
    const it=items[i];
    renderSingleQuestion({
      header:`🔮 Test de l'Oracle — ${it.icon} ${it.subjectName}`,
      sub:`Question ${i+1} sur ${items.length}`,
      question:it.q,
      onAnswer:(correct)=>{
        result[it.subjectId]={right:(result[it.subjectId]?.right||0)+(correct?1:0), total:1, name:it.subjectName};
      },
      onNext:()=>{ i++; step(); },
      lastLabel: (i===items.length-1)?"Voir mon profil ✨":"Question suivante →"
    });
  }
  function finish(){
    STATE.diagnostic=result; STATE.diagnosticDone=true; save();
    const lines=CONTENT.subjects.map(s=>{
      const r=result[s.id]; const ok=r&&r.right>0;
      return `<div class="quest"><div class="qix">${s.icon}</div>
        <div class="qmeta"><div class="qt">${s.name}</div>
        <div class="small muted">${ok?"Belle base ! On consolidera ✨":"À travailler en priorité — on va t'aider 💪"}</div></div>
        <div class="stars">${ok?"⭐":"☆"}</div></div>`;
    }).join("");
    app.innerHTML=`
      <div class="card">
        <h1 class="center">✨ Ton profil de départ</h1>
        <p class="center muted">L'Oracle a parlé. Voici où tu en es — et tout va progresser !</p>
        <div class="quests" style="margin-top:14px">${lines}</div>
        <div class="center" style="margin-top:18px">
          <button class="btn big" id="toMap">Découvrir le royaume 🗺️</button>
        </div>
      </div>`;
    document.getElementById("toMap").onclick=renderMap;
    addXP(20,"Test terminé"); save();
  }
  step();
}
