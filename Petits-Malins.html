<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<!-- zoom autorisé pour l'accessibilité (malvoyants) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'École des Petits Malins</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Comic Sans MS','Trebuchet MS',system-ui,sans-serif;background:linear-gradient(160deg,#fef9f0,#fde6f0 50%,#e0f2fe);min-height:100vh;color:#1f2937;}
  .shell{max-width:920px;margin:0 auto;padding:16px;}
  .pm-head{display:flex;justify-content:center;margin:6px 0 2px;}
  .pm-logo{font-size:clamp(22px,5vw,34px);font-weight:bold;color:#8b5cf6;text-shadow:2px 2px 0 #fff;}
  .pm-foot{text-align:center;color:#6b7280;font-size:14px;margin-top:26px;}
  /* En standalone, #pmRoot n'a pas besoin de son propre fond/cadre (le body est déjà clair) */
  #pmRoot{background:transparent;padding:4px 0;margin-top:2px;}
</style>
<style id="pmStyle">
/* ===== LES PETITS MALINS — styles scopés sous #pmRoot (intégration native) =====
   Tout est préfixé par #pmRoot pour ne PAS déteindre sur le Royaume
   (sélecteurs globaux *, body, :root, .wrap, .feedback, .logo, @keyframes pop/fall). */
#pmRoot{
  --pm-bleu:#3b82f6; --pm-vert:#22c55e; --pm-orange:#f59e0b; --pm-rose:#ec4899;
  --pm-violet:#8b5cf6; --pm-rouge:#ef4444; --pm-jaune:#fde047;
  --pm-carte:#ffffff; --pm-texte:#1f2937;
  font-family:'Comic Sans MS','Trebuchet MS',system-ui,sans-serif;
  color:var(--pm-texte);
  background:linear-gradient(160deg,#fef9f0,#fde6f0 50%,#e0f2fe);
  border-radius:18px; padding:16px; margin-top:6px; display:block;
}
#pmRoot *{box-sizing:border-box;}
#pmRoot button{font-family:inherit;}

/* Bandeau de contrôle sobre (âge / score / mode calme) — un seul en-tête,
   la topbar du Royaume reste la barre principale. */
#pmRoot .pm-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;}
#pmRoot .pm-age{display:flex;gap:6px;background:#fff;border-radius:999px;padding:5px;box-shadow:0 3px 0 #e5d4b8;}
#pmRoot .pm-age button{border:none;background:transparent;border-radius:999px;padding:7px 14px;font-size:15px;font-weight:bold;cursor:pointer;color:#9ca3af;}
#pmRoot .pm-age button.on{background:var(--pm-orange);color:#fff;}
#pmRoot .pm-score{background:#fff;border-radius:999px;padding:6px 14px;font-size:18px;font-weight:bold;box-shadow:0 3px 0 #e5d4b8;}
#pmRoot .pm-calme{border:none;background:#fff;border-radius:999px;padding:7px 14px;font-size:14px;font-weight:bold;cursor:pointer;color:#4b5563;box-shadow:0 3px 0 #e5d4b8;}
#pmRoot .pm-calme.on{background:#312e81;color:#fff;box-shadow:0 3px 0 #1e1b4b;}

#pmRoot .pm-bar{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
#pmRoot .btn-back{background:#fff;border:none;border-radius:999px;padding:9px 16px;font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 4px 0 #d1d5db;color:var(--pm-texte);font-family:inherit;min-height:44px;}
#pmRoot .btn-back:active{transform:translateY(3px);box-shadow:0 1px 0 #d1d5db;}
#pmRoot .btn-back:disabled{opacity:.45;}
#pmRoot h2.titre{text-align:center;font-size:clamp(22px,4.5vw,30px);color:var(--pm-bleu);margin:6px 0 14px;text-shadow:1px 1px 0 #fff;}

#pmRoot .grille{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
#pmRoot .tuile{border:none;border-radius:28px;padding:28px 16px;cursor:pointer;color:#fff;font-size:clamp(20px,4vw,26px);font-weight:bold;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 8px 0 rgba(0,0,0,.18);transition:transform .08s;}
#pmRoot .tuile:active{transform:translateY(5px);box-shadow:0 3px 0 rgba(0,0,0,.18);}
#pmRoot .tuile .emo{font-size:54px;}
#pmRoot .t-lecture{background:linear-gradient(160deg,#fb7185,#e11d48);}
#pmRoot .t-calcul{background:linear-gradient(160deg,#60a5fa,#2563eb);}
#pmRoot .t-langues{background:linear-gradient(160deg,#34d399,#059669);}
#pmRoot .t-histoire{background:linear-gradient(160deg,#fbbf24,#d97706);}

#pmRoot .sous-menu{display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;}
#pmRoot .gros-btn{border:none;border-radius:22px;padding:20px;font-size:22px;font-weight:bold;font-family:inherit;cursor:pointer;color:#fff;display:flex;align-items:center;gap:14px;box-shadow:0 6px 0 rgba(0,0,0,.18);text-align:left;}
#pmRoot .gros-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
#pmRoot .gros-btn .emo{font-size:38px;}

#pmRoot .carte-jeu{background:var(--pm-carte);border-radius:28px;padding:26px 20px;box-shadow:0 10px 0 #e5d4b8;text-align:center;max-width:620px;margin:0 auto;}
#pmRoot .consigne{font-size:22px;color:#4b5563;margin-bottom:6px;}
#pmRoot .question{font-size:clamp(40px,11vw,80px);font-weight:bold;margin:14px 0;color:var(--pm-texte);line-height:1.1;}
#pmRoot .question.petit{font-size:clamp(24px,6vw,40px);}
#pmRoot .emoji-rang{font-size:clamp(30px,8vw,52px);line-height:1.3;word-spacing:6px;margin:10px 0;}

#pmRoot .choix{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px;}
#pmRoot .choix.trois{grid-template-columns:repeat(3,1fr);}
#pmRoot .choix button{border:none;border-radius:20px;padding:22px 10px;font-size:30px;font-weight:bold;font-family:inherit;cursor:pointer;background:#eef2ff;color:var(--pm-texte);box-shadow:0 5px 0 #c7d2fe;transition:transform .06s;min-height:64px;}
#pmRoot .choix button:active{transform:translateY(3px);box-shadow:0 2px 0 #c7d2fe;}
/* Réussite/erreur : couleur + symbole (✓/✗) pour ne pas dépendre de la seule couleur (accessibilité daltonisme) */
#pmRoot .choix button.bon{background:var(--pm-vert);color:#fff;box-shadow:0 5px 0 #15803d;}
#pmRoot .choix button.bon::after{content:" ✓";}
#pmRoot .choix button.faux{background:var(--pm-rouge);color:#fff;box-shadow:0 5px 0 #991b1b;}
#pmRoot .choix button.faux::after{content:" ✗";}
#pmRoot .choix button:disabled{cursor:default;}

#pmRoot .btn-son{background:var(--pm-jaune);border:none;border-radius:999px;padding:14px 22px;font-size:20px;font-weight:bold;font-family:inherit;cursor:pointer;box-shadow:0 5px 0 #ca8a04;margin:6px;min-height:48px;}
#pmRoot .btn-son:active{transform:translateY(3px);box-shadow:0 2px 0 #ca8a04;}

#pmRoot .feedback{font-size:24px;font-weight:bold;min-height:42px;margin-top:16px;line-height:1.35;}
#pmRoot .feedback.ok{color:#15803d;}
#pmRoot .feedback.non{color:#b45309;}

#pmRoot .btn-suite{background:var(--pm-violet);color:#fff;border:none;border-radius:20px;padding:16px 32px;font-size:22px;font-weight:bold;font-family:inherit;cursor:pointer;box-shadow:0 6px 0 #6d28d9;margin-top:18px;min-height:52px;}
#pmRoot .btn-suite:active{transform:translateY(4px);box-shadow:0 2px 0 #6d28d9;}

#pmRoot .mot-img{font-size:96px;margin:6px 0;}
#pmRoot .mot-fr{font-size:30px;color:#4b5563;}
#pmRoot .mot-cible{font-size:clamp(36px,9vw,56px);font-weight:bold;color:#047857;margin:6px 0;}
#pmRoot .drapeaux{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
#pmRoot .drapeaux button{font-size:18px;border:none;background:#fff;border-radius:14px;padding:10px 14px;cursor:pointer;box-shadow:0 4px 0 #e5e7eb;font-family:inherit;font-weight:bold;min-height:48px;}
#pmRoot .drapeaux button.on{background:var(--pm-jaune);box-shadow:0 4px 0 #ca8a04;}

#pmRoot .lecon{text-align:left;font-size:20px;line-height:1.6;color:#374151;}
#pmRoot .lecon h3{font-size:26px;color:var(--pm-orange);margin-bottom:10px;text-align:center;}
#pmRoot .lecon .ill{font-size:70px;text-align:center;display:block;margin:8px 0;}

#pmRoot .barre{display:flex;justify-content:center;gap:6px;margin-top:14px;flex-wrap:wrap;}
#pmRoot .pastille{width:16px;height:16px;border-radius:50%;background:#e5e7eb;}
#pmRoot .pastille.faite{background:var(--pm-vert);}

#pmRoot .pm-clavier{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:280px;margin:14px auto 4px;}
#pmRoot .touche{border:none;border-radius:16px;padding:18px;font-size:28px;font-weight:bold;font-family:inherit;background:#eef2ff;color:var(--pm-texte);box-shadow:0 4px 0 #c7d2fe;cursor:pointer;min-height:56px;}
#pmRoot .touche:active{transform:translateY(2px);box-shadow:0 2px 0 #c7d2fe;}
#pmRoot .touche:disabled{opacity:.45;}
#pmRoot .saisie-box{font-size:clamp(40px,11vw,68px);font-weight:bold;min-height:1.2em;color:var(--pm-bleu);letter-spacing:2px;}
#pmRoot .niveau-badge{display:inline-block;background:rgba(255,255,255,.3);border-radius:999px;padding:2px 10px;font-size:14px;margin-left:6px;}

/* Remettre la phrase en ordre — cibles tactiles agrandies (audit) */
#pmRoot .phrase-cible{min-height:60px;font-size:24px;margin:14px 0;padding:12px;border:3px dashed #c7d2fe;border-radius:16px;}
#pmRoot .phrase-banque{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
#pmRoot .mot-btn{border:none;border-radius:14px;padding:14px 18px;font-size:20px;font-weight:bold;font-family:inherit;background:#eef2ff;color:var(--pm-texte);box-shadow:0 4px 0 #c7d2fe;cursor:pointer;min-height:48px;}
#pmRoot .mot-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c7d2fe;}

#pmRoot .cacher{display:none;}
#pmRoot .pop{animation:pmpop .3s;}
@keyframes pmpop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}

/* Mode calme côté petits : plus aucune animation ni transition */
#pmRoot.calme *{animation:none !important;transition:none !important;}
/* Police adaptée dyslexie (OpenDyslexic via CDN, repli Comic Neue / Verdana). */
@font-face{
  font-family:'OpenDyslexic';
  src:url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.woff2') format('woff2'),
      url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.woff') format('woff');
  font-weight:normal;font-style:normal;font-display:swap;
}
#pmRoot.dys, #pmRoot.dys button, #pmRoot.dys input{
  font-family:'OpenDyslexic','Comic Neue','Comic Sans MS',Verdana,sans-serif !important;
  letter-spacing:.04em;word-spacing:.06em;
}
#pmRoot.dys{line-height:1.7;}

/* Confettis : ajoutés à <body>, donc nommés à part (pas de collision avec le Royaume) */
.pm-confetti{position:fixed;top:-20px;font-size:26px;animation:pmfall 2.2s linear forwards;z-index:50;pointer-events:none;}
@keyframes pmfall{to{transform:translateY(110vh) rotate(420deg);opacity:.4;}}
</style>
</head>
<body>
  <div class="shell">
    <header class="pm-head"><div class="pm-logo">🎒 Les Petits Malins</div></header>
    <div id="pmRoot"></div>
    <footer class="pm-foot">Fait avec ❤️ pour les enfants · prononciation par synthèse vocale (optionnelle) · mode calme disponible</footer>
  </div>
<script>
/* ====================================================================
   LES PETITS MALINS — module natif intégré au Royaume (sans iframe)
   --------------------------------------------------------------------
   Tout est encapsulé dans window.PM (IIFE) pour éviter les collisions
   de noms globaux avec le Royaume (state, app, r, choisir, melanger,
   parler, gagner, entete, confettis, bravo, menuLecture, …).
   Rendu dans le conteneur #pmRoot fourni par mount() ; le CSS est scopé
   sous #pmRoot (cf. <style id="pmStyle">).
   Améliorations d'audit incluses : B (carte mentale en FIN d'activité,
   suppression des liens YouTube ouverts), C (feedback formatif + repli
   écrit pour les jeux d'écoute), D (mode calme persistant), E (consigne
   « lettre », texte Colomb).
   ==================================================================== */
var PM = (function(){
  "use strict";

  /* ---------- état + persistance (clés namespacées par profil) -------- */
  var KEY_SCORE='pm_score', KEY_AGE='pm_age', KEY_CALME='pm_calme', KEY_DYS='pm_dys';
  var root=null;     // #pmRoot
  var app=null;      // #pmContent (zone de contenu remplacée à chaque vue)
  var state={ age:'petit', score:0, vue:'accueil', calme:false, dys:false };

  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

  /* ---------- voix ----------
     speak() = prononciation explicite (bouton 🔊), marche toujours.
     say()   = narration automatique au chargement d'un écran : coupée
               en mode calme (consigne D). */
  function speak(texte, langue){
    try{ speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(texte); u.lang=langue||'fr-FR'; u.rate=0.9;
      speechSynthesis.speak(u);
    }catch(e){}
  }
  function say(texte, langue){ if(state.calme) return; speak(texte, langue); }

  /* ---------- outils ---------- */
  var r=function(n){ return Math.floor(Math.random()*n); };
  var choisir=function(arr){ return arr[r(arr.length)]; };
  function melanger(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=r(i+1); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function q(s){ return String(s).replace(/'/g,"\\'"); } // pour insérer dans onclick="...'...'"

  function confettis(){
    if(state.calme) return;                 // mode calme : pas de confettis
    var emos=['🎉','⭐','🌟','🎈','✨','🥳'];
    for(var i=0;i<18;i++){
      var c=document.createElement('div'); c.className='pm-confetti';
      c.textContent=choisir(emos); c.style.left=r(100)+'vw'; c.style.animationDelay=(r(8)/10)+'s';
      document.body.appendChild(c);
      (function(el){ setTimeout(function(){ if(el&&el.remove) el.remove(); },2500); })(c);
    }
  }
  function bravo(){ confettis(); say(choisir(['Bravo !','Super !','Génial !','Bien joué !'])); }

  function gagner(n){
    state.score += n;
    var e=document.getElementById('pmScore'); if(e) e.textContent=state.score;
    lsSet(KEY_SCORE, String(state.score));
  }

  function barreHTML(total, faites){
    var h='<div class="barre">';
    for(var i=0;i<total;i++) h+='<div class="pastille '+(i<faites?'faite':'')+'"></div>';
    return h+'</div>';
  }

  /* zone d'options : désactive tout / révèle la bonne réponse (data-v) */
  function disableZone(){ var z=document.getElementById('zone'); if(!z) return; var b=z.querySelectorAll('button'); for(var i=0;i<b.length;i++) b[i].disabled=true; }
  function montrerBonne(val){ var z=document.getElementById('zone'); if(!z) return; var b=z.querySelectorAll('button'); for(var i=0;i<b.length;i++){ if(b[i].getAttribute('data-v')===String(val)) b[i].classList.add('bon'); b[i].disabled=true; } }

  /* ---------- en-tête de vue (barre Retour interne) ---------- */
  function entete(titre, retour){
    retour = retour || 'vueAccueil';
    return '<div class="pm-bar"><button class="btn-back" onclick="PM.'+retour+'()">⬅ Retour</button>'+
           '<h2 class="titre" style="margin:0;flex:1;">'+titre+'</h2><div style="width:90px"></div></div>';
  }

  /* ==================================================================
     CARTE MENTALE RÉCAPITULATIVE (B) — affichée en FIN d'activité,
     après une série de bonnes réponses : « voici ce que tu as appris ».
     Plus aucun lien YouTube ouvert (retiré pour des raisons de sécurité).
     ================================================================== */
  var CARTES = {
    lecture:{titre:'La lecture', c:'#e11d48', noeuds:['Les voyelles a e i o u','Les consonnes','Les syllabes ba be bi','Lire des mots','Lire des phrases']},
    calcul:{titre:'Le calcul', c:'#2563eb', noeuds:['Compter','Additionner +','Soustraire −','Multiplier ×','Diviser ÷']},
    langues:{titre:'Les langues', c:'#059669', noeuds:['Anglais','Espagnol','Italien','Les nombres','Les couleurs']},
    histoire:{titre:'Le temps', c:'#d97706', noeuds:['Prehistoire','Antiquite','Moyen Age','Temps modernes','Aujourd hui']}
  };
  function carteMentaleSVG(key){
    var d=CARTES[key]; var cx=260,cy=160,rx=190,ry=110,n=d.noeuds.length; var nodes="";
    d.noeuds.forEach(function(t,i){
      var ang=(-90+i*(360/n))*Math.PI/180; var x=cx+rx*Math.cos(ang), y=cy+ry*Math.sin(ang);
      var w=Math.max(96,t.length*8+18), h=34;
      nodes+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x+'" y2="'+y+'" stroke="'+d.c+'" stroke-width="3" opacity=".5"/>';
      nodes+='<rect x="'+(x-w/2)+'" y="'+(y-h/2)+'" width="'+w+'" height="'+h+'" rx="12" fill="#fff" stroke="'+d.c+'" stroke-width="2"/>';
      nodes+='<text x="'+x+'" y="'+(y+5)+'" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">'+t+'</text>';
    });
    return '<svg viewBox="0 0 520 320" width="100%" style="max-height:320px" role="img" aria-label="Carte mentale : '+d.titre+'">'+nodes+
           '<ellipse cx="'+cx+'" cy="'+cy+'" rx="92" ry="52" fill="'+d.c+'"/><text x="'+cx+'" y="'+(cy+7)+'" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">'+d.titre+'</text></svg>';
  }

  /* compteur de bonnes réponses par matière → carte mentale tous les SEUIL */
  var SEUIL=5;
  var prog={lecture:0,calcul:0,langues:0,histoire:0};
  var _recapCB=null;
  function bumpProgress(mat, cb){
    prog[mat]=(prog[mat]||0)+1;
    if(prog[mat]>=SEUIL){ prog[mat]=0; montrerRecap(mat, cb); }
    else if(cb) cb();
  }
  function montrerRecap(mat, cb){
    _recapCB = cb || vueAccueil;
    var retour={lecture:'menuLecture',calcul:'menuCalcul',langues:'menuLangues',histoire:'menuHistoire'}[mat]||'vueAccueil';
    confettis();
    app.innerHTML = entete('🧠 Ce que tu as appris', retour) +
      '<div class="carte-jeu">'+
        '<p class="consigne">Bravo ! Voici une carte pour résumer ce que tu viens de travailler :</p>'+
        '<div style="background:#f8fafc;border-radius:18px;padding:10px">'+carteMentaleSVG(mat)+'</div>'+
        '<div><button class="btn-suite" onclick="PM.recapContinuer()">Continuer ➡</button></div>'+
      '</div>';
  }
  function recapContinuer(){ var cb=_recapCB; _recapCB=null; (cb||vueAccueil)(); }

  /* ==================================================================
     ACCUEIL + bandeau de contrôle (âge / score / mode calme)
     ================================================================== */
  function controlsHTML(){
    return '<div class="pm-controls">'+
      '<div class="pm-age" id="pmAge">'+
        '<button data-age="petit" class="'+(state.age==='petit'?'on':'')+'" onclick="PM.setAge(\'petit\')">🐣 Petits</button>'+
        '<button data-age="grand" class="'+(state.age==='grand'?'on':'')+'" onclick="PM.setAge(\'grand\')">🦉 Grands</button>'+
      '</div>'+
      '<div class="pm-score">⭐ <span id="pmScore">'+state.score+'</span></div>'+
      '<button class="pm-calme" id="pmCalmeBtn" onclick="PM.toggleCalme()" aria-pressed="'+(state.calme?'true':'false')+'">'+(state.calme?'🌙 Mode calme ✓':'🔔 Mode calme')+'</button>'+
      '<button class="pm-calme" id="pmDysBtn" onclick="PM.toggleDys()" aria-pressed="'+(state.dys?'true':'false')+'">'+(state.dys?'🔤 Police dys ✓':'🔤 Police dys')+'</button>'+
    '</div>';
  }
  function vueAccueil(){
    state.vue='accueil';
    app.innerHTML =
      '<h2 class="titre">Choisis ton aventure !</h2>'+
      '<div class="grille">'+
        '<button class="tuile t-lecture" onclick="PM.ouvrir(\'lecture\')"><span class="emo">📖</span>Lecture</button>'+
        '<button class="tuile t-calcul" onclick="PM.ouvrir(\'calcul\')"><span class="emo">🔢</span>Calcul</button>'+
        '<button class="tuile t-langues" onclick="PM.ouvrir(\'langues\')"><span class="emo">🌍</span>Langues</button>'+
        '<button class="tuile t-histoire" onclick="PM.ouvrir(\'histoire\')"><span class="emo">🏰</span>Histoire</button>'+
      '</div>';
  }
  function ouvrir(mat){
    if(mat==='lecture') menuLecture();
    else if(mat==='calcul') menuCalcul();
    else if(mat==='langues') menuLangues();
    else if(mat==='histoire') menuHistoire();
  }

  function setAge(a){
    state.age=a; lsSet(KEY_AGE,a);
    var btns=root.querySelectorAll('#pmAge button');
    for(var i=0;i<btns.length;i++) btns[i].classList.toggle('on', btns[i].getAttribute('data-age')===a);
    vueAccueil();
  }
  function applyCalme(){
    if(root) root.classList.toggle('calme', state.calme);
    var b=document.getElementById('pmCalmeBtn');
    if(b){ b.textContent = state.calme?'🌙 Mode calme ✓':'🔔 Mode calme'; b.setAttribute('aria-pressed', state.calme?'true':'false'); }
    if(state.calme){ try{ speechSynthesis.cancel(); }catch(e){} }
  }
  function toggleCalme(){ state.calme=!state.calme; lsSet(KEY_CALME, state.calme?'1':'0'); applyCalme(); }
  function applyDys(){
    if(root) root.classList.toggle('dys', state.dys);
    var b=document.getElementById('pmDysBtn');

  function genOp(op){
    var a,b,res; var grand=state.age==='grand';
    if(op==='+'){ if(grand){ a=11+r(89); b=11+r(89);} else { a=1+r(10); b=1+r(10);} res=a+b; }
    else if(op==='-'){ if(grand){ a=25+r(75); b=5+r(a-5);} else { a=1+r(10); b=1+r(a);} res=a-b; }
    else if(op==='×'){ if(grand){ a=2+r(11); b=2+r(11);} else { a=1+r(5); b=1+r(5);} res=a*b; }
    else { if(grand){ b=2+r(8); res=2+r(11);} else { b=1+r(5); res=1+r(5);} a=b*res; }
    return {a:a,b:b,res:res};
  }
  var NOMS_OP={'+':'plus','-':'moins','×':'fois','÷':'divisé par'};
  var TITRES_OP={'+':'➕ Additions','-':'➖ Soustractions','×':'✖️ Multiplications','÷':'➗ Divisions'};
  function jeuOp(op){
    var g=genOp(op), a=g.a, b=g.b, res=g.res;
    say(a+' '+NOMS_OP[op]+' '+b);
    if(state.age==='grand'){
      app.innerHTML = entete(TITRES_OP[op],'menuCalcul') +
        '<div class="carte-jeu">'+
          '<p class="consigne">Écris le résultat</p>'+

          '<div class="saisie-box" id="saisie">?</div>'+

          clavierHTML()+
          '<div class="feedback" id="fb"></div>'+
        '</div>';
      demarrerSaisie(res, function(){ jeuOp(op); }, a+' '+op+' '+b+' = '+res);
      return;
    }
    var opts={}; opts[res]=1;
    while(Object.keys(opts).length<3){ var d=res + (r(2)?1:-1)*(1+r(5)); if(d>=0) opts[d]=1; }
    var liste=melanger(Object.keys(opts).map(Number));
    app.innerHTML = entete(TITRES_OP[op],'menuCalcul') +
      '<div class="carte-jeu">'+
        '<p class="consigne">Combien font...</p>'+
        '<div class="question">'+a+' '+op+' '+b+' = ?</div>'+
        '<button class="btn-son" onclick="PM.dire(\''+a+' '+NOMS_OP[op]+' '+b+'\')">🔊 Réécouter</button>'+
        '<div class="choix trois" id="zone">'+
          liste.map(function(o){ return '<button data-v="'+o+'" onclick="PM.repOp(this,'+o+','+res+',\''+op+'\','+a+','+b+')">'+o+'</button>'; }).join('')+
        '</div>'+
        '<div class="feedback" id="fb"></div>'+
      '</div>';
  }
  function repOp(btn,choix,bon,op,a,b){
    var fb=document.getElementById('fb');
    if(choix===bon){ btn.classList.add('bon'); fb.textContent='✅ '+bon+' !'; fb.className='feedback ok'; say(''+bon); gagner(3); bravo(); disableZone();
      setTimeout(function(){ bumpProgress('calcul', function(){ jeuOp(op); }); },1300);

      setTimeout(function(){ bumpProgress('calcul', function(){ jeuOp(op); }); },1900);
    }
  }

  /* Saisie au clavier (mode grands) */
  var _saisie='', _bonneRep=null, _suiteCB=null, _saisieSol='';
  function clavierHTML(){
    var t='';
    for(var n=1;n<=9;n++) t+='<button class="touche" onclick="PM.tape(\''+n+'\')">'+n+'</button>';
    t+='<button class="touche" onclick="PM.efface()">⌫</button>';
    t+='<button class="touche" onclick="PM.tape(\'0\')">0</button>';
    t+='<button class="touche" style="background:var(--pm-vert);color:#fff;box-shadow:0 4px 0 #15803d" onclick="PM.valider()">✓</button>';
    return '<div class="pm-clavier">'+t+'</div>';
  }
  function demarrerSaisie(bon, suite, sol){ _saisie=''; _bonneRep=bon; _suiteCB=suite; _saisieSol=sol||(''+bon); majSaisie(); }
  function tape(d){ if(_saisie.length<6){ _saisie+=d; majSaisie(); } }
  function efface(){ _saisie=_saisie.slice(0,-1); majSaisie(); }
  function majSaisie(){ var e=document.getElementById('saisie'); if(e) e.textContent=_saisie||'?'; }
  function valider(){
