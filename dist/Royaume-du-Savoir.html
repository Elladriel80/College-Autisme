  var KEY_SCORE='pm_score', KEY_AGE='pm_age', KEY_CALME='pm_calme';
  var root=null;     // #pmRoot
  var app=null;      // #pmContent (zone de contenu remplacée à chaque vue)
  var state={ age:'petit', score:0, vue:'accueil', calme:false };

  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

  /* ---------- voix ----------
     speak() = prononciation explicite (bouton 🔊), marche toujours.
     say()   = narration automatique au chargement d'un écran : coupée
               en mode calme (consigne D). */
  function speak(texte, langue){
    try{ speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(texte); u.lang=langue||'fr-FR'; u.rate=0.9;
      speechSynthesis.speak(u);
    }catch(e){}
  }
  function say(texte, langue){ if(state.calme) return; speak(texte, langue); }

  /* ---------- outils ---------- */
  var r=function(n){ return Math.floor(Math.random()*n); };
  var choisir=function(arr){ return arr[r(arr.length)]; };
  function melanger(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=r(i+1); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function q(s){ return String(s).replace(/'/g,"\\'"); } // pour insérer dans onclick="...'...'"

  function confettis(){
    if(state.calme) return;                 // mode calme : pas de confettis
    var emos=['🎉','⭐','🌟','🎈','✨','🥳'];
    for(var i=0;i<18;i++){
      var c=document.createElement('div'); c.className='pm-confetti';
      c.textContent=choisir(emos); c.style.left=r(100)+'vw'; c.style.animationDelay=(r(8)/10)+'s';
      document.body.appendChild(c);
      (function(el){ setTimeout(function(){ if(el&&el.remove) el.remove(); },2500); })(c);
    }
  }
  function bravo(){ confettis(); say(choisir(['Bravo !','Super !','Génial !','Bien joué !'])); }

  function gagner(n){
    state.score += n;
    var e=document.getElementById('pmScore'); if(e) e.textContent=state.score;
    lsSet(KEY_SCORE, String(state.score));
  }

  function barreHTML(total, faites){
    var h='<div class="barre">';
    for(var i=0;i<total;i++) h+='<div class="pastille '+(i<faites?'faite':'')+'"></div>';
    return h+'</div>';
  }

  /* zone d'options : désactive tout / révèle la bonne réponse (data-v) */
  function disableZone(){ var z=document.getElementById('zone'); if(!z) return; var b=z.querySelectorAll('button'); for(var i=0;i<b.length;i++) b[i].disabled=true; }
  function montrerBonne(val){ var z=document.getElementById('zone'); if(!z) return; var b=z.querySelectorAll('button'); for(var i=0;i<b.length;i++){ if(b[i].getAttribute('data-v')===String(val)) b[i].classList.add('bon'); b[i].disabled=true; } }

  /* ---------- en-tête de vue (barre Retour interne) ---------- */
  function entete(titre, retour){
    retour = retour || 'vueAccueil';
    return '<div class="pm-bar"><button class="btn-back" onclick="PM.'+retour+'()">⬅ Retour</button>'+
           '<h2 class="titre" style="margin:0;flex:1;">'+titre+'</h2><div style="width:90px"></div></div>';
  }

  /* ==================================================================
     CARTE MENTALE RÉCAPITULATIVE (B) — affichée en FIN d'activité,
     après une série de bonnes réponses : « voici ce que tu as appris ».
     Plus aucun lien YouTube ouvert (retiré pour des raisons de sécurité).
     ================================================================== */
  var CARTES = PM_DATA.CARTES;   /* données dans data/contenu-petits-malins.js */
  function carteMentaleSVG(key){
    var d=CARTES[key]; var cx=260,cy=160,rx=190,ry=110,n=d.noeuds.length; var nodes="";
    d.noeuds.forEach(function(t,i){
      var ang=(-90+i*(360/n))*Math.PI/180; var x=cx+rx*Math.cos(ang), y=cy+ry*Math.sin(ang);
      var w=Math.max(96,t.length*8+18), h=34;
      nodes+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x+'" y2="'+y+'" stroke="'+d.c+'" stroke-width="3" opacity=".5"/>';
      nodes+='<rect x="'+(x-w/2)+'" y="'+(y-h/2)+'" width="'+w+'" height="'+h+'" rx="12" fill="#fff" stroke="'+d.c+'" stroke-width="2"/>';
      nodes+='<text x="'+x+'" y="'+(y+5)+'" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">'+t+'</text>';
    });
    return '<svg viewBox="0 0 520 320" width="100%" style="max-height:320px" role="img" aria-label="Carte mentale : '+d.titre+'">'+nodes+
           '<ellipse cx="'+cx+'" cy="'+cy+'" rx="92" ry="52" fill="'+d.c+'"/><text x="'+cx+'" y="'+(cy+7)+'" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">'+d.titre+'</text></svg>';
  }

  /* compteur de bonnes réponses par matière → carte mentale tous les SEUIL */
  var SEUIL=5;
  var prog={lecture:0,calcul:0,langues:0,histoire:0};
  var _recapCB=null;
  function bumpProgress(mat, cb){
    prog[mat]=(prog[mat]||0)+1;
    if(prog[mat]>=SEUIL){ prog[mat]=0; montrerRecap(mat, cb); }
    else if(cb) cb();
  }
  function montrerRecap(mat, cb){
    _recapCB = cb || vueAccueil;
    var retour={lecture:'menuLecture',calcul:'menuCalcul',langues:'menuLangues',histoire:'menuHistoire'}[mat]||'vueAccueil';
    confettis();
    app.innerHTML = entete('🧠 Ce que tu as appris', retour) +
      '<div class="carte-jeu">'+
        '<p class="consigne">Bravo ! Voici une carte pour résumer ce que tu viens de travailler :</p>'+
        '<div style="background:#f8fafc;border-radius:18px;padding:10px">'+carteMentaleSVG(mat)+'</div>'+
        '<div><button class="btn-suite" onclick="PM.recapContinuer()">Continuer ➡</button></div>'+
      '</div>';
  }
  function recapContinuer(){ var cb=_recapCB; _recapCB=null; (cb||vueAccueil)(); }

  /* ==================================================================
     ACCUEIL + bandeau de contrôle (âge / score / mode calme)
     ================================================================== */
  function controlsHTML(){
    return '<div class="pm-controls">'+
      '<div class="pm-age" id="pmAge">'+
        '<button data-age="petit" class="'+(state.age==='petit'?'on':'')+'" onclick="PM.setAge(\'petit\')">🐣 Petits</button>'+
        '<button data-age="grand" class="'+(state.age==='grand'?'on':'')+'" onclick="PM.setAge(\'grand\')">🦉 Grands</button>'+
      '</div>'+
      '<div class="pm-score">⭐ <span id="pmScore">'+state.score+'</span></div>'+
      '<button class="pm-calme" id="pmCalmeBtn" onclick="PM.toggleCalme()" aria-pressed="'+(state.calme?'true':'false')+'">'+(state.calme?'🌙 Mode calme ✓':'🔔 Mode calme')+'</button>'+
    '</div>';
  }
  function vueAccueil(){
    state.vue='accueil';
    app.innerHTML =
      '<h2 class="titre">Choisis ton aventure !</h2>'+
      '<div class="grille">'+
        '<button class="tuile t-lecture" onclick="PM.ouvrir(\'lecture\')"><span class="emo">📖</span>Lecture</button>'+
        '<button class="tuile t-calcul" onclick="PM.ouvrir(\'calcul\')"><span class="emo">🔢</span>Calcul</button>'+
        '<button class="tuile t-langues" onclick="PM.ouvrir(\'langues\')"><span class="emo">🌍</span>Langues</button>'+
        '<button class="tuile t-histoire" onclick="PM.ouvrir(\'histoire\')"><span class="emo">🏰</span>Histoire</button>'+
      '</div>';
  }
  function ouvrir(mat){
    if(mat==='lecture') menuLecture();
    else if(mat==='calcul') menuCalcul();
    else if(mat==='langues') menuLangues();
    else if(mat==='histoire') menuHistoire();
  }

  function setAge(a){
    state.age=a; lsSet(KEY_AGE,a);
    var btns=root.querySelectorAll('#pmAge button');
    for(var i=0;i<btns.length;i++) btns[i].classList.toggle('on', btns[i].getAttribute('data-age')===a);
    vueAccueil();
  }
  function applyCalme(){
    if(root) root.classList.toggle('calme', state.calme);
    var b=document.getElementById('pmCalmeBtn');
    if(b){ b.textContent = state.calme?'🌙 Mode calme ✓':'🔔 Mode calme'; b.setAttribute('aria-pressed', state.calme?'true':'false'); }
    if(state.calme){ try{ speechSynthesis.cancel(); }catch(e){} }
  }
  function toggleCalme(){ state.calme=!state.calme; lsSet(KEY_CALME, state.calme?'1':'0'); applyCalme(); }

  /* ==================================================================
     MODULE LECTURE
     ================================================================== */
  var ALPHABET="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
  var MOTS = PM_DATA.MOTS;         /* données dans data/contenu-petits-malins.js */
  var PHRASES = PM_DATA.PHRASES;   /* données dans data/contenu-petits-malins.js */

  function menuLecture(){
    state.vue='lecture';
    var grands = state.age==='grand';
    app.innerHTML = entete('📖 Lecture') +
      '<div class="sous-menu">'+
        '<button class="gros-btn t-lecture" onclick="PM.jeuLettres()"><span class="emo">🔤</span>Reconnaître les lettres</button>'+
        '<button class="gros-btn t-lecture" onclick="PM.jeuSons()"><span class="emo">🔡</span>La première lettre des mots</button>'+
        '<button class="gros-btn t-lecture" onclick="PM.jeuMots()"><span class="emo">🖼️</span>Lire des mots</button>'+
        (grands?'<button class="gros-btn t-lecture" onclick="PM.jeuPhrases()"><span class="emo">📝</span>Remettre une phrase en ordre</button>'+
        '<button class="gros-btn t-lecture" onclick="PM.jeuComprehension()"><span class="emo">🧠</span>Lire et comprendre<span class="niveau-badge">texte + questions</span></button>':'')+
      '</div>';
  }

  /* Reconnaître la lettre — la lettre cible est AFFICHÉE (repli écrit, C) :
     jouable sans son et en mode calme. */
  function jeuLettres(){
    var bonne=choisir(ALPHABET);
    var opts={}; opts[bonne]=1;
    while(Object.keys(opts).length<(state.age==='petit'?3:4)) opts[choisir(ALPHABET)]=1;
    var liste=melanger(Object.keys(opts));
    say('Touche la lettre '+bonne);
    app.innerHTML = entete('🔤 Les lettres','menuLecture') +
      '<div class="carte-jeu">'+
        '<p class="consigne">Touche la même lettre :</p>'+
        '<div class="question">'+bonne+'</div>'+
        '<button class="btn-son" onclick="PM.dire(\'La lettre '+bonne+'\')">🔊 Écouter</button>'+
        '<div class="choix '+(liste.length===3?'trois':'')+'" id="zone">'+
          liste.map(function(l){ return '<button data-v="'+l+'" onclick="PM.repLettre(this,\''+l+'\',\''+bonne+'\')">'+l+'</button>'; }).join('')+
        '</div>'+
        '<div class="feedback" id="fb"></div>'+
      '</div>';
  }
  function repLettre(btn, choix, bonne){
    var fb=document.getElementById('fb');
    if(choix===bonne){ btn.classList.add('bon'); fb.textContent="✅ Bravo, c'est le "+bonne+' !'; fb.className='feedback ok'; gagner(2); bravo(); disableZone();
      setTimeout(function(){ bumpProgress('lecture', jeuLettres); },1300);
    } else { btn.classList.add('faux'); montrerBonne(bonne); fb.textContent='👀 Regarde : la bonne lettre était '+bonne; fb.className='feedback non';
      setTimeout(function(){ bumpProgress('lecture', jeuLettres); },1900);
    }
  }

  /* Première lettre d'un mot (E : consigne « lettre », le code compare bien
     la 1ʳᵉ lettre écrite). La lettre est affichée → jouable sans son. */
  function jeuSons(){
    var cible=choisir(MOTS);
    var lettre=cible.mot[0];
    var autres=melanger(MOTS.filter(function(m){ return m.mot[0]!==lettre; })).slice(0,2);
    var opts=melanger([cible].concat(autres));
    say('Quel mot commence par la lettre '+lettre);
    app.innerHTML = entete('🔡 La première lettre','menuLecture') +
      '<div class="carte-jeu">'+
        '<p class="consigne">Quel mot commence par la lettre…</p>'+
        '<div class="question">'+lettre+'</div>'+
        '<button class="btn-son" onclick="PM.dire(\'La lettre '+lettre+'\')">🔊 Écouter</button>'+
        '<div class="choix trois" id="zone">'+
          opts.map(function(m){ return '<button data-v="'+m.mot[0]+'" style="font-size:46px" aria-label="'+m.mot+'" onclick="PM.repSon(this,\''+m.mot[0]+'\',\''+lettre+'\',\''+q(m.mot)+'\')">'+m.img+'</button>'; }).join('')+
        '</div>'+
        '<div class="feedback" id="fb"></div>'+
      '</div>';
  }
  function repSon(btn, prem, lettre, motCible){
    var fb=document.getElementById('fb');
    if(prem===lettre){ btn.classList.add('bon'); fb.textContent='✅ '+motCible+' commence par '+lettre+' !'; fb.className='feedback ok'; say(motCible); gagner(2); bravo(); disableZone();
      setTimeout(function(){ bumpProgress('lecture', jeuSons); },1500);
    } else { btn.classList.add('faux'); montrerBonne(lettre); fb.textContent='👂 La bonne réponse : '+motCible+' (lettre '+lettre+')'; fb.className='feedback non';
      setTimeout(function(){ bumpProgress('lecture', jeuSons); },1900);
    }
  }

  /* Associer image → mot écrit */
  function jeuMots(){
    var cible=choisir(MOTS);
    var autres=melanger(MOTS.filter(function(m){ return m.mot!==cible.mot; })).slice(0, state.age==='petit'?2:3);
    var opts=melanger([cible].concat(autres));
    say(cible.mot);
    app.innerHTML = entete('🖼️ Lire des mots','menuLecture') +
      '<div class="carte-jeu">'+
        '<p class="consigne">Quel mot va avec l\'image ?</p>'+
        '<div class="mot-img pop" aria-label="'+cible.mot+'">'+cible.img+'</div>'+
        '<button class="btn-son" onclick="PM.dire(\''+q(cible.mot)+'\')">🔊 Écouter le mot</button>'+
        '<div class="choix '+(opts.length===3?'trois':'')+'" id="zone">'+
          opts.map(function(m){ return '<button data-v="'+q(m.mot)+'" style="font-size:24px" onclick="PM.repMot(this,\''+q(m.mot)+'\',\''+q(cible.mot)+'\')">'+m.mot+'</button>'; }).join('')+
        '</div>'+
        '<div class="feedback" id="fb"></div>'+
      '</div>';
  }
  function repMot(btn, choix, bonne){
    var fb=document.getElementById('fb');
    if(choix===bonne){ btn.classList.add('bon'); fb.textContent='✅ Bravo, c\'était '+bonne+' !'; fb.className='feedback ok'; gagner(3); bravo(); disableZone();
      setTimeout(function(){ bumpProgress('lecture', jeuMots); },1400);
    } else { btn.classList.add('faux'); montrerBonne(bonne); fb.textContent='👀 Le bon mot était : '+bonne; fb.className='feedback non';
      setTimeout(function(){ bumpProgress('lecture', jeuMots); },1900);
    }
  }

  /* Remettre la phrase en ordre (grands) — avec RETOUR ARRIÈRE et
     comparaison tolérante à la casse/ponctuation (audit). */
  var _phr={cible:'', placed:[]};
  function normPhrase(s){ return String(s).toLowerCase().replace(/[.,;:!?']/g,'').replace(/\s+/g,' ').trim(); }
  function jeuPhrases(){
    var ph=choisir(PHRASES);
    var mots=ph.replace(/[.]/g,'').split(' ');
    var melange=melanger(mots);
    _phr={cible:mots.join(' '), placed:[]};
    say(ph);
    app.innerHTML = entete('📝 Les phrases','menuLecture') +
      '<div class="carte-jeu">'+
        '<p class="consigne">Remets la phrase dans l\'ordre</p>'+
        '<button class="btn-son" onclick="PM.dire(\''+q(ph)+'\')">🔊 Écouter la phrase</button>'+
        '<div id="cible" class="phrase-cible"></div>'+
        '<div id="banque" class="phrase-banque">'+
          melange.map(function(m,i){ return '<button class="mot-btn" id="mb'+i+'" onclick="PM.poserMot(this,\''+q(m)+'\')">'+m+'</button>'; }).join('')+
        '</div>'+
        '<div style="margin-top:8px"><button class="btn-back" id="undo" onclick="PM.retirerMot()" disabled>↩ Retirer le dernier mot</button></div>'+
        '<div class="feedback" id="fb"></div>'+
        '<div><button class="btn-suite cacher" id="next" onclick="PM.jeuPhrases()">Suivant ➡</button></div>'+
      '</div>';
  }
  function majPhrase(){
    var cible=document.getElementById('cible');
    cible.textContent=_phr.placed.map(function(p){ return p.mot; }).join(' ');
    var undo=document.getElementById('undo'); if(undo) undo.disabled=_phr.placed.length===0;
  }
  function poserMot(btn, mot){
    btn.style.visibility='hidden';
    _phr.placed.push({mot:mot, btn:btn});
    majPhrase();
    if(_phr.placed.length === _phr.cible.split(' ').length){
      var fb=document.getElementById('fb');
      var propose=_phr.placed.map(function(p){ return p.mot; }).join(' ');
      if(normPhrase(propose)===normPhrase(_phr.cible)){ fb.textContent='✅ Parfait !'; fb.className='feedback ok'; gagner(4); bravo(); say(_phr.cible);
        document.getElementById('next').classList.remove('cacher');
        setTimeout(function(){ bumpProgress('lecture', jeuPhrases); },1600);
      } else { fb.textContent='🤝 Presque ! La bonne phrase : '+_phr.cible+'. Tu peux retirer un mot et corriger.'; fb.className='feedback non'; }
    }
  }
  function retirerMot(){
    var last=_phr.placed.pop();
    if(last && last.btn) last.btn.style.visibility='visible';
    var fb=document.getElementById('fb'); if(fb){ fb.textContent=''; fb.className='feedback'; }
    var next=document.getElementById('next'); if(next) next.classList.add('cacher');
    majPhrase();
  }

  /* Compréhension de texte (grands) */
  var TEXTES = PM_DATA.TEXTES;   /* données dans data/contenu-petits-malins.js */
  /* (définition inline d'origine neutralisée ci-dessous)
  var _TEXTES_INLINE=[
    {titre:'Le petit chat gris', em:'🐱',
     txt:"Minou est un petit chat gris. Tous les matins, il boit son lait dans un bol bleu. Il adore jouer avec une pelote de laine rouge. Le soir, fatigué, il dort en boule près du feu, dans la cuisine.",
     qs:[{q:'De quelle couleur est Minou ?', bon:'Gris', faux:['Noir','Blanc'], ind:'Relis la première phrase.'},
         {q:'Avec quoi aime-t-il jouer ?', bon:'Une pelote de laine', faux:['Un ballon','Une souris'], ind:'Cherche le mot « jouer ».'},
         {q:'Où dort-il le soir ?', bon:'Près du feu', faux:['Dans le jardin','Sur le toit'], ind:'Regarde la fin du texte.'}]},
    {titre:'La sortie à la ferme', em:'🐮',

     qs:[{q:'Quel jour Lucas est-il allé à la ferme ?', bon:'Samedi', faux:['Dimanche','Mercredi'], ind:'C\'est le premier mot.'},
         {q:'Combien de vaches a-t-il vues ?', bon:'Trois', faux:['Deux','Six'], ind:'« trois vaches ».'},
         {q:'Qu\'a-t-il appris à ramasser ?', bon:'Les œufs', faux:['Le foin','Les pommes'], ind:'Le fermier lui a montré…'},
         {q:'Combien d\'œufs a-t-il rapportés ?', bon:'Six', faux:['Trois','Dix'], ind:'« six œufs frais ».'}]},
    {titre:'La graine et la fleur', em:'🌱',
     txt:"Emma a planté une petite graine dans un pot. Chaque jour, elle lui donne un peu d'eau et la met au soleil sur la fenêtre. Après deux semaines, une tige verte est sortie de la terre. Bientôt, une jolie fleur jaune est apparue.",
     qs:[{q:'Qu\'a planté Emma ?', bon:'Une graine', faux:['Un arbre','Une fleur déjà grande'], ind:'Tout au début.'},
         {q:'De quoi la graine a-t-elle besoin ?', bon:'D\'eau et de soleil', faux:['De chocolat','De musique'], ind:'« un peu d\'eau » et « au soleil ».'},
         {q:'De quelle couleur est la fleur ?', bon:'Jaune', faux:['Rouge','Bleue'], ind:'La toute dernière phrase.'}]}
  ];
  --- fin neutralisation TEXTES --- */
  var _txtLu='', _qSeq=[], _qIdx=0, _qOpts=[], _qBon='', _qInd='', _quizMat='lecture', _quizFin=null;
  function jeuComprehension(){
    var t=choisir(TEXTES);
    _txtLu=t.txt; _qSeq=t.qs; _quizMat='lecture'; _quizFin=jeuComprehension;
    app.innerHTML = entete('🧠 Lire et comprendre','menuLecture') +
      '<div class="carte-jeu">'+
        '<div class="lecon"><span class="ill">'+t.em+'</span><h3>'+t.titre+'</h3><p style="font-size:21px">'+t.txt+'</p></div>'+
        '<button class="btn-son" onclick="PM.dire(\''+q(t.txt)+'\')">🔊 Lire à voix haute</button>'+
        '<div><button class="btn-suite" onclick="PM.lancerQuiz(\'lecture\',\'jeuComprehension\')">Répondre aux questions ❓</button></div>'+
      '</div>';
  }
  function lancerQuiz(mat, fin){ _quizMat=mat||'lecture'; _quizFin=fin?PM[fin]:null; _qIdx=0; poserQuestionSeq(); }
  function poserQuestionSeq(){
    var qs=_qSeq, qi=_qIdx, qq=qs[qi];
    var opts=melanger([qq.bon].concat(qq.faux));
    _qOpts=opts; _qBon=qq.bon; _qInd=qq.ind||'';
    say(qq.q);
    app.innerHTML = entete('🧠 Questions','menuLecture') +
      '<div class="carte-jeu">'+
        '<p class="consigne">Question '+(qi+1)+' / '+qs.length+'</p>'+
        '<p class="consigne" style="font-size:22px;color:#374151">'+qq.q+'</p>'+
        '<div class="choix" id="zone" style="grid-template-columns:1fr;">'+
          opts.map(function(o,k){ return '<button data-v="'+q(o)+'" style="font-size:21px" onclick="PM.repQuiz(this,'+k+')">'+o+'</button>'; }).join('')+
        '</div>'+
        '<div class="feedback" id="fb"></div>'+
        '<div><button class="btn-suite cacher" id="next" onclick="PM.suiteQuizSeq()">'+(qi+1<qs.length?'Question suivante ➡':'Terminer ✅')+'</button></div>'+
      '</div>';
  }
  function repQuiz(btn,k){
    var fb=document.getElementById('fb');

  function genOp(op){
    var a,b,res; var grand=state.age==='grand';
    if(op==='+'){ if(grand){ a=11+r(89); b=11+r(89);} else { a=1+r(10); b=1+r(10);} res=a+b; }
    else if(op==='-'){ if(grand){ a=25+r(75); b=5+r(a-5);} else { a=1+r(10); b=1+r(a);} res=a-b; }
    else if(op==='×'){ if(grand){ a=2+r(11); b=2+r(11);} else { a=1+r(5); b=1+r(5);} res=a*b; }
    else { if(grand){ b=2+r(8); res=2+r(11);} else { b=1+r(5); res=1+r(5);} a=b*res; }
    return {a:a,b:b,res:res};
  }

    var g=genOp(op), a=g.a, b=g.b, res=g.res;

        '</div>';

    var opts={}; opts[res]=1;

/* ------------------------- PRÉFÉRENCES D'ACCESSIBILITÉ -----------------
   Persistées dans l'état du profil (même mécanisme que le reste : save()).
   applyPrefs() reflète l'état dans le DOM (classes body.calme / body.dys et
   visibilité de la série). togglePref bascule + sauvegarde + toast.
   setPrefAndReflect permet de basculer visuellement même sans profil connecté
   (la préférence n'est alors PAS mémorisée : on invite à créer un profil). */
function getPrefs(){
  if(!STATE.prefs) STATE.prefs={calme:false, dys:false, hideStreak:false};
  return STATE.prefs;
}
function applyPrefs(){
  var p=getPrefs();
  document.body.classList.toggle("calme", !!p.calme);
  document.body.classList.toggle("dys", !!p.dys);
  // La pastille de série est rendue par renderStats ; on la rafraîchit si besoin.
  if(typeof renderStats==="function" && STATE.setup && ACTIVE) renderStats();
}
function togglePref(key, onMsg, offMsg){
  var p=getPrefs();
  p[key]=!p[key];
  applyPrefs();
  save();
  toast(p[key]?(onMsg||"Réglage activé"):(offMsg||"Réglage désactivé"));
}
function setPrefAndReflect(key, onMsg, offMsg){
  // Sans profil connecté : on bascule l'affichage mais on ne mémorise pas.
  if(!ACTIVE){
    var on = !document.body.classList.contains(key==="dys"?"dys":key==="calme"?"calme":"__none__");
    if(key==="calme") document.body.classList.toggle("calme");
    else if(key==="dys") document.body.classList.toggle("dys");
    var nowOn = (key==="calme")? document.body.classList.contains("calme")
              : (key==="dys")? document.body.classList.contains("dys") : on;
    toast((nowOn?(onMsg||"Réglage activé"):(offMsg||"Réglage désactivé"))+" · crée un profil pour mémoriser");
    return;
  }
  togglePref(key, onMsg, offMsg);
}

/* Niveau de mage : seuils croissants doux */
function levelInfo(xp){
  let level=1, need=100, acc=0;
  while(xp >= acc+need){ acc+=need; level++; need=Math.round(need*1.25); }
  return {level, into: xp-acc, need, pct: Math.round(100*(xp-acc)/need)};
}
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }

  const y=new Date(); y.setDate(y.getDate()-1);
  const ystr=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  STATE.streak = (STATE.lastDay===ystr)? (STATE.streak||0)+1 : 1;
  STATE.lastDay=t;
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
/* Extrait les notions-clés (mots en gras) du cours pour bâtir la carte mentale */
function extractKeyTerms(html){
  const terms=[]; const re=/<b>(.*?)<\/b>/g; let m;
  while((m=re.exec(html))){
    let t=m[1].replace(/<[^>]+>/g,"").trim();
    if(t && t.toLowerCase()!=="le grimoire :" && !terms.includes(t)) terms.push(t);
  }
  return terms.slice(0,6);
}
function wrapText(s,max){
  const words=String(s).split(" "); const lines=[]; let cur="";
  words.forEach(w=>{ if((cur+" "+w).trim().length>max){ if(cur)lines.push(cur); cur=w; } else cur=(cur+" "+w).trim(); });
  if(cur) lines.push(cur); return lines;
}
/* Carte mentale radiale en SVG. Préfère le champ rédigé `lesson.carte`
   ({ centre, branches:[{titre, detail?}] }, 4 à 6 branches qui enseignent
   vraiment) ; à défaut, repli sur les notions-clés (mots en gras) du cours.
   Statique (aucune animation) : compatible Mode calme. */
function mindmapSVG(lesson){
  const sub=subjectById(lesson.subjectId); const color=sub.color;
  let centre, branches;
  if(lesson.carte && Array.isArray(lesson.carte.branches) && lesson.carte.branches.length){
    centre = lesson.carte.centre || lesson.title;
    branches = lesson.carte.branches.slice(0,6);
  } else {
    centre = lesson.title;
    branches = extractKeyTerms(lesson.cours).slice(0,6).map(t=>({titre:t}));
  }
  const n=Math.max(branches.length,1);
  const W=720, H=470, cx=W/2, cy=H/2, rx=250, ry=156;
  let links="", boxes="";
  branches.forEach((b,i)=>{
    const ang=(-90 + i*(360/n))*Math.PI/180;
    const x=cx+rx*Math.cos(ang), y=cy+ry*Math.sin(ang);
    const titreLines=wrapText(b.titre||"",18);
    const detailLines=b.detail?wrapText(b.detail,26):[];
    const boxW=196;
    const boxH=14 + titreLines.length*21 + (detailLines.length?6+detailLines.length*17:0) + 10;
    links+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${color}" stroke-width="2.5" opacity="0.5"/>`;
    boxes+=`<rect x="${x-boxW/2}" y="${y-boxH/2}" width="${boxW}" height="${boxH}" rx="12" fill="#2c2456" stroke="${color}" stroke-width="2"/>`;
    let ty=y-boxH/2+24;
    titreLines.forEach(ln=>{ boxes+=`<text x="${x}" y="${ty}" text-anchor="middle" font-size="15.5" fill="#f3eefc" font-weight="700">${esc(ln)}</text>`; ty+=21; });
    if(detailLines.length){ ty+=4; detailLines.forEach(ln=>{ boxes+=`<text x="${x}" y="${ty}" text-anchor="middle" font-size="13.5" fill="#cfc8ee">${esc(ln)}</text>`; ty+=17; }); }
  });
  const cLines=wrapText(centre,15);
  const cRx=124, cRy=Math.max(60, 30+cLines.length*16);
  let title=""; let cty=cy-(cLines.length-1)*12;
  cLines.forEach(ln=>{ title+=`<text x="${cx}" y="${cty+6}" text-anchor="middle" font-size="18" fill="#1a1633" font-weight="800">${esc(ln)}</text>`; cty+=24; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-height:470px" role="img" aria-label="Carte mentale de la leçon ${esc(centre)}" xmlns="http://www.w3.org/2000/svg">
    ${links}${boxes}
    <ellipse cx="${cx}" cy="${cy}" rx="${cRx}" ry="${cRy}" fill="${color}"/>
    ${title}
  </svg>`;
}

      pour découvrir tes points forts. Ce n'est pas une note : c'est juste pour bien te guider.
      Réponds tranquillement : chaque réponse fait briller une étoile ⭐.
    </p>
    <div style="margin-top:18px">
      <button class="btn big" id="goDiag">Commencer le test 🔮</button>
      <button class="btn ghost" id="skipDiag">Passer pour l'instant</button>

  document.getElementById("goDiag").onclick=()=>runDiagnostic();

function runDiagnostic(){
  const items=buildDiagnostic();
  let i=0; const result={};
  function step(){
    if(i>=items.length){ finish(); return; }
    const it=items[i];
    renderSingleQuestion({
      header:`🔮 Test de l'Oracle · ${it.icon} ${it.subjectName}`,
      sub:`Question ${i+1} sur ${items.length}`,
      question:it.q,
      onAnswer:(correct)=>{
        result[it.subjectId]={right:(result[it.subjectId]?.right||0)+(correct?1:0), total:1, name:it.subjectName};
      },
      onNext:()=>{ i++; step(); },
      lastLabel: (i===items.length-1)?"Voir mon profil ✨":"Question suivante →"
    });
  }
  function finish(){
    STATE.diagnostic=result; STATE.diagnosticDone=true; save();
    const lines=CONTENT.subjects.map(s=>{
      const r=result[s.id]; const ok=r&&r.right>0;
      return `<div class="quest"><div class="qix">${s.icon}</div>
        <div class="qmeta"><div class="qt">${s.name}</div>
        <div class="small muted">${ok?"Belle base ! On consolidera ✨":"À travailler en priorité (on va t'aider) 💪"}</div></div>
        <div class="stars">${ok?"⭐":"☆"}</div></div>`;
    }).join("");
    app.innerHTML=`
      <div class="card">
        <h1 class="center">✨ Ton profil de départ</h1>
        <p class="center muted">L'Oracle a parlé. Voici où tu en es : tout va progresser !</p>
        <div class="quests" style="margin-top:14px">${lines}</div>
        <div class="center" style="margin-top:18px">
          <button class="btn big" id="toMap">Découvrir le royaume 🗺️</button>
        </div>
      </div>`;
    document.getElementById("toMap").onclick=renderMap;
    addXP(20,"Test terminé"); save();
  }
  step();
}

/* ===================== BREVET BLANC ===================== */
var EXAM=null, EXAM_I=0, EXAM_ANS=[];
var EXAM_TIMED=false, EXAM_END=0, EXAM_TIMER=null;     // minuteur (conditions réelles)
var EXAM_REDAC=null, EXAM_REDAC_ANS="";                // question rédigée (entraînement, hors note)
var SEC_PER_Q=75;                                      // ~1,25 min par question auto-corrigeable
function _shuf(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function _norm(s){return String(s).toLowerCase().trim().replace(/\s+/g,"").replace(/\u00b2/g,"2").replace(/,/g,".");}/* virgule d\u00e9cimale FR accept\u00e9e comme le point (align\u00e9 sur `norm` des le\u00e7ons) */
function collegeQuestions(){
  var out=[];
  CONTENT.subjects.forEach(function(s){
    if(s.id==="anglais") return;   // l'anglais est en contrôle continu : pas d'épreuve écrite au DNB
    s.lessons.forEach(function(l){
      var niv=l.niveau||"5e"; if(niv==="6e") return;
      l.questions.forEach(function(q){ out.push(Object.assign({},q,{subject:s.id,subjectName:s.name,subjectIcon:s.icon,niveau:niv})); });
    });
  });
  return out;
}
/* Vivier du Brevet : on privilégie la 3ᵉ (niveau de l'examen) tout en gardant
   un mélange collège. perSub = nombre de questions par matière (standard 3, court 2). */
function buildBrevet(opts){
  opts=opts||{};
  var perSub=opts.perSub||3;
  var bySub={}; collegeQuestions().forEach(function(q){ (bySub[q.subject]=bySub[q.subject]||[]).push(q); });
  var exam=[];
  Object.keys(bySub).forEach(function(k){
    var pool=bySub[k];
    var trois=_shuf(pool.filter(function(q){ return q.niveau==="3e"; }));
    var autres=_shuf(pool.filter(function(q){ return q.niveau!=="3e"; }));
    var n3=Math.min(trois.length, Math.ceil(perSub*2/3));   // ~2/3 de questions de 3ᵉ
    var pick=trois.slice(0,n3);
    pick=pick.concat(autres.slice(0, perSub-pick.length));
    if(pick.length<perSub) pick=pick.concat(trois.slice(n3));     // compléter si peu d'autres niveaux
    exam=exam.concat(pick.slice(0,perSub));
  });
  return _shuf(exam);
}

function playQuest(l){
  let i=0, right=0;
  const total=l.questions.length;
  function step(){
    if(i>=total){ finish(); return; }
    const q=l.questions[i];
    renderSingleQuestion({
      header:`${subjectById(l.subjectId).icon} ${l.title}`,
      sub:`Question ${i+1} sur ${total}`,
      progress: Math.round(100*i/total),
      question:q,
      onAnswer:(correct)=>{ if(correct){ right++; addXP(10,"+10 XP"); } },
      onNext:()=>{ i++; step(); },
      lastLabel:(i===total-1)?"Terminer la quête 🏆":"Question suivante →"
    });
  }
  function finish(){
    const ratio=right/total;
    const stars = ratio>=1?3 : ratio>=0.7?2 : ratio>0?1:0;
    const prev = STATE.scores[l.id];
    const isNew = !prev || prev.stars===0;
    const best = Math.max(prev?prev.stars:0, stars);
    STATE.scores[l.id]={stars, best, right, total};
    // récompenses
    let gainXp = right*2 + (stars===3?20:stars===2?10:0);
    let gainCr = stars*5 + (isNew?5:0);
    STATE.crystals += gainCr;
    touchStreak();
    addXP(gainXp, null, true);
    checkBadges();
    save(); renderStats();

    const av=AVATARS.find(a=>a.id===STATE.avatar);
    const msg = stars===3?"Parfait ! Sans-faute ! 🌟" : stars===2?"Très bien joué ! 👏" : stars===1?"Bien, tu progresses ! 💪":"Ce n'est pas grave, on réessaie ensemble 🤝";
    app.innerHTML=`
      <div class="card center">
        <div class="pop" style="font-size:60px">${av?av.face:"🧙‍♀️"}</div>
        <h1>Quête terminée !</h1>
        <div class="stars pop" style="font-size:40px;color:var(--gold)">${"★".repeat(stars)}${"☆".repeat(3-stars)}</div>
        <p style="font-size:19px;font-weight:700">${msg}</p>
        <p class="muted">Tu as réussi <b>${right}/${total}</b> questions.</p>
        <div class="row" style="justify-content:center;margin:10px 0 4px">
          <span class="chip">⚡ +${gainXp} XP</span>
          <span class="chip">💎 +${gainCr} cristaux</span>
        </div>
        <div class="row" style="justify-content:center;margin-top:18px">
          <button class="btn" id="again">↺ Refaire</button>
          <button class="btn" id="next">Quête suivante / Carte →</button>
        </div>
      </div>`;
    document.getElementById("again").onclick=()=>playQuest(l);
    document.getElementById("next").onclick=()=>renderRegion(l.subjectId);
  }
  step();
}

/* ---- Rendu générique d'une question (réutilisé par diag + quêtes) ---- */
function renderSingleQuestion(cfg){
  const q=cfg.question;
  let answered=false;
  const progBar = (cfg.progress!=null)? `<div class="progress-quest"><i style="width:${cfg.progress}%"></i></div>`:"";
  let body="";
  if(q.type==="qcm"){
    body=`<div class="options">`+q.options.map((o,idx)=>`<button class="opt" data-i="${idx}">${o}</button>`).join("")+`</div>`;
  } else if(q.type==="vf"){
    body=`<div class="options">
      <button class="opt" data-i="true">✅ Vrai</button>
      <button class="opt" data-i="false">❌ Faux</button></div>`;
  } else if(q.type==="saisie"){
    body=`<div class="row"><input class="text" id="saisie" placeholder="Tape ta réponse ici" autocomplete="off"/>
          <button class="btn" id="valid">Valider</button></div>`;
  }
  app.innerHTML=`
   <div class="card">
     <div class="row"><div class="small muted">${cfg.header}</div><div class="spacer"></div>
       <div class="pill">${cfg.sub}</div></div>
     ${progBar}
     <div class="qtext">${q.q}</div>
     <div class="qbox">${body}</div>
     <div class="feedback" id="fb"></div>
     <div class="center" id="nextWrap" style="margin-top:16px"></div>
   </div>`;

  const fb=document.getElementById("fb");
  function reveal(correct){
    if(answered) return; answered=true;
    if(correct){
      fb.className="feedback ok";
      fb.innerHTML=`<span class="lab">✅ Bravo !</span>${q.explain||""}`;
    }else{
      fb.className="feedback no";
      fb.innerHTML=`<span class="lab">🤝 Presque ! Regarde :</span>${q.explain||""}`;
    }
    cfg.onAnswer(correct);
    save();
    const nw=document.getElementById("nextWrap");
    nw.innerHTML=`<button class="btn big" id="nextBtn">${cfg.lastLabel||"Suivant →"}</button>`;
    document.getElementById("nextBtn").onclick=cfg.onNext;
  }

  if(q.type==="qcm"){
    app.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        const idx=parseInt(btn.dataset.i,10);
        const correct = idx===q.answer;
        app.querySelectorAll(".opt").forEach((b,bi)=>{
          b.disabled=true;
          if(bi===q.answer) b.classList.add("correct");
          else if(bi===idx) b.classList.add("wrong");
        });
        reveal(correct);
      };
    });
  } else if(q.type==="vf"){
    app.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        const val = btn.dataset.i==="true";
        const correct = val===q.answer;
        app.querySelectorAll(".opt").forEach(b=>{
          b.disabled=true;
          const bv=b.dataset.i==="true";
          if(bv===q.answer) b.classList.add("correct");
          else if(bv===val) b.classList.add("wrong");
        });
        reveal(correct);
      };
    });
  } else if(q.type==="saisie"){
    const inp=document.getElementById("saisie");
    const valBtn=document.getElementById("valid");
    const norm=s=>String(s).trim().toLowerCase().replace(/\s+/g,"").replace(",",".");
    let tries=0;   // 2ᵉ tentative guidée : on n'invalide qu'à la 2ᵉ erreur
    function validate(){
      const user=norm(inp.value);
      if(user==="") return;
      const ok = q.answer.map(norm).includes(user);
      if(ok){
        inp.disabled=true; valBtn.disabled=true;
        inp.classList.remove("retry");
        reveal(true);
        return;
      }
      tries++;
      if(tries===1){
        // 1ʳᵉ erreur : on ne ferme PAS. Indice formatif + nouvelle tentative.
        const indice = q.indice || "Pas tout à fait. Relis bien l'énoncé, vérifie le format de ta réponse (chiffres, unité, virgule) et réessaie : tu y es presque !";
        fb.className="feedback no";
        fb.innerHTML=`<span class="lab">💡 Indice :</span>${indice}`;
        inp.classList.add("retry");
        inp.focus(); inp.select();
        return;
      }
      // 2ᵉ erreur : on révèle la correction.
      inp.disabled=true; valBtn.disabled=true;
      inp.classList.remove("retry");
      reveal(false);
    }
    valBtn.onclick=validate;
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter") validate(); });
    inp.focus();
  }
}

/* ---- XP / niveau ---- */
function addXP(amount, flash, silent){
  const before=levelInfo(STATE.xp).level;
  STATE.xp += amount;
  const after=levelInfo(STATE.xp).level;
  renderStats();
  if(flash && !silent) toast(`⚡ ${flash}`);
  if(after>before){ setTimeout(()=>toast(`🎉 Niveau ${after} atteint, ${STATE.name} !`, true), 400); }
}

/* ---- Badges ---- */
function checkBadges(){
  BADGES.forEach(b=>{
    if(!STATE.badges.includes(b.id) && b.test(STATE)){
      STATE.badges.push(b.id);
      setTimeout(()=>toast(`${b.icon} Badge débloqué : ${b.nm} !`, true), 700);
    }
  });
}
function renderBadges(){
  const cells=BADGES.map(b=>{
    const got=STATE.badges.includes(b.id);
    return `<div class="badge ${got?'':'lock'}"><div class="bic">${got?b.icon:"🔒"}</div>
      <div class="bn">${b.nm}</div></div>`;
  }).join("");
  app.innerHTML=`
    <div class="card">
      <div class="row"><h2>🏅 Mes badges</h2><div class="spacer"></div>
        <button class="btn ghost" id="back">← Carte</button></div>
      <p class="muted small">Tu as débloqué ${STATE.badges.length} badge(s) sur ${BADGES.length}. Continue d'explorer !</p>
      <div class="badges" style="margin-top:12px">${cells}</div>
    </div>`;
  document.getElementById("back").onclick=renderMap;
}

/* =====================================================================
   GÉNÉRATEUR D'EXERCICES DE MATHS — « 🎲 Entraînement illimité » (collège)
   ---------------------------------------------------------------------
   Module MATHGEN (IIFE) : un générateur par notion, par niveau. Chaque
   générateur renvoie un objet question au MÊME format que CONTENT :
     {type:"qcm|vf|saisie", q, options/answer, explain, indice}
   La réponse est CALCULÉE par le code → elle est toujours juste.
   Les questions « saisie » bénéficient de la 2ᵉ tentative guidée déjà en
   place (champ `indice`). Pas de tiret cadratin « — » dans les textes.
   ===================================================================== */
var MATHGEN = (function(){
  "use strict";
  function ri(min,max){ return Math.floor(Math.random()*(max-min+1))+min; } // entier dans [min,max]
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function pgcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ var t=b; b=a%b; a=t; } return a||1; }
  // format décimal FR (virgule), sans zéros parasites
  function dec(x){ var s=(Math.round(x*100)/100).toString().replace(".",","); return s; }
  // Construit un QCM en mêlant la bonne réponse à des distracteurs (valeurs uniques)
  function qcm(q, bonne, distracteurs, explain, indice){
    var opts=[String(bonne)];
    distracteurs.forEach(function(d){ d=String(d); if(opts.indexOf(d)<0) opts.push(d); });
    opts=opts.slice(0,4);
    while(opts.length<3){ var f=String(ri(1,99)); if(opts.indexOf(f)<0) opts.push(f); }
    opts=shuffle(opts);
    return {type:"qcm", q:q, options:opts, answer:opts.indexOf(String(bonne)), explain:explain, indice:indice};
  }

  /* ----------------------- 6ᵉ / 5ᵉ ----------------------- */
  function genDecimaux(){
    var op=pick(["+","-","×"]);
    var a,b,res;
    if(op==="+"){ a=ri(10,200)/10; b=ri(10,200)/10; res=Math.round((a+b)*10)/10; }
    else if(op==="-"){ a=ri(50,250)/10; b=ri(10,Math.round(a*10)-5)/10; res=Math.round((a-b)*10)/10; }
    else { a=ri(11,99)/10; b=ri(2,9); res=Math.round(a*b*10)/10; } // décimal × entier
    var bAff = (op==="×") ? String(b) : dec(b);
    return {type:"saisie",
      q:"Calcule : "+dec(a)+" "+op+" "+bAff+" = ? (réponds avec une virgule si besoin)",
      answer:[dec(res), dec(res).replace(",",".")],
      explain:"On pose le calcul : "+dec(a)+" "+op+" "+bAff+" = "+dec(res)+".",
      indice:"Aligne les virgules (ou multiplie comme des entiers puis place la virgule). Le résultat attendu est un nombre décimal."};
  }
  function genFraction(){
    var d=pick([4,5,6,7,8,9,10,12]);
    var t=pick(["somme","diff","simpl"]);
    if(t==="simpl"){
      var k=ri(2,6); var n0=ri(1,d-1); // n0/d simplifiable
      var num=n0*k, den=d*k;
      var g=pgcd(num,den); var sn=num/g, sd=den/g;
      return {type:"saisie",
        q:"Simplifie la fraction "+num+"/"+den+" (écris-la sous la forme a/b la plus simple).",
        answer:[sn+"/"+sd],
        explain:"On divise en haut et en bas par "+g+" : "+num+"/"+den+" = "+sn+"/"+sd+".",
        indice:"Cherche le plus grand nombre qui divise à la fois "+num+" et "+den+", puis divise les deux."};
    }
    var x=ri(1,d-1), y=ri(1,d-1);
    if(t==="somme"){
      var s=x+y; // sur d
      return {type:"saisie",
        q:"Calcule "+x+"/"+d+" + "+y+"/"+d+" (garde le même dénominateur, ne simplifie pas).",
        answer:[s+"/"+d],
        explain:"Même dénominateur : on additionne les numérateurs, "+x+" + "+y+" = "+s+", et on garde "+d+". Donc "+s+"/"+d+".",
        indice:"Le dénominateur ne change pas : additionne seulement les numérateurs."};
    }
    if(x<y){ var tmp=x; x=y; y=tmp; }
    var diff=x-y;
    return {type:"saisie",
      q:"Calcule "+x+"/"+d+" - "+y+"/"+d+" (garde le même dénominateur, ne simplifie pas).",
      answer:[diff+"/"+d],
      explain:"Même dénominateur : on soustrait les numérateurs, "+x+" - "+y+" = "+diff+", et on garde "+d+". Donc "+diff+"/"+d+".",
      indice:"Le dénominateur reste "+d+" : calcule seulement "+x+" - "+y+" en haut."};
  }
  function genProportion(){
    var t=pick(["pourcent","prix"]);
    if(t==="pourcent"){
      var p=pick([10,20,25,50,75]); var base=pick([20,40,60,80,100,120,160,200,240]);
      var res=base*p/100;
      return {type:"saisie",
        q:"Calcule "+p+" % de "+base+".",
        answer:[String(res)],
        explain:p+" % de "+base+" = "+p+"/100 × "+base+" = "+res+".",
        indice:p+" % veut dire "+p+" pour 100. Multiplie "+base+" par "+p+" puis divise par 100."};
    }
    var unit=ri(2,9); var n1=ri(2,6); var n2=ri(3,8);
    var total1=unit*n1, total2=unit*n2;
    return qcm(
      n1+" objets identiques coûtent "+total1+" €. Combien coûtent "+n2+" objets (même prix unitaire) ?",
      total2+" €",
      [(total2+unit)+" €", (total2-unit)+" €", (total1+n2)+" €"],
      "1 objet coûte "+total1+" ÷ "+n1+" = "+unit+" €. Donc "+n2+" objets coûtent "+n2+" × "+unit+" = "+total2+" €.",
      "Trouve d'abord le prix d'un seul objet, puis multiplie.");
  }
  function genPerimetreAire(){
    var carre=Math.random()<0.4;
    var quoi=pick(["perimetre","aire"]);
    if(carre){
      var c=ri(3,15);
      if(quoi==="perimetre") return {type:"saisie",
        q:"Un carré a un côté de "+c+" cm. Quel est son périmètre (en cm) ?",
        answer:[String(4*c), 4*c+" cm"],
        explain:"Périmètre du carré = 4 × côté = 4 × "+c+" = "+(4*c)+" cm.",
        indice:"Un carré a 4 côtés égaux : multiplie le côté par 4."};
      return {type:"saisie",
        q:"Un carré a un côté de "+c+" cm. Quelle est son aire (en cm²) ?",
        answer:[String(c*c), c*c+" cm²"],
        explain:"Aire du carré = côté × côté = "+c+" × "+c+" = "+(c*c)+" cm².",
        indice:"Aire d'un carré = côté multiplié par lui-même."};
    }
    var L=ri(4,18), l=ri(2,L-1);
    if(quoi==="perimetre") return {type:"saisie",
      q:"Un rectangle mesure "+L+" cm sur "+l+" cm. Quel est son périmètre (en cm) ?",
      answer:[String(2*(L+l)), 2*(L+l)+" cm"],
      explain:"Périmètre = 2 × (Longueur + largeur) = 2 × ("+L+" + "+l+") = "+(2*(L+l))+" cm.",
      indice:"Additionne longueur et largeur, puis multiplie par 2."};
    return {type:"saisie",
      q:"Un rectangle mesure "+L+" cm sur "+l+" cm. Quelle est son aire (en cm²) ?",
      answer:[String(L*l), L*l+" cm²"],
      explain:"Aire = Longueur × largeur = "+L+" × "+l+" = "+(L*l)+" cm².",
      indice:"Aire d'un rectangle = longueur multipliée par largeur."};
  }

  /* ----------------------- 4ᵉ ----------------------- */
  function genLitteral(){
    var t=pick(["dev","red"]);
    if(t==="dev"){
      var k=ri(2,9), a=ri(2,9), signe=pick(["+","-"]), b=ri(2,9);
      var prod=k*b;
      var expr=k+"("+a+"x "+signe+" "+b+")";
      var res=(k*a)+"x "+signe+" "+prod;
      return qcm(
        "Développe et réduis : "+expr+".",
        res,
        [(k*a)+"x "+signe+" "+b, (k+a)+"x "+signe+" "+prod, (k*a)+"x "+(signe==="+"?"-":"+")+" "+prod],
        "On distribue : "+k+"×"+a+"x = "+(k*a)+"x et "+k+"×"+b+" = "+prod+". Donc "+res+".",
        "Multiplie le nombre devant la parenthèse par CHAQUE terme à l'intérieur.");
    }
    var c1=ri(2,9), c2=ri(2,9);
    return {type:"saisie",
      q:"Réduis l'expression : "+c1+"x + "+c2+"x = ? (écris ta réponse, par exemple 5x)",
      answer:[(c1+c2)+"x"],
      explain:"On additionne les coefficients : ("+c1+" + "+c2+")x = "+(c1+c2)+"x.",
      indice:"Additionne juste les nombres devant les x, et garde la lettre x."};
  }
  function genPuissance(){
    var base=pick([2,3,4,5,10]);
    var exp=(base===2)?ri(2,7):(base===10)?ri(2,5):ri(2,3);
    var res=Math.pow(base,exp);
    var expSup={2:"²",3:"³",4:"⁴",5:"⁵",6:"⁶",7:"⁷"}[exp]||("^"+exp);
    return {type:"saisie",
      q:"Combien vaut "+base+expSup+" ?",
      answer:[String(res)],
      explain:base+expSup+" = "+new Array(exp+1).join(base+"×").slice(0,-1)+" = "+res+".",
      indice:"Une puissance, c'est une multiplication répétée : multiplie "+base+" par lui-même "+exp+" fois."};
  }
  function genEquation(){
    var t=pick(["ax+b","x+b","ax"]);
    var x=ri(1,12);
    if(t==="ax+b"){
      var a=ri(2,6), b=ri(1,15), c=a*x+b;
      return {type:"saisie",
        q:"Résous l'équation : "+a+"x + "+b+" = "+c+". x = ?",
        answer:[String(x)],
        explain:a+"x = "+c+" - "+b+" = "+(c-b)+", donc x = "+(c-b)+" ÷ "+a+" = "+x+".",
        indice:"D'abord enlève "+b+" des deux côtés, puis divise par "+a+"."};
    }
    if(t==="x+b"){
      var b2=ri(2,20), c2=x+b2;
      return {type:"saisie",
        q:"Résous l'équation : x + "+b2+" = "+c2+". x = ?",
        answer:[String(x)],
        explain:"x = "+c2+" - "+b2+" = "+x+".",
        indice:"Pour isoler x, retire "+b2+" de chaque côté du signe égal."};
    }
    var a3=ri(2,9), c3=a3*x;
    return {type:"saisie",
      q:"Résous l'équation : "+a3+"x = "+c3+". x = ?",
      answer:[String(x)],
      explain:"x = "+c3+" ÷ "+a3+" = "+x+".",
      indice:"Divise les deux côtés par "+a3+" pour trouver x."};
  }
  // Triplets pythagoriciens entiers (multiples de triplets de base)
  var TRIPLETS=[[3,4,5],[5,12,13],[6,8,10],[8,15,17],[9,12,15],[7,24,25],[20,21,29],[12,16,20]];
  function genPythagore(){
    var base=pick(TRIPLETS); var k=pick([1,1,2,3]);
    var a=base[0]*k, b=base[1]*k, h=base[2]*k;
    if(Math.random()<0.6){
      return {type:"saisie",
        q:"Triangle rectangle : les deux côtés de l'angle droit mesurent "+a+" et "+b+". Quelle est la longueur de l'hypoténuse ?",
        answer:[String(h)],
        explain:"hypoténuse² = "+a+"² + "+b+"² = "+(a*a)+" + "+(b*b)+" = "+(a*a+b*b)+", donc hypoténuse = √"+(a*a+b*b)+" = "+h+".",
        indice:"Additionne les carrés des deux côtés, puis prends la racine carrée du résultat."};
    }
    return {type:"saisie",
      q:"Triangle rectangle : l'hypoténuse mesure "+h+" et un côté de l'angle droit mesure "+a+". Quelle est la longueur de l'autre côté ?",
      answer:[String(b)],
      explain:"côté² = "+h+"² - "+a+"² = "+(h*h)+" - "+(a*a)+" = "+(h*h-a*a)+", donc côté = √"+(h*h-a*a)+" = "+b+".",
      indice:"Ici on soustrait : (hypoténuse)² moins (côté connu)², puis racine carrée."};
  }

  /* ----------------------- 3ᵉ ----------------------- */
  function genThales(){
    // AB/AB' = AC/AC' ; on garantit un résultat entier
    var ab=ri(2,6); var k=ri(2,5); var abp=ab*k; // AB' = k×AB
    var ac=ri(2,8); var acp=ac*k;                // AC' = k×AC (entier)
    return {type:"saisie",
      q:"Configuration de Thalès : AB/AB' = AC/AC'. On donne AB = "+ab+", AB' = "+abp+" et AC = "+ac+". Combien vaut AC' ?",
      answer:[String(acp)],
      explain:ab+"/"+abp+" = "+ac+"/AC'. Le rapport vaut "+ab+"/"+abp+" = 1/"+k+", donc AC' = "+ac+" × "+abp+" ÷ "+ab+" = "+acp+".",
      indice:"Utilise l'égalité des rapports : AC' = AC × AB' ÷ AB."};
  }
  function genNotationSci(){
    var t=pick(["valeur","ecrire"]);
    if(t==="valeur"){
      var a=ri(1,9), n=ri(2,5); var res=a*Math.pow(10,n);
      var sup={2:"²",3:"³",4:"⁴",5:"⁵"}[n];
      return {type:"saisie",
        q:"Combien vaut "+a+" × 10"+sup+" ? (écris le nombre en entier)",
        answer:[String(res)],
        explain:a+" × 10"+sup+" = "+a+" suivi de "+n+" zéros = "+res+".",
        indice:"10"+sup+" = 1 suivi de "+n+" zéros. Multiplie "+a+" par ce nombre."};
    }
    var a2=ri(1,9), n2=ri(3,6); var d2=ri(0,9);
    var nb=(a2*10+d2)*Math.pow(10,n2-1); // ex: 3,2 × 10^4
    var sup2={3:"³",4:"⁴",5:"⁵",6:"⁶"}[n2];
    var mant=d2===0?String(a2):(a2+","+d2);
    return qcm(
      "Quelle est la notation scientifique de "+nb.toLocaleString("fr-FR").replace(/ /g," ")+" ?",
      mant+" × 10"+sup2,
      [mant+" × 10"+({3:"²",4:"³",5:"⁴",6:"⁵"}[n2]), (a2+(d2?","+d2:""))+" × 10"+({3:"⁴",4:"⁵",5:"⁶",6:"⁷"}[n2]), (a2*10+d2)+" × 10"+({3:"²",4:"³",5:"⁴",6:"⁵"}[n2])],
      "On écrit a × 10ⁿ avec 1 ≤ a < 10 : ici a = "+mant+" et la puissance est 10"+sup2+".",
      "Place la virgule après le 1er chiffre (a entre 1 et 10), puis compte les déplacements pour la puissance de 10.");
  }
  function genFonction(){
    var affine=Math.random()<0.5;
    var a=ri(2,6), x=ri(2,9);
    if(!affine){
      return {type:"saisie",
        q:"Soit la fonction linéaire f(x) = "+a+"x. Combien vaut f("+x+") ?",
        answer:[String(a*x)],
        explain:"f("+x+") = "+a+" × "+x+" = "+(a*x)+".",
        indice:"Remplace x par "+x+" puis multiplie par "+a+"."};
    }
    var b=ri(1,12);
    return {type:"saisie",
      q:"Soit la fonction affine g(x) = "+a+"x + "+b+". Combien vaut g("+x+") ?",
      answer:[String(a*x+b)],
      explain:"g("+x+") = "+a+" × "+x+" + "+b+" = "+(a*x)+" + "+b+" = "+(a*x+b)+".",
      indice:"Calcule d'abord "+a+" × "+x+", puis ajoute "+b+"."};
  }
  function genStats(){
    var n=pick([4,5]);
    var moy=ri(6,16);
    // on construit n valeurs de moyenne entière exactement = moy
    var vals=[]; var somme=0;
    for(var i=0;i<n-1;i++){ var v=ri(Math.max(0,moy-5),moy+5); vals.push(v); somme+=v; }
    var derniere=moy*n-somme;
    // garantir que la dernière valeur reste raisonnable et positive
    if(derniere<0){ vals=[]; somme=0; for(i=0;i<n;i++){ vals.push(moy); } }
    else vals.push(derniere);
    var total=vals.reduce(function(s,v){ return s+v; },0);
    return {type:"saisie",
      q:"Calcule la moyenne de cette série de "+n+" notes : "+vals.join(" ; ")+".",
      answer:[String(total/n)],
      explain:"Moyenne = (somme des valeurs) ÷ (nombre de valeurs) = "+total+" ÷ "+n+" = "+(total/n)+".",
      indice:"Additionne toutes les notes, puis divise la somme par "+n+"."};
  }
  function genDivisionEuclid(){
    var b=ri(3,9); var q=ri(4,20); var r=ri(0,b-1); var a=b*q+r;
    if(pick(["quotient","reste"])==="quotient"){
      return {type:"saisie",
        q:"Division euclidienne de "+a+" par "+b+" : quel est le quotient entier ?",
        answer:[String(q)],
        explain:a+" = "+b+" × "+q+" + "+r+". Le quotient est "+q+" (reste "+r+").",
        indice:"Cherche combien de fois "+b+" entre dans "+a+" sans dépasser."};
    }
    return {type:"saisie",
      q:"Division euclidienne de "+a+" par "+b+" : quel est le reste ?",
      answer:[String(r)],
      explain:a+" = "+b+" × "+q+" + "+r+". Le reste est "+r+" (toujours inférieur à "+b+").",
      indice:"Le reste est ce qui subsiste après "+b+" × quotient ; il est plus petit que "+b+"."};
  }
  function genVolume(){
    if(pick(["pave","cube"])==="cube"){
      var ar=ri(2,9); var v=ar*ar*ar;
      return {type:"saisie",
        q:"Volume d'un cube d'arête "+ar+" cm (en cm³) ?",
        answer:[String(v), v+" cm³", v+" cm3"],
        explain:"Volume du cube = arête³ = "+ar+" × "+ar+" × "+ar+" = "+v+" cm³.",
        indice:"Multiplie l'arête par elle-même trois fois."};
    }
    var L=ri(2,12), l=ri(2,9), h=ri(2,9); var v2=L*l*h;
    return {type:"saisie",
      q:"Volume d'un pavé droit "+L+" cm × "+l+" cm × "+h+" cm (en cm³) ?",
      answer:[String(v2), v2+" cm³", v2+" cm3"],
      explain:"Volume du pavé droit = Longueur × largeur × hauteur = "+L+" × "+l+" × "+h+" = "+v2+" cm³.",
      indice:"Multiplie les trois dimensions entre elles."};
  }
  function genProbabilite(){
    if(pick(["de","urne"])==="de"){
      var ev=pick([
        {desc:"d'obtenir un 6", fav:1},
        {desc:"d'obtenir un nombre pair", fav:3},
        {desc:"d'obtenir un nombre impair", fav:3},
        {desc:"d'obtenir un nombre supérieur ou égal à 5", fav:2},
        {desc:"d'obtenir un multiple de 3", fav:2}
      ]);
      var g=pgcd(ev.fav,6); var sn=ev.fav/g, sd=6/g;
      return {type:"saisie",
        q:"On lance un dé équilibré à 6 faces. Probabilité "+ev.desc+" ? (fraction simplifiée a/b)",
        answer:[sn+"/"+sd],
        explain:"Probabilité = cas favorables ÷ cas possibles = "+ev.fav+"/6 = "+sn+"/"+sd+".",
        indice:"Compte les faces favorables sur 6, puis simplifie la fraction."};
    }
    var rouge=ri(2,6), bleu=ri(2,6); var tot=rouge+bleu;
    var coul=pick([{n:"rouge",f:rouge},{n:"bleue",f:bleu}]);
    var g2=pgcd(coul.f,tot); var sn2=coul.f/g2, sd2=tot/g2;
    return {type:"saisie",
      q:"Un sac contient "+rouge+" billes rouges et "+bleu+" billes bleues. On en tire une au hasard. Probabilité qu'elle soit "+coul.n+" ? (fraction simplifiée a/b)",
      answer:[sn2+"/"+sd2],
      explain:"Il y a "+coul.f+" billes "+coul.n+"s sur "+tot+" : "+coul.f+"/"+tot+" = "+sn2+"/"+sd2+".",
      indice:"Billes favorables ÷ nombre total de billes, puis simplifie."};
  }
  function genTrigoCos(){
    var tr=pick([[3,4,5],[6,8,10],[5,12,13],[8,15,17],[9,12,15]]);
    var adj=pick([tr[0],tr[1]]); var hyp=tr[2];
    var g=pgcd(adj,hyp); var sn=adj/g, sd=hyp/g;
    return {type:"saisie",
      q:"Triangle rectangle : le côté adjacent à l'angle aigu mesure "+adj+" et l'hypoténuse "+hyp+". Quel est le cosinus de cet angle ? (fraction simplifiée a/b)",
      answer:[sn+"/"+sd],
      explain:"cos = adjacent ÷ hypoténuse = "+adj+"/"+hyp+(g>1?(" = "+sn+"/"+sd):"")+".",
      indice:"cos(angle) = côté adjacent ÷ hypoténuse, puis simplifie."};
  }

  var THEMES = {
    "6e-5e":[
      {id:"decimaux", nom:"Opérations sur les décimaux", gen:genDecimaux},
      {id:"fractions", nom:"Fractions (même dénominateur, simplifier)", gen:genFraction},
      {id:"proportion", nom:"Proportionnalité & pourcentages", gen:genProportion},
      {id:"perimAire", nom:"Périmètre & aire (rectangle, carré)", gen:genPerimetreAire},
      {id:"divEuclid", nom:"Division euclidienne (quotient, reste)", gen:genDivisionEuclid},
      {id:"volume", nom:"Volumes (cube, pavé droit)", gen:genVolume}
    ],
    "4e":[
      {id:"litteral", nom:"Calcul littéral (développer, réduire)", gen:genLitteral},
      {id:"puissances", nom:"Puissances", gen:genPuissance},
      {id:"equations", nom:"Équations du 1er degré", gen:genEquation},
      {id:"pythagore", nom:"Théorème de Pythagore", gen:genPythagore}
    ],
    "3e":[
      {id:"thales", nom:"Théorème de Thalès", gen:genThales},
      {id:"notationSci", nom:"Notation scientifique", gen:genNotationSci},
      {id:"fonctions", nom:"Fonctions linéaires & affines", gen:genFonction},
      {id:"stats", nom:"Statistiques (moyenne)", gen:genStats},
      {id:"proba", nom:"Probabilités (dé, urne)", gen:genProbabilite},
      {id:"trigo", nom:"Trigonométrie (cosinus)", gen:genTrigoCos}
    ]
  };
  function themesFor(niveau){ return THEMES[niveau]||[]; }
  function themeById(niveau, id){ return themesFor(niveau).find(function(t){ return t.id===id; }); }
  // « Tout mélanger » : un thème au hasard parmi le niveau
  function genMix(niveau){ var ths=themesFor(niveau); return pick(ths).gen(); }

  return { THEMES:THEMES, themesFor:themesFor, themeById:themeById, genMix:genMix };
})();

/* ---- Écran d'intro de l'Entraînement illimité (choix niveau + thème) ---- */
function renderEntrainementIntro(){
  if(typeof stopExamTimer==="function") stopExamTimer();
  setBrand("Le Royaume du Savoir");
  renderStats();
  var niveaux=[
    {k:"6e-5e", nom:"6ᵉ / 5ᵉ", emo:"🌱"},
    {k:"4e", nom:"4ᵉ", emo:"🌿"},
    {k:"3e", nom:"3ᵉ", emo:"🌳"}
  ];
  var blocs=niveaux.map(function(nv){
    var themes=MATHGEN.themesFor(nv.k);
    var boutons=themes.map(function(t){
      return '<button class="btn ghost" data-niv="'+nv.k+'" data-theme="'+t.id+'" style="text-align:left">'+t.nom+'</button>';
    }).join("");
    return '<div class="card" style="margin-top:14px">'
      +'<div class="row"><div style="font-size:26px">'+nv.emo+'</div>'
      +'<h3 style="margin:0">Niveau '+nv.nom+'</h3><div class="spacer"></div>'
      +'<button class="btn" data-niv="'+nv.k+'" data-theme="__mix__">🎲 Tout mélanger</button></div>'
      +'<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-top:12px">'+boutons+'</div>'
      +'</div>';
  }).join("");
  app.innerHTML=
    '<div class="card">'
    +'<div class="row"><div style="font-size:38px">🎲</div>'
    +'<div><h2 style="margin-bottom:2px">Entraînement illimité (maths)</h2>'
    +'<div class="small muted">Des exercices générés à l\'infini, corrigés en douceur. Tu t\'arrêtes quand tu veux : aucune pression.</div></div>'
    +'<div class="spacer"></div><button class="btn ghost" id="backEnt">← Carte</button></div>'
    +'<p class="small muted" style="margin-top:10px">Choisis un niveau et une notion, ou clique sur « 🎲 Tout mélanger » pour varier.</p>'
    +'</div>'+blocs;
  document.getElementById("backEnt").onclick=renderMap;
  app.querySelectorAll("[data-theme]").forEach(function(b){
    b.onclick=function(){
      var niv=b.dataset.niv, th=b.dataset.theme;
      playEntrainement(niv, th==="__mix__"?null:th);
    };
  });
}

/* ---- Boucle illimitée : génère → rend → recommence (une tâche à la fois) ---- */
function playEntrainement(niveau, themeId){
  var nbFait=0, nbReussi=0;
  var theme = themeId ? MATHGEN.themeById(niveau, themeId) : null;
  var niveauNom={"6e-5e":"6ᵉ/5ᵉ","4e":"4ᵉ","3e":"3ᵉ"}[niveau]||niveau;
  var titre = theme ? theme.nom : "🎲 Tout mélanger";
  function prochaine(){
    var question = theme ? theme.gen() : MATHGEN.genMix(niveau);
    renderSingleQuestion({
      header:"🎲 Entraînement "+niveauNom+" · "+titre,
      sub:"Exercice "+(nbFait+1),
      question:question,
      onAnswer:function(correct){
        nbFait++;
        if(correct){
          nbReussi++;
          addXP(10,"+10 XP");
          if(nbReussi%5===0){
            STATE.crystals=(STATE.crystals||0)+2;
            renderStats();
            toast("💎 +2 cristaux ! "+nbReussi+" exercices réussis 🎉", true);
          }
          if(typeof touchStreak==="function") touchStreak();
          if(typeof checkBadges==="function") checkBadges();
        }
        save();
      },
      onNext:prochaine,
      lastLabel:"Exercice suivant 🎲"
    });
    // Bouton « J'arrête ici » ajouté sous la question (sans pression)
    var nw=document.getElementById("nextWrap");
    if(nw){
      var stop=document.createElement("div");
      stop.style.marginTop="10px";
      stop.innerHTML='<button class="btn ghost" id="stopEnt">✓ J\'arrête ici (bravo !)</button>';
      nw.parentNode.appendChild(stop);
      var sb=document.getElementById("stopEnt");
      if(sb) sb.onclick=function(){ finEntrainement(); };
    }
  }
  function finEntrainement(){
    save();
    var av=AVATARS.find(function(a){ return a.id===STATE.avatar; });
    app.innerHTML=
      '<div class="card center">'
      +'<div class="pop" style="font-size:56px">'+(av?av.face:"🧙‍♀️")+'</div>'
      +'<h1>Bravo, '+esc(STATE.name)+' ! 🌟</h1>'
      +'<p style="font-size:19px;font-weight:700">Tu t\'es entraîné(e) en '+niveauNom+' sur « '+titre+' ».</p>'
      +'<p class="muted">Tu as fait <b>'+nbFait+'</b> exercice(s) et réussi <b>'+nbReussi+'</b>. Chaque essai te fait progresser. 💪</p>'
      +'<div class="row" style="justify-content:center;margin-top:18px">'
      +'<button class="btn" id="contEnt">🎲 Continuer</button>'
      +'<button class="btn ghost" id="mapEnt">🗺️ Retour à la carte</button></div></div>';
    document.getElementById("contEnt").onclick=function(){ playEntrainement(niveau, themeId); };
    document.getElementById("mapEnt").onclick=renderMap;
  }
  prochaine();
}

/* ---- Boot ---- */
function boot(){
  // Au démarrage, on affiche TOUJOURS la page d'accueil (sélection de profil).
  // On ne replonge plus automatiquement dans le dernier monde, c'était déroutant.
  // On retient juste l'id du dernier profil pour proposer un bouton "Reprendre"
  // mis en avant. La progression de chaque profil reste intacte (clés rds_save_*).
  let last="";
  try{ last = localStorage.getItem(LAST_KEY) || localStorage.getItem(ACTIVE_KEY) || ""; }catch(e){}
  if(last && !profileById(last)) last="";   // profil supprimé entre-temps
  logoutProfile();                          // on n'est connecté à personne sur l'accueil
  renderStats();
  renderLanding(last);
}

document.getElementById("resetBtn").onclick=()=>{
  if(!ACTIVE){ toast("Crée d'abord un compte."); return; }
  if(confirm("Réinitialiser la progression de ce profil ? (Le compte est conservé.)")){
    const p=profileById(ACTIVE);
    STATE=defaultState(); STATE.setup=true;
    if(p){ STATE.name=p.name; STATE.avatar=p.avatar; }
    save(); boot();
  }
};
/* Réglages d'accessibilité du pied de page : mode calme, police dyslexie,
   masquer la série. Persistés par profil via setPrefAndReflect/togglePref. */
document.getElementById("calmeBtn").onclick=()=>{
  setPrefAndReflect("calme","🌙 Mode calme activé","✨ Animations réactivées");
};
var _dysBtn=document.getElementById("dysBtn");
if(_dysBtn) _dysBtn.onclick=()=>{
  setPrefAndReflect("dys","🔤 Police dyslexie activée","🔤 Police standard rétablie");
};
var _streakBtn=document.getElementById("streakBtn");
if(_streakBtn) _streakBtn.onclick=()=>{
  if(!ACTIVE){ toast("Crée un profil pour mémoriser ce réglage."); return; }
  togglePref("hideStreak","🔥 Série masquée","🔥 Série réaffichée");
};

/* ---- Export / Import de la progression (sans serveur, RGPD-friendly) ----
   Tout reste sur l'appareil. On sauvegarde et on restaure les clés localStorage
   déjà utilisées par l'app : les comptes/progression du Royaume (rds_*) et du
   module Petits Malins (pm_*). Un simple fichier JSON, à garder précieusement. */
function collectProgress(){
  var data={};
  try{
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k && (k.indexOf("rds_")===0 || k.indexOf("pm_")===0)){
        data[k]=localStorage.getItem(k);
      }
    }
  }catch(e){}
  return data;
}
function exportProgress(){
  var payload={
    app:"Collegica",
    type:"progression",
    version:1,
    exportedAt:new Date().toISOString(),
    data:collectProgress()
  };
  var nbKeys=Object.keys(payload.data).length;
  if(nbKeys===0){ toast("ℹ️ Aucune progression à exporter pour l'instant."); return; }
  try{
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    var stamp=new Date().toISOString().slice(0,10);
    a.href=url; a.download="royaume-progression-"+stamp+".json";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },0);
    toast("💾 Progression exportée ("+nbKeys+" élément(s)).");
  }catch(e){
    toast("⚠️ Export impossible sur ce navigateur.");
  }
}
function importProgress(file){
  var reader=new FileReader();
  reader.onload=function(){
    var payload;
    try{ payload=JSON.parse(reader.result); }
    catch(e){ toast("⚠️ Fichier illisible (JSON invalide)."); return; }
    var data=(payload && payload.data) ? payload.data : payload;
    if(!data || typeof data!=="object"){ toast("⚠️ Ce fichier ne contient pas de progression."); return; }
    var keys=Object.keys(data).filter(function(k){ return k.indexOf("rds_")===0 || k.indexOf("pm_")===0; });
    if(keys.length===0){ toast("⚠️ Aucune progression reconnue dans ce fichier."); return; }
    if(!confirm("Importer cette progression ?\n\nCela va REMPLACER la progression actuelle de cet appareil ("+keys.length+" élément(s)). Cette action est irréversible.")){
      return;
    }
    try{
      // On retire d'abord les clés existantes de l'app, puis on restaure celles du fichier.
      var toRemove=[];
      for(var i=0;i<localStorage.length;i++){
        var ek=localStorage.key(i);
        if(ek && (ek.indexOf("rds_")===0 || ek.indexOf("pm_")===0)) toRemove.push(ek);
      }
      toRemove.forEach(function(k){ localStorage.removeItem(k); });
      keys.forEach(function(k){ localStorage.setItem(k, String(data[k])); });
      toast("📂 Progression importée. Rechargement…");
      setTimeout(function(){ location.reload(); }, 700);
    }catch(e){
      toast("⚠️ Import impossible (stockage indisponible).");
    }
  };
  reader.onerror=function(){ toast("⚠️ Lecture du fichier impossible."); };
  reader.readAsText(file);
}
document.getElementById("exportBtn").onclick=exportProgress;
document.getElementById("importBtn").onclick=function(){ document.getElementById("importFile").click(); };
document.getElementById("importFile").onchange=function(e){
  var f=e.target.files && e.target.files[0];
  if(f) importProgress(f);
  e.target.value=""; // permet de réimporter le même fichier ensuite
};

boot();
